// ══════════════════════════════════════════════════════════════
// ★★★ v6.1 IME 완벽 처리
//  - compositionstart  → 조합 시작 플래그
//  - compositionend    → 값 즉시 캡처 후 requestAnimationFrame 으로 렌더
//  - input             → 조합 중이면 무시 (영문/숫자는 바로 처리)

// ══════════════════════════════════════════════════════════════

let _stuComposing   = false;

function onJobCompositionStart()   { _jobComposing = true; }

}
function onJobInput(el) {

// ── 유틸 ─────────────────────────────────────────────────────
const fmt        = d => d ? String(d).replace(/-/g,'.') : '-';
const $          = id => document.getElementById(id);
const esc        = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dateOrNull = v => (v && String(v).trim()) ? v : null;

/* ★ 날짜 비교: 시/분/초 완전 무시, 문자열 YYYY-MM-DD만 비교
   - TODAY는 'YYYY-MM-DD' 문자열
   - dateStr도 'YYYY-MM-DD' 형식 → 직접 문자열 비교로 정확한 결과 보장 */
const isToday = d => !!d && d === TODAY;

function calcDDay(dateStr) {
  if (!dateStr) return null;
  // YYYY-MM-DD 문자열을 로컬 자정 기준으로 파싱
  const [y, mo, da] = String(dateStr).split('-').map(Number);
  const target = new Date(y, mo - 1, da);           // 로컬 자정
  const [ty, tmo, tda] = TODAY.split('-').map(Number);
  const now    = new Date(ty, tmo - 1, tda);         // 오늘 로컬 자정
  return Math.round((target - now) / 86400000);
}

// ★ 날짜 오류 수정: 공고가 "진짜 종료"인지 판별
// 최종합격발표일이 오늘이거나 미래라면 → 절대 마감/블러 처리 안 함
function isTrulyOver(job) {
  if (job.isClosed) return true;
  // 최종합격발표일이 오늘 이후라면 → 아직 살아있는 공고
  if (job.finalDate && calcDDay(job.finalDate) >= 0) return false;
  // 지원마감일도 지났고, 최종발표일도 없거나 지난 경우
  const deadline = job.applyDeadline || job.docDate;
  if (deadline && calcDDay(deadline) < 0) return true;
  return false;
}

function dDayBadge(dateStr, closed) {
  if (closed) return `<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">마감됨</span>`;
  const d = calcDDay(dateStr);
  if (d === null) return '';
  if (d < 0)   return `<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">기간만료</span>`;
  if (d === 0) return `<span style="background:#FEE2E2;color:#DC2626;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">🔴 D-DAY</span>`;
  if (d <= 3)  return `<span style="background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">D-${d}</span>`;
  if (d <= 7)  return `<span style="background:#FEF3C7;color:#D97706;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #FDE68A;white-space:nowrap">D-${d}</span>`;
  return `<span style="background:#DBEAFE;color:#1D4ED8;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #BFDBFE;white-space:nowrap">D-${d}</span>`;
}

function csvExport(data, name) {
  if (!data || !data.length) return;
  const hdrs = Object.keys(data[0]);
  const rows = data.map(r => hdrs.map(h => `"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));
  const csv  = [hdrs.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

function getApps(sid) {
  return JOBS.flatMap(j => j.applicants
    .filter(a => a.studentId === sid)
    .map(a => ({...a, jobName:j.name, category:j.category, docDate:j.docDate, finalDate:j.finalDate})));
}

function getStudentStatus(sid) {
  const apps = getApps(sid);
  if (apps.length === 0)
    return {label:'지원가능', emoji:'🟢', color:'#059669', bg:'#D1FAE5', border:'#6EE7B7'};
  if (apps.some(a => a.status === '최종합격'))
    return {label:'취업완료', emoji:'🔵', color:'#1D4ED8', bg:'#DBEAFE', border:'#93C5FD'};
  if (apps.some(a => a.status !== '최종합격' && a.status !== '불합격'))
    return {label:'진행중',  emoji:'🟡', color:'#D97706', bg:'#FEF3C7', border:'#FDE68A'};
  return {label:'지원가능', emoji:'🟢', color:'#059669', bg:'#D1FAE5', border:'#6EE7B7'};
}

function filterStudents() {
  const kw = studentFilter.kw.trim();
  return STUDENTS.filter(s => {
    if (kw) {
      const hit = s.name.includes(kw) || (s.phone||'').includes(kw) || (s.email||'').includes(kw);
      if (!hit) return false;
    }
    if (studentFilter.grade !== '전체') {
      const apps = getApps(s.id);
      if (!apps.some(a => a.grade === studentFilter.grade)) return false;
    }
    return true;
  });
}

// ── DB 변환 ───────────────────────────────────────────────────

function dbToJob(r) {

    id:r.id, name:r.name, category:r.category||'기타', type:r.type||'',

    startDate:        r.start_date||'',

function dbToApplicant(r) {

// ── 데이터 로드 ───────────────────────────────────────────────
async function loadAllData() {
  try {
    const [{data:sd,error:e1},{data:jd,error:e2},{data:ad,error:e3}] = await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*')
    ]);
    if (e1||e2||e3) { console.error('DB오류:',e1,e2,e3); customAlert('데이터 로드 오류.\nSupabase URL과 ANON_KEY를 확인하세요.'); return; }
    STUDENTS = (sd||[]).map(dbToStudent);
    const jobs = (jd||[]).map(dbToJob);
    const aps  = (ad||[]).map(dbToApplicant);
    JOBS = jobs.map(j => ({...j, applicants:aps.filter(a => a.jobId === j.id)}));
    renderView();
  } catch(err) {
    console.error('loadAllData실패:',err);
    customAlert('네트워크 오류. 인터넷 연결을 확인하세요.');
  }
}

// ── 실시간 구독 ───────────────────────────────────────────────
function scheduleReload() { clearTimeout(_reloadTimer); _reloadTimer = setTimeout(loadAllData, 500); }
function setupRealtime() {
  SB.channel('jobms-v61')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'applicants'},scheduleReload)
    .subscribe(status => {
      _dbConnected = (status === 'SUBSCRIBED');
      const dot=$('_conn_dot'), txt=$('_conn_txt');
      if (dot) dot.style.background = _dbConnected ? '#10B981' : '#F59E0B';
      if (txt) txt.textContent = _dbConnected ? '실시간 연동 활성' : '연결 중...';
    });
}

// ── SVG 차트 ─────────────────────────────────────────────────
function pieChartSVG(data, w, h) {
  if (!data||!data.length) return `<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const total = data.reduce((s,d) => s+d.value, 0);
  const r=Math.min(w,h)*.32, cx=w*.42, cy=h/2;
  const legX=cx+r+18, legStartY=h/2-(data.length*18)/2;
  let angle=-Math.PI/2, paths='', labels='', legend='';
  data.forEach((d,i) => {
    const slice=(d.value/total)*2*Math.PI, x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle), x2=cx+r*Math.cos(angle+slice), y2=cy+r*Math.sin(angle+slice);
    const large=slice>Math.PI?1:0, c=PIE_C[i%PIE_C.length], mx=cx+(r*.65)*Math.cos(angle+slice/2), my=cy+(r*.65)*Math.sin(angle+slice/2);
    paths+=`<path d="M${cx.toFixed(1)},${cy.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r.toFixed(1)},${r.toFixed(1)} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${c}" stroke="#fff" stroke-width="2"/>`;
    if (d.value>0) labels+=`<text x="${mx.toFixed(1)}" y="${(my+4).toFixed(1)}" text-anchor="middle" fill="#fff" font-size="${Math.max(9,r*.15).toFixed(0)}" font-weight="bold">${d.value}</text>`;
    legend+=`<g transform="translate(${legX.toFixed(1)},${(legStartY+i*20).toFixed(1)})"><rect width="10" height="10" fill="${c}" rx="2"/><text x="14" y="9" font-size="11" fill="#374151">${esc(d.name)}</text></g>`;
    angle += slice;
  });
  return `<svg width="${w}" height="${h}" style="overflow:visible;display:block">${paths}${labels}${legend}</svg>`;
}
function barChartSVG(data, w, h) {
  if (!data||!data.length) return `<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const max=Math.max(...data.map(d=>d.value),1);
  const pl=28,pb=28,pt=30,pr=8, bw2=(w-pl-pr)/data.length*.55, gap=(w-pl-pr)/data.length;
  let bars='', grid='';
  for(let i=0;i<=4;i++){const y=h-pb-(i/4)*(h-pt-pb);grid+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w-pr}" y2="${y.toFixed(1)}" stroke="#F1F5F9" stroke-width="1"/>`;if(i>0)grid+=`<text x="${(pl-5).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#94A3B8">${Math.round(max*i/4)}</text>`;}
  data.forEach((d,i) => {
    const bh=((d.value/max)*(h-pt-pb))||2, x=pl+i*gap+gap*.225, y=h-pb-bh, c=PIE_C[i%PIE_C.length];
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw2.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}" rx="4"/>`;
    bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(h-pb+16).toFixed(1)}" text-anchor="middle" font-size="10" fill="#6B7280">${esc(d.name)}</text>`;
    if (d.value>0) bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">${d.value}</text>`;
  });
  return `<svg width="${w}" height="${h}" style="display:block;overflow:visible">${grid}${bars}</svg>`;
}

function btn(label, onclick, variant, sm) {

function drawCharts() {
  const pw=$('pie-wrap'), bw=$('bar-wrap'); if(!pw||!bw) return;
  const allAps=JOBS.flatMap(j=>j.applicants);
  const finalSids=JOBS.flatMap(j=>j.applicants.filter(a=>a.status==='최종합격').map(a=>a.studentId));
  const statusData=STATUSES.map(s=>({name:s,value:allAps.filter(a=>a.status===s).length})).filter(d=>d.value>0);
  const ag={'10대':0,'20대':0,'30대':0,'40대+':0,'나이 모름':0};
  finalSids.forEach(sid=>{
    const st=STUDENTS.find(s=>s.id===sid);
    if(!st||!st.age){ag['나이 모름']++;return;}
    if(st.age<20)ag['10대']++;else if(st.age<30)ag['20대']++;else if(st.age<40)ag['30대']++;else ag['40대+']++;
  });
  const ageData=Object.keys(ag).map(k=>({name:k,value:ag[k]})).filter(d=>d.value>0);
  const pw_w=pw.clientWidth-4,pw_h=pw.clientHeight-4,bw_w=bw.clientWidth-4,bw_h=bw.clientHeight-4;
  if(pw_w>0&&pw_h>0) pw.innerHTML=pieChartSVG(statusData,pw_w,pw_h);
  if(bw_w>0&&bw_h>0) bw.innerHTML=barChartSVG(ageData,bw_w,bw_h);
}

// ★ 공고 필터 & 정렬
// ══════════════════════════════════════════════════════════════
function getFiltered() {
  return JOBS.filter(j => {
    if (jobFilter.cat !== '전체' && j.category !== jobFilter.cat) return false;
    if (jobFilter.year && !(j.docDate||'').startsWith(jobFilter.year)) return false;
    if (jobFilter.kw && !j.name.includes(jobFilter.kw)) return false;
    if (jobFilter.type === '추천' && !j.isRec) return false;
    if (jobFilter.type === '지원' && j.isRec) return false;
    return true;
  });
}

// ★ 정렬: 유효마감 ASC → 기간초과 진행중 → isClosed 맨 아래
function getSorted(filtered) {
  const active = filtered.filter(j => !j.isClosed);
  const closed = filtered.filter(j =>  j.isClosed);
  const validActive = active
    .filter(j => { const d=calcDDay(j.applyDeadline||j.docDate); return d===null||d>=0; })
    .sort((a,b) => {
      const da=a.applyDeadline||a.docDate||'9999-99-99';
      const db=b.applyDeadline||b.docDate||'9999-99-99';
      return da.localeCompare(db);
    });
  const pastActive = active.filter(j => { const d=calcDDay(j.applyDeadline||j.docDate); return d!==null&&d<0; });
  return [...validActive, ...pastActive, ...closed];
}

  const dl=(lbl,val,hi)=>`<div style="min-width:100px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em">${lbl}</p><p style="margin:3px 0 0;font-size:13px;font-weight:600;color:${hi||'#111827'}">${esc(val||'-')}</p></div>`;
  const fdNum=calcDDay(job.finalDate);
  let rows=`<div style="display:flex;flex-wrap:wrap;gap:14px 24px;padding:12px 16px;border-bottom:1px solid #DBEAFE">
    ${dl('카테고리',job.category)}
    ${dl('채용형태',job.type)}
    ${job.applyStartDate?dl('지원 시작일',fmt(job.applyStartDate)):''}
    ${job.applyDeadline?dl('서류 마감일',fmt(job.applyDeadline)):''}
    ${dl('서류접수일',fmt(job.docDate),isToday(job.docDate)?'#DC2626':'')}
    ${dl('서류합격발표일',fmt(job.documentPassDate),isToday(job.documentPassDate)?'#DC2626':'')}
    ${dl('면접일',fmt(job.interviewDate),isToday(job.interviewDate)?'#DC2626':'')}
    ${dl('최종합격발표일',fmt(job.finalDate),(fdNum!==null&&fdNum<=3&&fdNum>=0)?'#DC2626':isToday(job.finalDate)?'#EA580C':'')}
    ${dl('근무 시작',fmt(job.startDate))}
    ${dl('근무 종료',job.endDate?fmt(job.endDate):'무기한')}
  </div>`;
  if (job.jobUrl) rows+=`<div style="padding:8px 16px;border-bottom:1px solid #DBEAFE;display:flex;align-items:center;gap:10px"><span style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em">공고 URL</span><a href="${esc(job.jobUrl)}" target="_blank" style="font-size:12px;color:#2563EB;text-decoration:underline;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:420px">${esc(job.jobUrl)}</a></div>`;
  if (job.isRec) rows+=`<div style="padding:10px 16px;border-bottom:1px solid #DBEAFE;background:#F0F7FF"><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.05em">📌 추천 공고 정보</p><div style="display:flex;flex-wrap:wrap;gap:14px 24px">${dl('제출 서류',job.submitDocs)}${dl('제출 기한',fmt(job.submitDeadline))}${dl('담당자',job.managerName)}${dl('연락처',job.managerPhone)}${dl('이메일',job.managerEmail)}</div></div>`;
  if (job.note) rows+=`<div style="padding:8px 16px;border-bottom:1px solid #DBEAFE"><span style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em">비고 </span><span style="font-size:12px;color:#374151">${esc(job.note)}</span></div>`;
  return `<tr><td colspan="11" style="padding:0"><div class="job-detail-panel">${rows}</div></td></tr>`;
}

// ══════════════════════════════════════════════════════════════
// ★★★ v6.1 공고 행 렌더링
//  11컬럼: No | 카테고리 | 채용형태 | 공고명 | 서류접수일 | 서류마감일(D-Day) |
//          서류합격발표일 | 면접일 | 최종합격발표일(D-Day) | 지원현황 | 관리
//
//  ★ 날짜 오류 수정:
//    - isTrulyOver(): finalDate >= 오늘이면 블러/마감 처리 완전 차단
//    - 모든 날짜 비교는 YYYY-MM-DD 문자열 기준 (시간 무시)
//  ★ 긴급: isToday(finalDate) → 연한 주홍 배경 + 🔥최종발표 뱃지
// ══════════════════════════════════════════════════════════════
function renderJobRow(job, rowNum) {
  const deadline  = job.applyDeadline || job.docDate;
  const dlDNum    = calcDDay(deadline);
  const finalDNum = calcDDay(job.finalDate);

  const tD  = isToday(job.docDate);
  const tDP = isToday(job.documentPassDate);
  const tI  = isToday(job.interviewDate);
  const tF  = isToday(job.finalDate);      // 최종합격발표일 = 오늘

  // ★ 긴급: 최종합격발표일이 오늘인 진행중 공고
  const isUrgent = !job.isClosed && tF;

  // ★ 날짜 오류 수정: isTrulyOver()로 판별 (finalDate >= 오늘이면 false)
  const over = isTrulyOver(job);

  const cTotal=job.applicants.length;
  const cDocP =job.applicants.filter(a=>a.status==='서류합격').length;
  const cInter=job.applicants.filter(a=>a.status==='면접대기').length;
  const cPass =job.applicants.filter(a=>a.status==='최종합격').length;
  const cFail =job.applicants.filter(a=>a.status==='불합격').length;

  let rowClass='tbl-tr', rowBg='#fff';
  if (isUrgent)         { rowClass='row-urgent'; }
  else if (tD||tDP||tI) { rowBg='#FFFBEB'; }
  else if (job.isClosed){ rowBg='#F9FAFB'; }

  const isOpen   = expandedJobs.has(job.id);
  const isDetail = detailJobs.has(job.id);

  // 지원자 서브테이블
  let apRows='';
  if (isOpen) {
    const apBody=job.applicants.length===0
      ?`<tr><td colspan="6" style="padding:14px 20px;color:#CBD5E1;font-size:12px;font-style:italic">등록된 지원자가 없습니다.</td></tr>`
      :job.applicants.map(ap=>{
          const st=STUDENTS.find(s=>s.id===ap.studentId);
          const otherJ=JOBS.filter(j=>j.id!==job.id&&j.applicants.some(a=>a.studentId===ap.studentId));
          const isDup=otherJ.length>0, sc=STATUS_COLORS[ap.status]||'#6B7280';
          const hasIv=['면접대기','최종합격','불합격'].includes(ap.status);
          const examBadge=ap.examNumber?`<span style="margin-left:5px;font-size:9px;background:#FEF9C3;color:#854D0E;padding:1px 5px;border-radius:99px;font-weight:700">번호:${esc(ap.examNumber)}</span>`:'';
          const fbBadge=ap.interviewFeedback?`<span style="margin-left:3px;font-size:9px;background:#F0FDF4;color:#166534;padding:1px 5px;border-radius:99px;font-weight:700">회신✓</span>`:'';
          return `<tr class="acc-tr" style="border-bottom:1px solid #EFF6FF;background:#FAFEFF">
            <td style="padding:8px 10px 8px 16px"><button onclick="openEditApModal(${job.id},${ap.id})" style="border:none;background:none;cursor:pointer;color:${isDup?'#D97706':'#2563EB'};font-weight:700;font-size:12px;text-decoration:underline;padding:0;font-family:inherit">${esc(st?st.name:'?')}</button>${isDup?`<span style="margin-left:6px;font-size:9px;background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:99px;font-weight:800">중복:${otherJ.slice(0,2).map(j=>j.name.slice(0,4)).join(',')}</span>`:''}${examBadge}${fbBadge}</td>
            <td style="padding:8px 10px"><span style="background:${sc}22;color:${sc};padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid ${sc}44">${esc(ap.status)}</span></td>
            <td style="padding:8px 10px;color:#6B7280">${esc(ap.grade)}</td>
            <td style="padding:8px 10px;color:#374151">${hasIv&&ap.examNumber?`<span style="font-weight:600">${esc(ap.examNumber)}</span>`:'-'}</td>
            <td style="padding:8px 10px;color:#94A3B8;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ap.memo||'-')}</td>
            <td style="padding:8px 10px;display:flex;gap:4px">${btn('수정',`openEditApModal(${job.id},${ap.id})`,'outline',true)} ${btn('삭제',`deleteAp(${job.id},${ap.id})`,'danger',true)}</td>
          </tr>`;
        }).join('');
    apRows=`<tr><td colspan="11" style="padding:0"><div style="background:#F8FAFF;border-left:3px solid #2563EB"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#EFF6FF">${['　지원자명','상태','급수','응시번호','메모','관리'].map(h=>`<th style="padding:7px 10px;text-align:left;font-weight:700;color:#1E40AF;font-size:11px;border-bottom:1px solid #DBEAFE">${h}</th>`).join('')}</tr></thead><tbody>${apBody}</tbody></table></div></td></tr>`;
  }

  // 지원현황 배지
  const countCell=`<div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">
    <span style="background:#DBEAFE;color:#1E40AF;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">지원 ${cTotal}</span>
    ${cDocP>0?`<span style="background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">서류합격 ${cDocP}</span>`:''}
    ${cInter>0?`<span style="background:#FDE68A;color:#78350F;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">면접대기 ${cInter}</span>`:''}
    ${cPass>0?`<span style="background:#D1FAE5;color:#065F46;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">합격 ${cPass}</span>`:''}
    ${cFail>0?`<span style="background:#FEE2E2;color:#991B1B;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">불합격 ${cFail}</span>`:''}
    <button onclick="toggleJob(${job.id})" style="border:none;background:${isOpen?'#2563EB':'#E2E8F0'};color:${isOpen?'#fff':'#475569'};border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap">${isOpen?'▲':'▼'}</button>
  </div>`;

  const urlBtn=job.jobUrl
    ?`<a href="${esc(job.jobUrl)}" target="_blank" style="background:#F0FDF4;color:#059669;border:1px solid #6EE7B7;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:3px">🔗 공고</a>`:'';
  const manageBtns=`<div style="display:flex;gap:4px;flex-wrap:nowrap;align-items:center">${urlBtn} ${btn('✏',`openJobModal(${job.id})`,'outline',true)} ${btn('🗑',`confirmDeleteJob(${job.id})`,'danger',true)} ${btn('+지원',`openAddApModal(${job.id})`,'primary',true)}</div>`;

  // 공고명 셀
  const hasScheduleToday = tD || tDP || tI;
  const nameCell=`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
    ${isUrgent?`<span style="background:#FFEDD5;color:#EA580C;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FDBA74;white-space:nowrap">🔥최종발표</span>`:''}
    ${hasScheduleToday?'<span style="color:#F59E0B;font-size:14px">★</span>':''}
    ${job.isRec?badge('추천','#7C3AED'):''}
    ${job.isReA?badge('재공고','#DC2626'):''}
    ${job.isClosed?badge('마감','#9CA3AF'):''}
    <button class="job-name-btn" onclick="toggleDetail(${job.id})" style="border:none;background:none;padding:0;cursor:pointer;font-weight:700;font-size:13px;color:${isDetail?'#2563EB':'#0F172A'};text-align:left;font-family:inherit;display:inline-flex;align-items:center;gap:4px">${esc(job.name)}<span style="font-size:10px;color:${isDetail?'#2563EB':'#94A3B8'}">${isDetail?'▲':'▼'}</span></button>
    ${hasScheduleToday?`<span style="font-size:9px;background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:99px;font-weight:800">${[tD&&'서류접수',tDP&&'합격발표',tI&&'면접'].filter(Boolean).join('/')} D-DAY</span>`:''}
  </div>`;

  // ── 컬럼5: 서류접수일 (docDate)
  const docDateText = job.docDate
    ? `<span style="color:${tD?'#DC2626':'#475569'};font-weight:${tD?700:400};font-size:11px">${fmt(job.docDate)}</span>`
    : `<span style="color:#E2E8F0;font-size:11px">-</span>`;

  // ── 컬럼6: 서류마감일 (applyDeadline, D-Day 배지)
  const dlText = job.isClosed
    ? `<span style="color:#9CA3AF;font-size:10px">마감됨</span>`
    : deadline
      ? `<div style="display:flex;flex-direction:column;gap:2px">${dDayBadge(deadline,false)}<span style="color:${dlDNum!==null&&dlDNum>=0&&dlDNum<=3?'#DC2626':dlDNum!==null&&dlDNum>=0&&dlDNum<=7?'#D97706':'#6B7280'};font-size:10px;font-weight:${dlDNum!==null&&dlDNum>=0&&dlDNum<=7?700:400}">${fmt(deadline)}</span></div>`
      : `<span style="color:#E2E8F0">-</span>`;

  // ── 컬럼7: 서류합격발표일
  const dpText = job.documentPassDate
    ? `<span style="color:${tDP?'#DC2626':'#475569'};font-weight:${tDP?700:400};font-size:11px">${fmt(job.documentPassDate)}</span>`
    : `<span style="color:#E2E8F0">-</span>`;

  // ── 컬럼9: 최종합격발표일 + D-Day 배지
  // ★ 날짜 오류 수정: closed가 아닌 한, finalDate의 D-Day 배지는 정상 표시
  const finalText = job.finalDate
    ? `<div style="display:flex;flex-direction:column;gap:2px">
        ${dDayBadge(job.finalDate, job.isClosed)}
        <span style="color:${tF?'#EA580C':finalDNum!==null&&finalDNum>=0&&finalDNum<=3?'#DC2626':'#475569'};font-weight:${(tF||(finalDNum!==null&&finalDNum>=0&&finalDNum<=3))?700:400};font-size:10px">${fmt(job.finalDate)}</span>
      </div>`
    : `<span style="color:#E2E8F0">-</span>`;

  // ── 컬럼3: 채용형태 배지
  const typeCell = job.type
    ? `<span style="background:#F1F5F9;color:#374151;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;display:inline-block;border:1px solid #E2E8F0">${esc(job.type)}</span>`
    : `<span style="color:#E2E8F0">-</span>`;

  // ★ 날짜 오류 수정: isTrulyOver() 기준으로만 블러 적용
  const opacityStyle = over ? 'opacity:.65;' : '';

  return `<tr class="${rowClass}" style="border-bottom:1px solid #F1F5F9;${rowBg!='#fff'&&!isUrgent?`background:${rowBg};`:''}${opacityStyle}">
    <td style="padding:10px 8px;text-align:center;color:#94A3B8;font-size:11px;font-weight:700;white-space:nowrap">${rowNum}</td>
    <td style="padding:10px 10px;white-space:nowrap">${badge(job.category)}</td>
    <td style="padding:10px 10px;white-space:nowrap">${typeCell}</td>
    <td style="padding:10px 10px;min-width:180px">${nameCell}</td>
    <td style="padding:10px 10px;white-space:nowrap">${docDateText}</td>
    <td style="padding:10px 10px;white-space:nowrap">${dlText}</td>
    <td style="padding:10px 10px;font-size:11px;white-space:nowrap">${dpText}</td>
    <td style="padding:10px 10px;font-size:11px;white-space:nowrap;color:${tI?'#DC2626':'#475569'};font-weight:${tI?700:400}">${fmt(job.interviewDate)}</td>
    <td style="padding:10px 10px;white-space:nowrap">${finalText}</td>
    <td style="padding:10px 10px">${countCell}</td>
    <td style="padding:10px 10px">${manageBtns}</td>
  </tr>${isDetail?renderDetailPanel(job):''}${apRows}`;
}

// ══════════════════════════════════════════════════════════════
// ★ 공고 관리 뷰
// ══════════════════════════════════════════════════════════════
function renderJobs() {
  const filtered=getFiltered();
  const sorted=getSorted(filtered);
  const years=[...new Set(JOBS.map(j=>j.docDate?j.docDate.slice(0,4):'').filter(Boolean))].sort().reverse();

  const catTabs=CATS.map(c=>{
    const cnt=c==='전체'?JOBS.length:JOBS.filter(j=>j.category===c).length;
    const active=c===jobFilter.cat;
    return `<button onclick="jobFilter.cat='${c}';renderView()" style="white-space:nowrap;padding:6px 14px;border-radius:99px;border:1.5px solid ${active?'#2563EB':'#E2E8F0'};background:${active?'#2563EB':'#fff'};color:${active?'#fff':'#374151'};font-size:12px;font-weight:${active?700:500};cursor:pointer;font-family:inherit;flex-shrink:0">${c} <span style="font-size:10px;opacity:.75">${cnt}</span></button>`;
  }).join('');

  const headers=[
    'No.','카테고리','채용 형태',
    '공고명 (▼ 상세)',
    '서류접수일',          // col5: docDate
    '서류마감일 (D-Day)',  // col6: applyDeadline
    '서류합격발표일',      // col7: documentPassDate
    '면접일',              // col8: interviewDate
    '최종합격발표일 (D-Day)', // col9: finalDate
    '지원현황','관리'
  ];

  const tblRows=sorted.length===0
    ?`<tr><td colspan="11" style="padding:40px;text-align:center;color:#CBD5E1;font-size:13px">공고가 없습니다.</td></tr>`
    :sorted.map((j,i)=>renderJobRow(j,i+1)).join('');

  return `<div style="padding:20px 24px 24px;height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <h2 style="margin:0;font-size:20px;font-weight:800;color:#0F172A">공고 관리</h2>
        <p style="margin:3px 0 0;font-size:12px;color:#94A3B8">${sorted.length}건 표시 / 전체 ${JOBS.length}건</p>
      </div>
      <div style="display:flex;gap:8px">
        ${btn('📥 CSV 내보내기','exportJobs()','success')}
        ${btn('+ 새 공고 등록','openJobModal(null)','primary')}
      </div>
    </div>

    <div class="cat-tab-wrap" style="flex-shrink:0">${catTabs}</div>

    <!--
      ★★★ v6.1 IME 완벽 처리:
      compositionstart  → 한글 조합 시작 플래그
      compositionend    → 플래그 해제 + 값 즉시 캡처 + RAF 렌더
      input             → 조합 중이면 완전 무시 (영문/숫자는 정상 동작)
    -->
    <div style="background:#fff;border-radius:10px;padding:10px 14px;border:1px solid #E5E7EB;display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0">
      <select onchange="jobFilter.year=this.value;renderView()" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;background:#fff;font-family:inherit">
        <option value="">전체 연도</option>
        ${years.map(y=>`<option value="${y}" ${y===jobFilter.year?'selected':''}>${y}</option>`).join('')}
      </select>
      <select onchange="jobFilter.type=this.value;renderView()" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;background:#fff;font-family:inherit">
        ${['전체','추천','지원'].map(t=>`<option value="${t}" ${t===jobFilter.type?'selected':''}>${t}</option>`).join('')}
      </select>
      <input
        id="jobSearchInput"
        value="${esc(jobFilter.kw)}"
        oncompositionstart="onJobCompositionStart()"
        oncompositionend="onJobCompositionEnd(this)"
        oninput="onJobInput(this)"
        placeholder="🔍 공고명 실시간 검색..."
        style="padding:7px 12px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;min-width:200px;outline:none;font-family:inherit;flex:1"
        autocomplete="off"
      >
      ${jobFilter.kw?`<button onclick="jobFilter.kw='';renderView()" style="border:none;background:#F1F5F9;color:#64748B;padding:7px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">✕ 초기화</button>`:''}
    </div>

    <div style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:auto;flex:1;min-height:0">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:1280px">
        <thead>
          <tr style="background:#F8FAFC;border-bottom:2px solid #E2E8F0;position:sticky;top:0;z-index:2">
            ${headers.map(h=>`<th style="padding:10px 10px;text-align:left;font-weight:700;color:#374151;font-size:11px;white-space:nowrap;letter-spacing:.04em;background:#F8FAFC">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${tblRows}</tbody>
      </table>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// ★ 학생 DB 뷰
// ══════════════════════════════════════════════════════════════
function renderStudents() {
  const filtered = filterStudents();

  const rows=filtered.length===0
    ?`<tr><td colspan="8" style="padding:40px;text-align:center;color:#CBD5E1">데이터가 없습니다.</td></tr>`
    :filtered.map((s,i)=>{

// ★ renderView — 검색창 포커스/커서 복원

function renderView() {
  const focusedId = document.activeElement ? document.activeElement.id : null;
  const cursorPos = (document.activeElement && typeof document.activeElement.selectionStart === 'number')
    ? document.activeElement.selectionStart : null;

  const main=$('_main'); if(!main) return;
  if      (currentView==='dashboard') { main.innerHTML=renderDashboard(); requestAnimationFrame(()=>requestAnimationFrame(drawCharts)); }
  else if (currentView==='jobs')      { main.innerHTML=renderJobs(); }
  else if (currentView==='students')  { main.innerHTML=renderStudents(); }

  const sb=$('_sidebar'); if(sb) sb.outerHTML=renderSidebar();

  // 검색창 포커스 복원
  const searchIds=['jobSearchInput','studentSearchInput'];
  if (focusedId && searchIds.includes(focusedId)) {
    requestAnimationFrame(function() {
      const el=$(focusedId);
      if (el) {
        el.focus();
        if (cursorPos !== null) {
          try { el.setSelectionRange(cursorPos, cursorPos); } catch(e){}
        }
      }
    });
  }
}

function setView(v) {
  currentView = v;
  $('app').innerHTML = renderSidebar() + '<main id="_main" style="flex:1;overflow:hidden;background:#F0F2F5;display:flex;flex-direction:column;min-height:0"></main>';
  renderView();
}
window.addEventListener('resize', () => { if(currentView==='dashboard') requestAnimationFrame(drawCharts); });

async function saveJob(jobId) {
  const name=$('jf_name')&&$('jf_name').value.trim();
  if (!name) return customAlert('공고명을 입력하세요');

  // ★ apply_start_date는 payload에 포함하지 않음 → DB의 기존 값 보존
  const f = {
    name, category:$('jf_cat').value, type:$('jf_type').value,
    is_rec:!!$('jf_rc').checked, is_rea:!!$('jf_ra').checked, is_closed:!!$('jf_cl').checked,
    doc_date:           dateOrNull($('jf_dd')  && $('jf_dd').value),
    apply_deadline:     dateOrNull($('jf_ad')  && $('jf_ad').value),
    document_pass_date: dateOrNull($('jf_dpd') && $('jf_dpd').value),
    interview_date:     dateOrNull($('jf_id')  && $('jf_id').value),
    final_date:         dateOrNull($('jf_fd')  && $('jf_fd').value),
    start_date:         dateOrNull($('jf_sd2') && $('jf_sd2').value),
    end_date:           dateOrNull($('jf_ed')  && $('jf_ed').value),
    job_url: ($('jf_url')  && $('jf_url').value)||'',
    note:    ($('jf_note') && $('jf_note').value)||'',
    submit_docs:     ($('jf_sd')&&$('jf_sd').value)||'',
    submit_deadline: dateOrNull($('jf_sl')&&$('jf_sl').value),
    manager_name:    ($('jf_mn')&&$('jf_mn').value)||'',
    manager_phone:   ($('jf_mp')&&$('jf_mp').value)||'',
    manager_email:   ($('jf_me')&&$('jf_me').value)||''
  };

  let {error} = jobId!=null
    ? await SB.from('jobs').update(f).eq('id',jobId)
    : await SB.from('jobs').insert(f);

  if (error) {
    const newCols=['apply_deadline','job_url','document_pass_date'];
    if (error.message && newCols.some(c=>error.message.includes(c))) {
      const f2={...f};
      newCols.forEach(c=>delete f2[c]);
      const {error:e2} = jobId!=null
        ? await SB.from('jobs').update(f2).eq('id',jobId)
        : await SB.from('jobs').insert(f2);
      if (e2) { customAlert('저장 오류: '+e2.message); return; }
      customAlert('저장 완료.\n\n※ 신규 컬럼 추가 필요:\nALTER TABLE jobs ADD COLUMN IF NOT EXISTS apply_deadline DATE;\nALTER TABLE jobs ADD COLUMN IF NOT EXISTS job_url TEXT DEFAULT \'\';\nALTER TABLE jobs ADD COLUMN IF NOT EXISTS document_pass_date DATE;');
    } else {
      customAlert('저장 오류: '+error.message);
      return;
    }
  }
  closeModal(); await loadAllData();
}

function updateApSearch(jobId) {
  const val=$('ap_search')&&$('ap_search').value.trim();
  const results=$('ap_search_results'), selInfo=$('ap_selected_info');
  if(!results) return;
  if(!val){results.innerHTML='';if(selInfo)selInfo.innerHTML='';_addApSelectedSid=null;return;}
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  const available=STUDENTS.filter(s=>!job.applicants.find(a=>a.studentId===s.id));

function openHistoryModal(studentId) {
  const s=STUDENTS.find(st=>st.id===studentId); if(!s) return;
  const apps=getApps(studentId);
  const sorted=[...apps].sort((a,b)=>(b.docDate||'').localeCompare(a.docDate||''));
  const pass=apps.filter(a=>a.status==='최종합격').length;
  const ongoing=apps.filter(a=>a.status!=='최종합격'&&a.status!=='불합격').length;

  const tlRows=sorted.length===0
    ?`<div style="text-align:center;padding:30px;color:#CBD5E1;font-size:13px">지원 이력 없음</div>`
    :sorted.map((ap,i)=>{
        const sc=STATUS_COLORS[ap.status]||'#6B7280';
        const isLast=i===sorted.length-1;
        return `<div style="position:relative;padding-left:28px;padding-bottom:${isLast?'0':'16px'}">
          ${!isLast?`<div style="position:absolute;left:7px;top:18px;bottom:0;width:2px;background:#E5E7EB"></div>`:''}
          <div style="position:absolute;left:0;top:4px;width:16px;height:16px;border-radius:50%;background:${sc};border:3px solid #fff;box-shadow:0 0 0 2px ${sc}44"></div>
          <div style="background:#F8FAFC;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px">
              ${ap.docDate?`<span style="font-size:10px;color:#94A3B8;font-weight:600">${fmt(ap.docDate)}</span>`:''}
              ${badge(ap.category)}
              <span style="background:${sc}22;color:${sc};padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid ${sc}44">${esc(ap.status)}</span>
              ${ap.grade?`<span style="font-size:10px;color:#94A3B8">${esc(ap.grade)}</span>`:''}
              ${ap.status==='최종합격'?'<span style="font-size:11px">🎉</span>':''}
            </div>
            <p style="margin:0;font-size:13px;font-weight:700;color:#111827">${esc(ap.jobName)}</p>
            ${ap.memo?`<p style="margin:4px 0 0;font-size:11px;color:#6B7280">${esc(ap.memo)}</p>`:''}
          </div>
        </div>`;
      }).join('');

  const memoSection=s.counselingMemo
    ?`<div style="background:#FFFBEB;border:1px solid #FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 6px;font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em">📝 상담 메모</p><p style="margin:0;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap">${esc(s.counselingMemo)}</p></div>`:'';

  const stObj=getStudentStatus(s.id);
  const stBadge=`<span style="background:${stObj.bg};color:${stObj.color};border:1px solid ${stObj.border};padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${stObj.emoji} ${stObj.label}</span>`;

  showModal(s.name+' — 지원이력 & 타임라인', `
    ${memoSection}
    <div style="display:flex;gap:10px;margin-bottom:16px;padding:10px 14px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;flex-wrap:wrap;align-items:center">
      ${stBadge}
      <span style="color:#D1D5DB">|</span>
      <span style="font-size:13px;color:#374151"><strong>${apps.length}</strong>건 지원</span>
      <span style="color:#D1D5DB">|</span>
      <span style="font-size:13px;color:#059669"><strong>${pass}</strong>건 합격</span>
      <span style="color:#D1D5DB">|</span>
      <span style="font-size:13px;color:#2563EB"><strong>${ongoing}</strong>건 진행 중</span>
    </div>
    <p style="margin:0 0 12px;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">📅 지원 타임라인 (최신순)</p>
    <div style="padding-left:4px">${tlRows}</div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6">
      ${btn('📥 CSV 내보내기',`exportHistory(${studentId})`,'success')}
    </div>
  `, '660px');
}

    const apps=getApps(s.id);
    const st=getStudentStatus(s.id);
    return{No:i+1,이름:s.name,상태:st.label,나이:s.age||'미등록',연락처:s.phone,이메일:s.email,지원횟수:apps.length,최종합격:apps.filter(a=>a.status==='최종합격').length,상담메모:s.counselingMemo||''};
  }), '학생DB_v61');
}
function exportHistory(studentId) {
  const s=STUDENTS.find(st=>st.id===studentId); if(!s) return;
  csvExport(getApps(studentId).map(a=>({기관명:a.jobName,카테고리:a.category,서류접수일:a.docDate||'',최종합격발표일:a.finalDate||'',상태:a.status,급수:a.grade,발표방식:a.announceType,메모:a.memo||''})), s.name+'_지원이력');
}

// ── 초기화 ────────────────────────────────────────────────────
async function init() {
  setView('dashboard');
  showLoading();
  try { await loadAllData(); } finally { hideLoading(); }
  setupRealtime();
}
init();
</script>
