/* ── 상태 변수 ── */
let currentView='dashboard', expandedJobs=new Set(), detailJobs=new Set();
let selectedMonth=MONTH, empCat='전체';
let jobFilter={cat:'전체',year:'',kw:'',type:'전체',dateFrom:'',dateTo:''};
let studentFilter={kw:'',grade:'전체',statusTab:'전체'};
let STUDENTS=[], JOBS=[], VAULT=[];
let _savedScrollTop=0, _savedTblScrollTop=0;
let tableSort={col:null,dir:'none'};
/* ★ v7.3 면접 자료실 상태 */
let vaultFilter='전체', vaultKw='';
let expandedInstitutions=new Set();   /* 아코디언 열림 상태 */
let selectedVaultItems=new Set();     /* PDF 선택 체크박스 */
let _vaultKwComposing=false, _vaultKwTimer=null;

/* ── IME ── */
let _jobComposing=false,_stuComposing=false,_jobDebTimer=null,_stuDebTimer=null;
function onJobCompositionStart(){_jobComposing=true;clearTimeout(_jobDebTimer);}
function onJobCompositionEnd(el){_jobComposing=false;clearTimeout(_jobDebTimer);const v=el.value;_jobDebTimer=setTimeout(()=>{jobFilter.kw=v;renderView();},0);}
function onJobInput(el){if(_jobComposing)return;clearTimeout(_jobDebTimer);const v=el.value;_jobDebTimer=setTimeout(()=>{jobFilter.kw=v;renderView();},200);}
function onStuCompositionStart(){_stuComposing=true;clearTimeout(_stuDebTimer);}
function onStuCompositionEnd(el){_stuComposing=false;clearTimeout(_stuDebTimer);const v=el.value;_stuDebTimer=setTimeout(()=>{studentFilter.kw=v;renderView();},0);}

function onVaultKwCompositionStart(){_vaultKwComposing=true;clearTimeout(_vaultKwTimer);}
function onVaultKwCompositionEnd(el){_vaultKwComposing=false;clearTimeout(_vaultKwTimer);const v=el.value;_vaultKwTimer=setTimeout(()=>{vaultKw=v;renderView();},0);}
function onVaultKwInput(el){if(_vaultKwComposing)return;clearTimeout(_vaultKwTimer);const v=el.value;_vaultKwTimer=setTimeout(()=>{vaultKw=v;renderView();},200);}

/* ── 유틸 ── */
const fmt=d=>d?String(d).replace(/-/g,'.'):'-';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dateOrNull=v=>(v&&String(v).trim())?v:null;
const isToday=d=>!!d&&String(d).slice(0,10)===TODAY;
function calcDDay(ds){if(!ds)return null;const s=String(ds).slice(0,10);const[y,mo,da]=s.split('-').map(Number);const[ty,tmo,tda]=TODAY.split('-').map(Number);return Math.round((new Date(y,mo-1,da)-new Date(ty,tmo-1,tda))/86400000);}
function isTrulyOver(job){if(job.isClosed)return true;if(job.finalDate&&String(job.finalDate).slice(0,10)>=TODAY)return false;if(job.interviewDate&&String(job.interviewDate).slice(0,10)>=TODAY)return false;const dl=job.applyDeadline||job.docDate;return !!(dl&&String(dl).slice(0,10)<TODAY);}
function dDayBadge(dateStr,closed){if(closed)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">마감됨</span>`;const d=calcDDay(dateStr);if(d===null)return'';if(d<0)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">기간만료</span>`;if(d===0)return`<span style="background:#FEE2E2;color:#DC2626;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">🔴 D-DAY</span>`;if(d<=3)return`<span style="background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">D-${d}</span>`;if(d<=7)return`<span style="background:#FEF3C7;color:#D97706;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #FDE68A;white-space:nowrap">D-${d}</span>`;return`<span style="background:#DBEAFE;color:#1D4ED8;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #BFDBFE;white-space:nowrap">D-${d}</span>`;}
function csvExport(data,name){if(!data||!data.length)return;const hdrs=Object.keys(data[0]);const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));const csv=[hdrs.join(','),...rows].join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();URL.revokeObjectURL(url);}
function getApps(sid){return JOBS.flatMap(j=>j.applicants.filter(a=>a.studentId===sid).map(a=>({...a,jobName:j.name,category:j.category,docDate:j.docDate,finalDate:j.finalDate,interviewDate:j.interviewDate})));}

/* ★ v7.3 핵심: 기관명 기준 그룹화 */
function getGroupedVault(){
  let filtered=[...VAULT];
  if(vaultFilter!=='전체')filtered=filtered.filter(v=>v.category===vaultFilter);
  if(vaultKw.trim()){const kw=vaultKw.trim();filtered=filtered.filter(v=>v.institutionName.includes(kw)||v.content.includes(kw));}
  const groupMap={};
  filtered.forEach(v=>{
    const k=v.institutionName;
    if(!groupMap[k])groupMap[k]={institutionName:k,category:v.category,items:[]};
    groupMap[k].items.push(v);
    /* 카테고리: 가장 최근 항목 기준 */
    const latest=groupMap[k].items.reduce((a,b)=>(b.year||0)>(a.year||0)?b:a,groupMap[k].items[0]);
    groupMap[k].category=latest.category;
  });
  /* 각 그룹 내 항목 최신 연도순 정렬 */
  Object.values(groupMap).forEach(g=>{
    g.items.sort((a,b)=>{if((b.year||0)!==(a.year||0))return(b.year||0)-(a.year||0);return(b.createdAt||'').localeCompare(a.createdAt||'');});
  });
  /* 그룹 정렬: 최신 항목의 연도 기준 */
  return Object.values(groupMap).sort((a,b)=>{
    const aMax=Math.max(...a.items.map(i=>i.year||0));
    const bMax=Math.max(...b.items.map(i=>i.year||0));
    if(bMax!==aMax)return bMax-aMax;
    return a.institutionName.localeCompare(b.institutionName);
  });
}
/* 기존 기관명 목록 (자동완성용) */
function getExistingInstitutions(){
  const map={};
  VAULT.forEach(v=>{if(v.institutionName&&!map[v.institutionName])map[v.institutionName]=v.category;});
  return map;
}

function getStudentStatus(sid){const apps=getApps(sid);if(!apps.length)return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};if(apps.some(a=>a.status==='최종합격'||a.status==='취업성공'))return{label:'취업완료',emoji:'🔵',color:'#1D4ED8',bg:'#DBEAFE',border:'#93C5FD'};if(apps.some(a=>!['최종합격','취업성공','불합격'].includes(a.status)))return{label:'진행중',emoji:'🟡',color:'#D97706',bg:'#FEF3C7',border:'#FDE68A'};return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};}
function getRestrictionBadge(student){if(!student.restrictionLevel)return'';if(student.restrictionLevel==='제한')return`<span style="background:#DC2626;color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:3px;vertical-align:middle;flex-shrink:0">🚫 제한</span>`;if(student.restrictionLevel==='주의')return`<span style="background:#FEF3C7;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;border:1px solid #FDE68A;display:inline-flex;align-items:center;gap:3px;vertical-align:middle;flex-shrink:0">⚠️ 주의</span>`;return'';}
function filterStudents(){const kw=studentFilter.kw.trim();return STUDENTS.filter(s=>{if(kw&&!s.name.includes(kw)&&!(s.phone||'').includes(kw)&&!(s.email||'').includes(kw))return false;if(studentFilter.grade!=='전체'&&!getApps(s.id).some(a=>a.grade===studentFilter.grade))return false;if(studentFilter.statusTab!=='전체'){const st=getStudentStatus(s.id);if(st.label!==studentFilter.statusTab)return false;}return true;});}
/* ── 스마트 알림 ── */
function getThisWeekInterviews(){const result=[];const todayMs=new Date(TODAY).getTime();const weekMs=todayMs+7*86400000;JOBS.forEach(j=>{if(!j.interviewDate)return;const d=new Date(String(j.interviewDate).slice(0,10)).getTime();if(d>=todayMs&&d<=weekMs){j.applicants.filter(a=>a.status==='면접대기').forEach(a=>{const st=STUDENTS.find(s=>s.id===a.studentId);if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category});});}});return result;}
function getLongPendingNoReply(){const result=[];const todayMs=new Date(TODAY).getTime();JOBS.forEach(j=>{j.applicants.forEach(a=>{if(!a.interviewDocSent)return;const sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();const diff=Math.round((todayMs-sentMs)/86400000);if(diff>=7&&!(a.interviewFeedback||'').includes('회신완료')){const st=STUDENTS.find(s=>s.id===a.studentId);if(st)result.push({studentName:st.name,jobName:j.name,daysDiff:diff,category:j.category});}});});return result;}
function renderSmartAlerts(){
  const interviews=getThisWeekInterviews(),noReply=getLongPendingNoReply();if(!interviews.length&&!noReply.length)return'';
  const ivHtml=interviews.length?`<div style="background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:12px 14px"><div style="font-size:11px;font-weight:800;color:#7C3AED;margin-bottom:8px">📅 이번 주 면접 예정자 (${interviews.length}명)</div>${interviews.map(i=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #EDE9FE;flex-wrap:wrap"><span style="font-size:12px;font-weight:700;color:#1E293B">${esc(i.studentName)}</span><span style="font-size:10px;color:#7C3AED;background:#EDE9FE;padding:1px 6px;border-radius:4px">${esc(i.category)}</span><span style="font-size:11px;color:#6B7280;flex:1;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.jobName.length>18?i.jobName.slice(0,18)+'…':i.jobName)}</span><span style="margin-left:auto;font-size:11px;color:#7C3AED;font-weight:700;white-space:nowrap">${fmt(i.interviewDate)}</span></div>`).join('')}</div>`:'';
  const nrHtml=noReply.length?`<div style="background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:12px 14px"><div style="font-size:11px;font-weight:800;color:#DC2626;margin-bottom:8px">⚠️ 미회신 장기 방치 (${noReply.length}명)</div>${noReply.map(i=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #FEE2E2;flex-wrap:wrap"><span style="font-size:12px;font-weight:700;color:#1E293B">${esc(i.studentName)}</span><span style="font-size:10px;color:#DC2626;background:#FEE2E2;padding:1px 6px;border-radius:4px">${esc(i.category)}</span><span style="font-size:11px;color:#6B7280;flex:1;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.jobName.length>16?i.jobName.slice(0,16)+'…':i.jobName)}</span><span style="margin-left:auto;font-size:11px;color:#DC2626;font-weight:700;white-space:nowrap">${i.daysDiff}일 경과</span></div>`).join('')}</div>`:'';
  return`<div id="dash-alerts"><div style="display:grid;grid-template-columns:${interviews.length&&noReply.length?'1fr 1fr':'1fr'};gap:10px">${ivHtml}${nrHtml}</div></div>`;
}
/* ── 퀵 메모 ── */
function appendMemoText(fieldId,prefix){const el=$(fieldId);if(!el)return;const now=new Date(new Date().getTime()+9*3600000);const text=`${prefix} ${now.toISOString().slice(0,10)} ${now.toISOString().slice(11,16)}`;el.value=el.value?(el.value+'\n'+text):text;el.focus();}
function quickMemoButtons(fieldId){const btns=[{label:'📤 자료발송',p:'[자료발송]'},{label:'📣 회신당부',p:'[회신당부]'},{label:'📵 연락두절',p:'[연락두절]'},{label:'✅ 회신완료',p:'[회신완료]'}];return`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">${btns.map(b=>`<button type="button" onclick="appendMemoText('${fieldId}','${b.p}')" style="background:#F1F5F9;color:#374151;border:1px solid #E2E8F0;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">${b.label}</button>`).join('')}</div>`;}
/* ── DB 변환 ── */
function dbToStudent(r){return{id:r.id,name:r.name,age:r.age,phone:r.phone||'',email:r.email||'',counselingMemo:r.counseling_memo||'',isWarning:!!r.is_warning,restrictionLevel:r.restriction_level||null};}
function dbToJob(r){return{id:r.id,name:r.name,category:r.category||'기타',type:r.type||'',isRec:!!r.is_rec,isReA:!!r.is_rea,isClosed:!!r.is_closed,applyStartDate:r.apply_start_date||'',applyDeadline:r.apply_deadline||'',documentPassDate:r.document_pass_date||'',jobUrl:r.job_url||'',docDate:r.doc_date||'',interviewDate:r.interview_date||'',finalDate:r.final_date||'',startDate:r.start_date||'',endDate:r.end_date||'',note:r.note||'',submitDocs:r.submit_docs||'',submitDeadline:r.submit_deadline||'',managerName:r.manager_name||'',managerPhone:r.manager_phone||'',managerEmail:r.manager_email||'',createdAt:r.created_at||'',applicants:[]};}
function dbToVault(r){return{id:r.id,category:r.category||'',institutionName:r.institution_name||'',year:r.year||null,content:r.content||'',createdAt:r.created_at||''};}
function dbToApplicant(r){return{id:r.id,jobId:r.job_id,studentId:r.student_id,status:r.status||'서류접수',grade:r.grade||'3급',announceType:r.announce_type||'홈페이지',memo:r.memo||'',examNumber:r.exam_number||'',interviewDocSent:r.interview_doc_sent||'',interviewFeedback:r.interview_feedback||''};}
/* ── 데이터 로드 / 실시간 ── */
async function loadAllData(){
  try{
    const[{data:sd,error:e1},{data:jd,error:e2},{data:ad,error:e3},{data:vd,error:e4}]=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*'),
      SB.from('interview_vault').select('*').order('year',{ascending:false}).order('created_at',{ascending:false})
    ]);
    if(e1||e2||e3){console.error(e1,e2,e3);customAlert('데이터 로드 오류.');return;}
    STUDENTS=(sd||[]).map(dbToStudent);const jobs=(jd||[]).map(dbToJob);const aps=(ad||[]).map(dbToApplicant);
    JOBS=jobs.map(j=>({...j,applicants:aps.filter(a=>a.jobId===j.id)}));
    VAULT=(vd||[]).map(dbToVault);
    renderView();
  }catch(err){console.error(err);customAlert('네트워크 오류.');}
}
function scheduleReload(){clearTimeout(_reloadTimer);_reloadTimer=setTimeout(loadAllData,500);}
function setupRealtime(){
  SB.channel('jobms-v70')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'applicants'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'interview_vault'},scheduleReload)
    .subscribe(s=>{_dbConnected=(s==='SUBSCRIBED');const dot=$('_conn_dot'),txt=$('_conn_txt');if(dot)dot.style.background=_dbConnected?'#10B981':'#F59E0B';if(txt)txt.textContent=_dbConnected?'실시간 연동 활성':'연결 중...';});
}

function renderStatusInfographic(allAps){const total=allAps.length;if(!total)return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#CBD5E1"><span style="font-size:52px">📊</span><span style="font-size:15px;font-weight:700">지원 데이터 없음</span><span style="font-size:12px;color:#E2E8F0">공고에 지원자를 등록하면 표시됩니다</span></div>`;const PAL={'서류접수':{bg:'#94A3B8',dk:'#475569',light:'#F1F5F9'},'서류합격':{bg:'#60A5FA',dk:'#1D4ED8',light:'#DBEAFE'},'면접대기':{bg:'#FBBF24',dk:'#D97706',light:'#FEF3C7'},'최종합격':{bg:'#34D399',dk:'#059669',light:'#D1FAE5'},'취업성공':{bg:'#10B981',dk:'#047857',light:'#D1FAE5'},'불합격':{bg:'#F87171',dk:'#DC2626',light:'#FEE2E2'}};const items=STATUSES.map(s=>({s,...PAL[s]||{bg:'#CBD5E1',dk:'#6B7280',light:'#F3F4F6'},cnt:allAps.filter(a=>a.status===s).length})).filter(x=>x.cnt>0);const flowHtml=items.map((x,i)=>`${i>0?`<span style="color:#D1D5DB;font-size:11px">→</span>`:''}<span style="font-size:10px;font-weight:700;color:${x.dk};background:${x.light};padding:3px 9px;border-radius:99px;white-space:nowrap">${x.s}</span>`).join('');const barSegs=items.map(x=>{const pct=(x.cnt/total*100);const sf=pct>=18,sn=pct>=9;return`<div style="width:${pct.toFixed(2)}%;background:${x.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;transition:width .4s ease" title="${x.s}: ${x.cnt}명">${sf?`<span style="font-size:22px;font-weight:900;color:#fff;line-height:1.1;text-shadow:0 1px 4px rgba(0,0,0,.2)">${x.cnt}</span><span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.9)">${pct.toFixed(0)}%</span>`:sn?`<span style="font-size:16px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)">${x.cnt}</span>`:''}</div>`;}).join('');const legendHtml=items.map(x=>{const pct=(x.cnt/total*100).toFixed(1);return`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F8FAFC;border-radius:9px;border:1px solid #F1F5F9"><span style="width:10px;height:10px;border-radius:3px;background:${x.bg};flex-shrink:0;display:inline-block"></span><span style="font-size:11px;color:#64748B;font-weight:600;flex:1;white-space:nowrap">${x.s}</span><span style="font-size:17px;font-weight:900;color:#0F172A;line-height:1">${x.cnt}</span><span style="font-size:10px;color:#94A3B8;font-weight:500;margin-left:2px;white-space:nowrap">${pct}%</span></div>`;}).join('');const passCount=items.filter(x=>x.s==='최종합격'||x.s==='취업성공').reduce((s,x)=>s+x.cnt,0);const passRate=total>0?Math.round(passCount/total*100):0;return`<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:10px;flex-shrink:0">${flowHtml}</div><div style="display:flex;height:72px;border-radius:12px;overflow:hidden;border:1px solid #E2E8F0;flex-shrink:0">${barSegs}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;flex:1;align-content:start">${legendHtml}</div><div style="margin-top:12px;padding:11px 16px;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border-radius:11px;border:1px solid #BFDBFE;display:flex;gap:0;flex-shrink:0"><div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding-right:12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em">총 지원</p><p style="margin:3px 0 0;font-size:26px;font-weight:900;color:#0F172A;line-height:1">${total}<span style="font-size:11px;color:#94A3B8;font-weight:500;margin-left:2px">건</span></p></div><div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding:0 12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em">취업성사</p><p style="margin:3px 0 0;font-size:26px;font-weight:900;color:#059669;line-height:1">${passCount}<span style="font-size:11px;color:#94A3B8;font-weight:500;margin-left:2px">명</span></p></div><div style="flex:1;text-align:center;padding-left:12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform function showMonthlyReport(){const m=selectedMonth||MONTH;const[yy,mm]=m.split('-');const label=`${yy}년 ${parseInt(mm)}월`;const newJobs=JOBS.filter(j=>(j.createdAt||'').slice(0,7)===m);const newJobsByCat={};CATS.slice(1).forEach(c=>{const cnt=newJobs.filter(j=>j.category===c).length;if(cnt>0)newJobsByCat[c]=cnt;});const docMonthJobs=JOBS.filter(j=>(j.docDate||'').slice(0,7)===m);const monthApplicants=docMonthJobs.flatMap(j=>j.applicants);const finalMonthJobs=JOBS.filter(j=>(j.finalDate||'').slice(0,7)===m);const finalPass=finalMonthJobs.flatMap(j=>j.applicants.filter(a=>a.status==='최종합격'||a.status==='취업성공'));const rate=monthApplicants.length>0?Math.round(finalPass.length/monthApplicants.length*100):0;const catCounts={};finalPass.forEach(a=>{const job=JOBS.find(j=>j.id===a.jobId);if(job)catCounts[job.category]=(catCounts[job.category]||0)+1;});const top3=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);const sep='─'.repeat(32);const reportText=`📊 ${label} 취업 실적 보고서\n${sep}\n\n■ 신규 공고: ${newJobs.length}건\n${Object.keys(newJobsByCat).length>0?Object.entries(newJobsByCat).map(([c,n])=>`    · ${c}: ${n}건`).join('\n'):'    · 없음'}\n\n■ 이번 달 총 지원자: ${monthApplicants.length}명\n■ 이번 달 최종합격: ${finalPass.length}명\n■ 취업 성공률: ${rate}%\n\n■ 주요 취업 기관 TOP 3\n${top3.length>0?top3.map(([c,n],i)=>`    ${i+1}위. ${c} — ${n}명`).join('\n'):'    · 데이터 없음'}\n\n${sep}\n※ JobMS v7.4 자동 생성 · ${TODAY} KST 기준`;const catBadgesHtml=Object.keys(newJobsByCat).length>0?Object.entries(newJobsByCat).map(([c,n])=>`<span style="display:inline-flex;align-items:center;gap:4px;background:${CAT_COLORS[c]||'#6B7280'}18;color:${CAT_COLORS[c]||'#6B7280'};border:1px solid ${CAT_COLORS[c]||'#6B7280'}33;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${c} <strong>${n}건</strong></span>`).join(''):'<span style="color:#CBD5E1;font-size:12px">없음</span>';const top3Html=top3.length>0?top3.map(([c,n],i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1p function setTableSort(col){_saveScrollPositions();if(tableSort.col===col){if(tableSort.dir==='asc')tableSort.dir='desc';else if(tableSort.dir==='desc'){tableSort.col=null;tableSort.dir='none';}else tableSort.dir='asc';}else{tableSort.col=col;tableSort.dir='asc';}renderView();}
function getSorted(filtered){if(tableSort.col&&tableSort.dir!=='none'){const getVal=j=>{switch(tableSort.col){case 'docDate':return j.docDate||'';case 'deadline':return j.applyDeadline||j.docDate||'';case 'documentPassDate':return j.documentPassDate||'';case 'interviewDate':return j.interviewDate||'';case 'finalDate':return j.finalDate||'';default:return '';}};const withVal=filtered.filter(j=>getVal(j)),noVal=filtered.filter(j=>!getVal(j));withVal.sort((a,b)=>{const va=String(getVal(a)).slice(0,10),vb=String(getVal(b)).slice(0,10);return tableSort.dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);});return[...withVal,...noVal];}return sortByFinalDate(filtered);}
function sortHeader(label,col){const active=tableSort.col===col&&tableSort.dir!=='none';const arrow=active?(tableSort.dir==='asc'?'▲':'▼'):'';const tip=active?(tableSort.dir==='asc'?'오래된순 · 클릭→최신순':'최신순 · 클릭→정렬해제'):'클릭→오래된순';return`<th class="sort-th" onclick="setTableSort('${col}')" title="${tip}" style="padding:10px 10px;text-align:left;font-weight:700;color:${active?'#2563EB':'#374151'};font-size:11px;white-space:nowrap;letter-spacing:.04em;background:#F8FAFC;cursor:pointer;user-select:none">${label}${active?` <span style="font-size:10px;color:#2563EB;font-weight:900">${arrow}</span>`:'<span style="font-size:9px;color:#D1D5DB;margin-left:2px;font-weight:400">↕</span>'}</th>`;}
function sortByFinalDate(jobs){const active=jobs.filter(j=>!j.isClosed),closed=jobs.filter(j=>j.isClosed);active.sort((a,b)=>{const fa=a.finalDate?String(a.finalDate).slice(0,10):'',fb=b.finalDate?String(b.finalDate).slice(0,10):'';const aF=fa&&fa>=TODAY,bF=fb&&fb>=TODAY,aP=fa&&fa<TODAY,bP=fb&&fb<TODAY;if(aF&&bF)return fa.localeCompare(fb);if(aF&&!bF)return -1;if(!aF&&bF)return 1;if(aP&&bP)return fb.localeCompare(fa);if(aP&&!bP)return -1;if(!aP&&bP)return 1;return(a.applyDeadline||a.docDate||'9999').localeCompare(b.applyDeadline||b.docDate||'9999');});return[...active,...closed];}
function getFiltered(){return JOBS.filter(j=>{if(jobFilter.cat!=='전체'&&j.category!==jobFilter.cat)return false;if(jobFilter.year&&!(j.docDate||'').startsWith(jobFilter.year))return false;if(jobFilter.kw&&!j.name.includes(jobFilter.kw))return false;if(jobFilter.type==='추천'&&!j.isRec)return false;if(jobFilter.type==='지원'&&j.isRec)return false;if(jobFilter.dateFrom){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl<jobFilter.dateFrom)return false;}if(jobFilter.dateTo){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl>jobFilter.dateTo)return false;}return true;});}

function toggleVaultItem(id){
  if(selectedVaultItems.has(id))selectedVaultItems.delete(id);

function toggleAllInstitution(instName){
  const group=VAULT.filter(v=>v.institutionName===instName);

}

/* ══════════════════════════════════════════════════════════════
   ★ v7.3 SORIZAVA PDF 출력 — 선택 항목 기관별 조합
══════════════════════════════════════════════════════════════ */
function printSelectedVaultPDF(){
  const selectedIds=[...selectedVaultItems];
  if(!selectedIds.length){customAlert('출력할 항목을 체크박스로 선택해주세요.');return;}
  const items=VAULT.filter(v=>selectedIds.includes(v.id));

  /* ★ 중복 문장 제거 유틸 */
  function dedupLines(text){
    const seen=new Set();
    return text.split('\n').filter(line=>{
      const t=line.trim();
      if(!t)return true; /* 빈줄 유지 */
      if(seen.has(t))return false;
      seen.add(t);
      return true;
    }).join('\n');
  }

  /* ★ 선택 항목 전체 내용을 줄 단위로 통합 중복제거 */
  function mergeAndDedup(itemsArr){
    const allLines=[];
    const seenLines=new Set();
    itemsArr.forEach(v=>{
      v.content.split('\n').forEach(line=>{
        const t=line.trim();
        if(!t){allLines.push('');return;}
        if(!seenLines.has(t)){seenLines.add(t);allLines.push(line);}
      });
    });
    /* 연속 빈줄 정리 */
    return allLines.reduce((acc,l,i)=>{
      if(l===''&&acc.length>0&&acc[acc.length-1]==='')return acc;
      acc.push(l);return acc;
    },[]).join('\n').trim();
  }

  /* 기관별 그룹 (선택 항목만) */
  const groupMap={};
  items.forEach(v=>{
    const k=v.institutionName;
    if(!groupMap[k])groupMap[k]={institutionName:k,category:v.category,items:[]};
    groupMap[k].items.push(v);
    const latest=groupMap[k].items.reduce((a,b)=>(b.year||0)>(a.year||0)?b:a,groupMap[k].items[0]);
    groupMap[k].category=latest.category;
  });
  Object.values(groupMap).forEach(g=>{g.items.sort((a,b)=>(b.year||0)-(a.year||0));});
  const groups=Object.values(groupMap).sort((a,b)=>a.institutionName.localeCompare(b.institutionName));
  const totalItems=items.length;
  const instNames=groups.map(g=>g.institutionName).join(', ');

  /* ★ 기관별 섹션 — 공식문제집 레이아웃 (01,02 번호형 + 연도은닉 + 중복제거) */

  /* 내용을 줄 단위로 파싱 → 번호 질문 추출 */
  function parseQuestions(text){
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
    const qLines=[];
    const numPat=/^(\d{1,2}[\.\)、。]?\s*|Q[\.\s]+|[①-⑳]\s*)/;
    let buf='';
    lines.forEach(line=>{
      if(numPat.test(line)){
        if(buf)qLines.push(buf.trim());
        buf=line.replace(numPat,'').trim();
      }else{
        buf=buf?(buf+' '+line):line;
      }
    });
    if(buf)qLines.push(buf.trim());
    return qLines.filter(q=>q.length>1);
  }

  /* 워터마크 HTML (고정 레이어) */
  const wmRows=Array.from({length:18},(_,ri)=>{
    const cells=Array.from({length:6},()=>`<span class="pdf-wm-cell">SORIZAVA ACADEMY</span>`).join('');
    return`<div class="pdf-wm-row">${cells}</div>`;
  }).join('');
  const watermarkHtml=`<div class="pdf-watermark-layer">${wmRows}</div>`;

  /* 기관별 페이지 생성 */
  const instSections=groups.map((g,gi)=>{
    const cc=IV_COLORS[g.category]||'#0EA5E9';

    /* 중복제거 통합 내용 */
    const mergedContent=g.items.length===1
      ? dedupLines(g.items[0].content)
      : mergeAndDedup(g.items);

    /* 질문 파싱 시도 */
    const parsedQs=parseQuestions(mergedContent);
    const isQFormat=parsedQs.length>=2;

    /* 본문 HTML */
    let bodyHtml='';
    if(isQFormat){
      const qItems=parsedQs.map((q,qi)=>`
        <div class="pdf-q-item">
          <span class="pdf-q-num">${String(qi+1).padStart(2,'0')}</span>
          <span class="pdf-q-text">${esc(q)}</span>
        </div>`).join('');
      bodyHtml=`<div class="pdf-q-list">${qItems}</div>`;
    }else{
      bodyHtml=`<div class="pdf-content-raw">${esc(mergedContent)}</div>`;
    }

    return`<div class="pdf-page">
      <div class="pdf-pg-header">
        <div class="pdf-pg-cat-label">${esc(g.category)}</div>
        <div class="pdf-pg-inst-name">${esc(g.institutionName)}</div>
        <div class="pdf-pg-section-title">면접 기출 질문</div>
      </div>
      ${bodyHtml}
      <div class="pdf-pg-footer">
        <div class="pdf-footer-brand">SORIZAVA ACADEMY</div>
        <div class="pdf-footer-security">
          본 자료는 SORIZAVA ACADEMY의 지적 자산입니다.<br>
          무단 배포 시 법적 책임을 물을 수 있습니다.
        </div>
      </div>
    </div>`;
  }).join('');

  const printHtml=`<div class="pdf-wrap">
    ${watermarkHtml}
    ${instSections}
  </div>`;

  const pt=$('_print_target');if(!pt)return;
  pt.innerHTML=printHtml;window.print();setTimeout(()=>{pt.innerHTML='';},1500);
}

async function saveVault(vaultId){

  }

async function saveAddAp(jobId){if(!_addApSelectedSid)return customAlert('학생을 검색하여 선택하거나 신규 등록을 먼저 해주세요.');let sid;if(_addApSelectedSid==='new'){const nm=$('ns_nm')&&$('ns_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');const{data:newSt,error:se}=await SB.from('students').insert({name:nm,age:parseInt($('ns_ag')&&$('ns_ag').value)||null,phone:($('ns_ph')&&$('ns_ph').value)||'',email:($('ns_em')&&$('ns_em').value)||''}).select().single();if(se){customAlert('학생 등록 오류: '+se.message);return;}sid=newSt.id;}else{sid=_addApSelectedSid;}const{error:ae}=await SB.from('applicants').insert({job_id:jobId,student_id:sid,status:($('ap_st')&&$('ap_st').value)||'서류접수',grade:($('ap_gr')&&$('ap_gr').value)||'3급',announce_type:($('ap_an')&&$('ap_an').value)||'홈페이지',memo:($('ap_mm')&&$('ap_mm').value)||'',exam_number:'',interview_doc_sent:null,interview_feedback:''});if(ae){customAlert('지원자 추가 오류: '+ae.message);return;}closeModal();await loadAllData();}
function openEditApModal(jobId,apId){const job=JOBS.find(j=>j.id===jobId),ap=job&&job.applicants.find(a=>a.id===apId),st=ap&&STUDENTS.find(s=>s.id===ap.studentId);if(!ap||!st)return;const showIv=['면접대기','최종합격','취업성공','불합격'].includes(ap.status);const ivSection=`<div id="ea_interview_wrap" style="display:${showIv?'block':'none'}"><div style="background:#FFFBEB;border:1px solid #FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 10px;font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em">📋 면접 관련 기록</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('응시번호','ea_exam','text',ap.examNumber||'')} ${fInp('면접자료 발송일','ea_docsent','date',ap.interviewDocSent||'')}</div>${quickMemoButtons('ea_feedback')}<div><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">면접 회신 내용</label><textarea id="ea_feedback" rows="3" placeholder="면접 후 회신 내용..." style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(ap.interviewFeedback||'')}</textarea></div></div></div>`;const stOpts=STATUSES.map(s=>`<option value="${s}" ${s===ap.status?'selected':''}>${s}</option>`).join('')+(!STATUSES.includes(ap.status)?`<option value="${ap.status}" selected>${ap.status}(기존)</option>`:'');showModal('지원자 수정 — '+st.name,`<div style="background:#EFF6FF;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.06em">개인정보 (학생 DB 동기화)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','ea_nm','text',st.name)} ${fInp('나이','ea_ag','number',st.age)} ${fInp('연락처','ea_ph','text',st.phone)} ${fInp('이메일','ea_em','email',st.email)}</div></div><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase function toggleInterviewSection(status){const show=['면접대기','최종합격','취업성공','불합격'].includes(status);const wrap=$('ea_interview_wrap');if(wrap)wrap.style.display=show?'block':'none';}
async function saveEditAp(jobId,apId,studentId){const nm=$('ea_nm')&&$('ea_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');const newDocSent=dateOrNull($('ea_docsent')&&$('ea_docsent').value);let ap=null;for(const j of JOBS){const a=j.applicants.find(a=>a.id===apId);if(a){ap=a;break;}}const stuObj=STUDENTS.find(s=>s.id===studentId);if(newDocSent&&newDocSent!==(ap?.interviewDocSent||null)&&stuObj?.restrictionLevel==='제한'){const ok=await new Promise(res=>{customConfirm(`⚠️ [${stuObj.name}]은 제한 등급 학생입니다.\n강제 발송하시겠습니까?`,()=>res(true),'강제 발송','#DC2626');});if(!ok){const el=$('ea_docsent');if(el)el.value=ap?.interviewDocSent||'';return;}const now=new Date(new Date().getTime()+9*3600000);const note=`[강제발송승인] ${now.toISOString().slice(0,10)} ${now.toISOString().slice(11,16)} — 제한대상 강제발송`;const memoEl=$('ea_mm');if(memoEl)memoEl.value=memoEl.value?(memoEl.value+'\n'+note):note;}const[{error:ae},{error:se}]=await Promise.all([SB.from('applicants').update({status:$('ea_st').value,grade:$('ea_gr').value,announce_type:$('ea_an').value,memo:($('ea_mm')&&$('ea_mm').value)||'',exam_number:($('ea_exam')&&$('ea_exam').value)||'',interview_doc_sent:newDocSent,interview_feedback:($('ea_feedback')&&$('ea_feedback').value)||''}).eq('id',apId),SB.from('students').update({name:nm,age:parseInt($('ea_ag')&&$('ea_ag').value)||null,phone:($('ea_ph')&&$('ea_ph').value)||'',email:($('ea_em')&&$('ea_em').value)||''}).eq('id',studentId)]);if(ae||se){customAlert('저장 오류: '+(ae?.message||se?.message));return;}closeModal();await loadAllData();}
function deleteAp(jobId,apId){customConfirm('이 지원자를 삭제하시겠습니까?',async function(){const{error}=await SB.from('applicants').delete().eq('id',apId);if(error){customAlert('삭제 오류: '+error.message);return;}await loadAllData();},'삭제','#DC2626');}

async function saveNewStudent(){const nm=$('ns2_nm')&&$('ns2_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');const rl=document.querySelector('input[name="stu_restriction"]:checked')?.value||null;const f={name:nm,age:parseInt($('ns2_ag')&&$('ns2_ag').value)||null,phone:($('ns2_ph')&&$('ns2_ph').value)||'',email:($('ns2_em')&&$('ns2_em').value)||'',counseling_memo:($('ns2_cm')&&$('ns2_cm').value)||'',restriction_level:rl||null};const{error}=await SB.from('students').insert(f);if(error){if(error.message&&(error.message.includes('counseling_memo')||error.message.includes('restriction_level'))){const f2={name:f.name,age:f.age,phone:f.phone,email:f.email};const{error:e2}=await SB.from('students').insert(f2);if(e2){customAlert('저장 오류: '+e2.message);return;}customAlert('저장 완료.\n\n※ 컬럼 추가 필요:\nALTER TABLE students ADD COLUMN IF NOT EXISTS counseling_memo TEXT DEFAULT \'\';\nALTER TABLE students ADD COLUMN IF NOT EXISTS restriction_level TEXT;');}else{customAlert('저장 오류: '+error.message);return;}}closeModal();await loadAllData();}
function openEditStudentModal(id){const s=STUDENTS.find(st=>st.id===id);if(!s)return;showModal('학생 정보 수정',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','es_nm','text',s.name)} ${fInp('나이','es_ag','number',s.age)} ${fInp('연락처','es_ph','text',s.phone)} ${fInp('이메일','es_em','email',s.email)}</div><div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">신뢰 등급</label>${restrictionRadios(s.restrictionLevel||'')}</div><div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">★ 상담 메모</label><textarea id="es_cm" rows="4" placeholder="상담 내용을 입력하세요..." style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(s.counselingMemo||'')}</textarea></div><div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:12px 14px;margin-bottom:12px"><p style="margin:0 0 8px;font-size:11px;font-weight:700;color:#065F46">🏆 취업완료 일괄처리</p><p style="margin:0 0 10px;font-size:11px;color:#374151">진행중인 모든 지원 건을 <strong>취업성공</strong> 상태로 일괄 변경합니다.</p><button onclick="markStudentEmployed(${id})" style="background:#059669;color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🏆 취업완료 일괄처리</button></div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">${btn('취소','closeModal()','outline')} ${btn('저장',`saveStudent(${id})`,'primary')}</div>`,'480px');}
async function saveStudent(id){const nm=$('es_nm')&&$('es_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');const rl=document.querySelector('input[name="stu_restriction"]:checked')?.value||null;const f={name:nm,age:parseInt($('es_ag')&&$('es_ag').value)||null,phone:($('es_ph')&&$('es_ph').value)||'',email:($('es_em')&&$('es_em').value)||'',counseling_memo:($('es_cm')&&$('es_cm').value)||'',restriction_level:rl||null};const{error}=await SB.from('students').update(f).eq('id',id);if(error){if(error.message&&(error.message.includes('counseling_memo')||error.message.includes('restriction_level'))){const f2={name:f.name,age:f.age,phone:f.phone,email:f.email};const{error:e2}=await SB.from('students').update(f2).eq('id',id);if(e2){customAlert('저장 오류: '+e2.message);return;}}else{customAlert('저장 오류: '+error.message);return;}}closeModal();await loadAllData();}

function openHistoryModal(studentId){const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;_historyExpandedJobId=null;_renderHistoryModal(studentId,s);}
function _renderHistoryModal(studentId,s){const apps=getApps(studentId),sorted=[...apps].sort((a,b)=>(b.docDate||'').localeCompare(a.docDate||''));const pass=apps.filter(a=>a.status==='최종합격'||a.status==='취업성공').length;const ongoing=apps.filter(a=>!['최종합격','취업성공','불합격'].includes(a.status)).length;const tlRows=sorted.length===0?`<div style="text-align:center;padding:30px;color:#CBD5E1;font-size:13px">지원 이력 없음</div>`:sorted.map((ap,i)=>{const sc=STATUS_COLORS[ap.status]||'#6B7280',isLast=i===sorted.length-1,isExpanded=_historyExpandedJobId===ap.jobId;return`<div style="position:relative;padding-left:28px;padding-bottom:${isLast?'0':'16px'}">${!isLast?`<div style="position:absolute;left:7px;top:18px;bottom:0;width:2px;background:#E5E7EB"></div>`:''}<div style="position:absolute;left:0;top:4px;width:16px;height:16px;border-radius:50%;background:${sc};border:3px solid #fff;box-shadow:0 0 0 2px ${sc}44"></div><div style="background:#F8FAFC;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px">${ap.docDate?`<span style="font-size:10px;color:#94A3B8;font-weight:600">${fmt(ap.docDate)}</span>`:''}${badge(ap.category)}<span style="background:${sc}22;color:${sc};padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid ${sc}44">${esc(ap.status)}</span>${ap.grade?`<span style="font-size:10px;color:#94A3B8">${esc(ap.grade)}</span>`:''}${(ap.status==='최종합격'||ap.status==='취업성공')?'<span style="font-size:11px">🎉</span>':''}</div><div style="display:flex;align-items:center;gap:6px"><button onclick="_historyExpandedJobId=${isExpanded?'null':ap.jobId};_reRenderHistory(${studentId})" style="border:none;background:none;cursor:pointer;color:#2563EB;font-weight:700;font-size:13px;text-decoration:underline;padding:0;font-family:inherit;text-align:left">${esc(ap.jobName)}</button><span style="font-size:10px;color:#94A3B8">${isExpanded?'▲ 닫기':'▼ 공고 상세'}</span></div>${isExpanded?buildJobInlineDetail(ap.jobId):''}${ap.memo?`<p style="margin:6px 0 0;font-size:11px;color:#6B7280">${esc(ap.memo)}</p>`:''}${ap.interviewDocSent?`<p style="margin:4px 0 0;font-size:10px;color:#94A3B8">자료발송: ${fmt(ap.interviewDocSent)}</p>`:''}${ap.interviewFeedback?`<p style="margin:3px 0 0;font-size:11px;color:#475569">${esc(ap.interviewFeedback)}</p>`:''}</div></div>`;}).join('');const memoSection=s.counselingMemo?`<div style="background:#FFFBEB;border:1px solid #FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 6px;font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em">📝 상담 메모</p><p style="margin:0;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap">${esc(s.counselingMemo)}</p></div>`:'';const resBadge=getRestrictionBadge(s),stObj=getStudentStatus(s.id);showModal(s.name+' — 지원이력 & 타임라인',`${memoSection}<div style="display:flex;gap:10px;margin-bottom:16px;padding:10px 14px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;flex-wrap:wrap;align-items:center"><span style="background:${stObj.bg};color:${stObj.color};border:1px solid ${stObj.border};padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${stObj.emoji} ${stObj.label}</span>${resBadge?`<span style="color:#D1D5DB">|</span>${resBadge}`:''}<span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#374151"><strong>${apps.length}</strong>건 지원</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#059669"><strong>${pass}</strong>건 합격</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#2563EB"><strong>${ongoing}</strong>건 진행 중</span></div><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">📅 지원 타임라인 · 기관명 클릭 시 공고 상세 토글</p><div style="padding-left:4px">${tlRows}</div><div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6;gap:8px;flex-wrap:wrap">${btn('📥 CSV 내보내기',`exportHistory(${studentId})`,'success')} ${btn('✏ 학생 수정',`closeModal();openEditStudentModal(${studentId})`,'outline')}</div>`,'660px');}
window._reRenderHistory=function(studentId){const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;_renderHistoryModal(studentId,s);};
/* ── CSV ── */
function exportJobs(){csvExport(getSorted(getFiltered()).map((j,i)=>({'No':i+1,'카테고리':j.category,'채용형태':j.type,'공고명':j.name,'서류접수일':j.docDate||'','서류마감일':j.applyDeadline||'','서류합격발표일':j.documentPassDate||'','면접일':j.interviewDate||'','최종합격발표일':j.finalDate||'','공고URL':j.jobUrl||'','지원자수':j.applicants.length,'서류합격':j.applicants.filter(a=>a.status==='서류합격').length,'면접대기':j.applicants.filter(a=>a.status==='면접대기').length,'합격':j.applicants.filter(a=>a.status==='최종합격'||a.status==='취업성공').length,'불합격':j.applicants.filter(a=>a.status==='불합격').length,'상태':j.isClosed?'마감':'진행'})),'공고목록_v75');}
function exportStudents(){const filtered=filterStudents();csvExport(filtered.map((s,i)=>{const apps=getApps(s.id),st=getStudentStatus(s.id);return{'No':i+1,'이름':s.name,'상태':st.label,'등급제한':s.restrictionLevel||'없음','나이':s.age||'미등록','연락처':s.phone,'이메일':s.email,'지원횟수':apps.length,'최종합격':apps.filter(a=>a.status==='최종합격'||a.status==='취업성공').length,'상담메모':s.counselingMemo||''};}),'학생DB_v75');}
function exportHistory(studentId){const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;csvExport(getApps(studentId).map(a=>({'기관명':a.jobName,'카테고리':a.category,'서류접수일':a.docDate||'','최종합격발표일':a.finalDate||'','상태':a.status,'급수':a.grade,'발표방식':a.announceType,'메모':a.memo||''})),s.name+'_지원이력');}
/* ── 초기화 ── */
async function init(){setView('dashboard');showLoading();try{await loadAllData();}finally{hideLoading();}setupRealtime();}
init();
</script>
