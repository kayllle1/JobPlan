function parseDocMonth(dateStr){
  if(!dateStr)return'';
  var s=String(dateStr).trim();
  var m=s.match(/(\d{4})[-.\\/л…„\s](\d{1,2})/);
  if(m)return m[1]+'-'+('0'+m[2]).slice(-2);
  /* 8мһҗлҰ¬ мҲ«мһҗ YYYYMMDD нҳ•мӢқлҸ„ мІҳлҰ¬ */
  var m2=s.match(/^(\d{4})(\d{2})/);
  if(m2)return m2[1]+'-'+m2[2];
  return'';
}

function parseQsShared(text){
  try{
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    var pat=/^(\d{1,2}[\.\)\s]+|Q[\.\:\s]+|[в‘ -в‘і]\s*)/;
    var qs=[],buf='';
    lines.forEach(function(line){
      if(pat.test(line)){if(buf)qs.push(buf.trim());buf=line.replace(pat,'').trim();}
      else{buf=buf?(buf+' '+line):line;}
    });
    if(buf)qs.push(buf.trim());
    return qs.filter(function(q){return q.length>1;});
  }catch(e){return[];}
}

/* в”Җ мһҗлЈҢмӢӨ к·ёлЈ№нҷ” в”Җ */
function getGroupedVault(){
  try{
    var filtered=VAULT.slice();
    if(vaultFilter!=='м „мІҙ')filtered=filtered.filter(function(v){return v.category===vaultFilter;});
    if(vaultKw.trim()){
      var kw=vaultKw.trim();
      filtered=filtered.filter(function(v){return v.institutionName.indexOf(kw)>=0||v.content.indexOf(kw)>=0;});
    }
    var groupMap={};
    filtered.forEach(function(v){
      var k=v.institutionName||'(кё°кҙҖлӘ… м—ҶмқҢ)';
      if(!groupMap[k])groupMap[k]={institutionName:k,category:v.category,items:[]};
      groupMap[k].items.push(v);
    });
    var groups=Object.values(groupMap);
    groups.forEach(function(g){
      g.items.sort(function(a,b){
        if((b.year||0)!==(a.year||0))return (b.year||0)-(a.year||0);
        return (b.createdAt||'').localeCompare(a.createdAt||'');
      });
      var latest=g.items[0];
      g.category=latest?latest.category:g.category;
    });
    groups.sort(function(a,b){
      var aMax=Math.max.apply(null,a.items.map(function(i){return i.year||0;}));
      var bMax=Math.max.apply(null,b.items.map(function(i){return i.year||0;}));
      if(bMax!==aMax)return bMax-aMax;
      return a.institutionName.localeCompare(b.institutionName);
    });
    return groups;
  }catch(e){console.error('getGroupedVault error',e);customAlert('к·ёлЈ№нҷ” мҳӨлҘҳ: '+(e.message||JSON.stringify(e)));return[];}
}

function getThisWeekInterviews(){
  var result=[],todayMs=new Date(TODAY).getTime(),weekMs=todayMs+7*86400000;
  JOBS.forEach(function(j){
    if(!j.interviewDate)return;
    var d=new Date(String(j.interviewDate).slice(0,10)).getTime();
    if(d>=todayMs&&d<=weekMs){
      j.applicants.filter(function(a){return a.status==='л©ҙм ‘лҢҖкё°';}).forEach(function(a){
        var st=STUDENTS.find(function(s){return s.id===a.studentId;});
        if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category});
      });
    }
  });
  return result;
}
function getLongPendingNoReply(){
  var result=[],todayMs=new Date(TODAY).getTime();
  JOBS.forEach(function(j){
    j.applicants.forEach(function(a){
      if(!a.interviewDocSent)return;
      var sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);

    });
  });
  return result;
}

/* в”Җ CSV лҜёлҰ¬ліҙкё° в”Җ */
function _previewTrCsv(file,previewId){
  if(!file)return;
  var prev=document.getElementById(previewId);if(!prev)return;
  Papa.parse(file,{
    header:true,skipEmptyLines:true,
    complete:function(res){
      var rows=res.data.filter(function(r){return r['мқҙлҰ„']&&r['мқҙлҰ„'].trim();});
      if(!rows.length){
        prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">вқҢ мң нҡЁн•ң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.</span></div>';
        window._trImportRows=null;return;
      }
      window._trImportRows=rows;
      prev.innerHTML='<div style="background:#F0FDF4;border-radius:6px;padding:8px 12px;border:1px solid #BBF7D0;display:flex;align-items:center;gap:8px">'+
        '<span style="font-size:16px">вң…</span>'+
        '<span style="font-size:12px;font-weight:700;color:#065F46">'+rows.length+'лӘ… мқёмӢқ мҷ„лЈҢ вҖ” л“ұлЎқ лІ„нҠјмңјлЎң нҷ•м •н•ҳм„ёмҡ”</span></div>';
    },
    error:function(err){
      prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">вқҢ '+esc(err.message||String(err))+'</span></div>';
    }
  });
}

/* в”Җ мҲҳк°•мғқ мқјкҙ„ Upsert (phone_number ліөн•©нӮӨ) в”Җ */
async function _bulkUpsertParticipants(courseId,rows){
  var allowedStatus=['мҲҳлЈҢ','м§„н–ү мӨ‘','мӨ‘лҸ„нҸ¬кё°'];
  var ok=0,fail=0;
  var slice=rows.slice(0,100);
  for(var i=0;i<slice.length;i++){
    var r=slice[i];
    var status=allowedStatus.includes(r['мғҒнғң'])?r['мғҒнғң']:'м§„н–ү мӨ‘';
    var obj={
      course_id:Number(courseId),
      student_name:(r['мқҙлҰ„']||'').trim(),
      phone_number:(r['нңҙлҢҖм „нҷ”']||'').trim(),
      license_info:(r['мһҗкІ©мҰқ']||'').trim()||null,
      status:status,
      first_test_score:(r['нҠ№мқҙмӮ¬н•ӯ']||'').trim()||null,
      first_test_result:(r['н…ҢмҠӨнҠёнҶөкіјмң л¬ҙ']||'').trim()||null
    };
    if(!obj.student_name)continue;
    var res=obj.phone_number
      ?await SB.from('training_participants').upsert(obj,{onConflict:'course_id,phone_number'})
      :await SB.from('training_participants').insert(obj);
    if(res.error)fail++;else ok++;
  }
  return{ok:ok,fail:fail};
}

/* в”Җ лҲ„м Ғ мҲҳлЈҢмғқ м§‘кі„ (м „мІҙ кё°мҲҳ н•©мӮ°) в”Җ */
function getTrCumulativeStats(){
  /* VOD кё°мҲҳ(type='vod')мҷҖ нҡҢмқҳлЎқ кё°мҲҳ(type='meeting')мқҳ мҲҳлЈҢмғқ мҲҳлҘј к°Ғк°Ғ м§‘кі„ */
  var vodCourseIds=TR_COURSES.filter(function(c){return c.type!=='meeting';}).map(function(c){return c.id;});
  var meetingCourseIds=TR_COURSES.filter(function(c){return c.type==='meeting';}).map(function(c){return c.id;});
  var totalSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='мҲҳлЈҢ';}).length;
  var vodSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='мҲҳлЈҢ'&&vodCourseIds.indexOf(p.course_id)>=0;}).length;
  var meetingSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='мҲҳлЈҢ'&&meetingCourseIds.indexOf(p.course_id)>=0;}).length;
  var totalParticipants=TR_PARTICIPANTS.length;
  return{total:totalSuryo,vod:vodSuryo,meeting:meetingSuryo,participants:totalParticipants,courses:TR_COURSES.length};
}

/* в”Җ кё°мҲҳлі„ м§‘кі„ (м„ нғқ кё°мҲҳл§Ң) в”Җ */
function getTrStats(){
  /* м„ нғқлҗң кё°мҲҳмқҳ мҲҳк°•мғқ нҶөкі„лҘј кі„мӮ°н•©лӢҲлӢӨ */
  var course={total:0,suryo:0,ongoing:0,drop:0,pass:0,fail:0,advanced:0};
  if(trCourseId!=null){
    var cp=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
    course.total=cp.length;
    course.suryo=cp.filter(function(p){return p.status==='мҲҳлЈҢ';}).length;
    course.ongoing=cp.filter(function(p){return p.status==='м§„н–ү мӨ‘';}).length;
    course.drop=cp.filter(function(p){return p.status==='мӨ‘лҸ„нҸ¬кё°';}).length;
    course.pass=cp.filter(function(p){return p.first_test_result==='н•©кІ©';}).length;
    course.fail=cp.filter(function(p){return p.first_test_result==='л¶Ҳн•©кІ©';}).length;
    /* мӢ¬нҷ” лҢҖмғҒмһҗ: мҲҳлЈҢ мҷ„лЈҢ + н…ҢмҠӨнҠё н•©кІ©мқё н•ҷмғқ */
    course.advanced=cp.filter(function(p){return p.status==='мҲҳлЈҢ'&&p.first_test_result==='н•©кІ©';}).length;
  }
  /* л№„мңЁ кі„мӮ° (0мңјлЎң лӮҳлҲ„кё° л°©м§Җ) */
  course.suryoRate=course.total>0?Math.round(course.suryo/course.total*100):0;
  course.passRate=course.total>0?Math.round(course.pass/course.total*100):0;
  course.advRate=course.suryo>0?Math.round(course.advanced/course.suryo*100):0;
  return{course:course};
}

/* в”Җ кё°мҲҳ м „мІҙ мҲҳлЈҢ/м§„н–үмӨ‘ мқјкҙ„ мІҳлҰ¬ в”Җ */

/* в”Җ м—°мҲҳ кҙҖлҰ¬ л©”мқё л·° v7.0 в”Җ */
function renderTraining(){
  /* в”Җв”Җ лҲ„м Ғ нҶөкі„ л°Ҹ кё°мҲҳлі„ м§‘кі„ в”Җв”Җ */
  var cumul=getTrCumulativeStats();   /* м „мІҙ лҲ„м Ғ мҲҳлЈҢмғқ */
  var stats=getTrStats();             /* м„ нғқ кё°мҲҳ нҶөкі„ */
  var curCourse=trCourseId!=null?TR_COURSES.find(function(c){return c.id===trCourseId;}):null;

  /* в”Җв”Җ мҲҳк°•мғқ н•„н„°л§Ғ лЎңм§Ғ в”Җв”Җ
     1) кІҖмғүм–ҙ мһҲмңјл©ҙ м „мІҙ кё°мҲҳм—җм„ң мқҙлҰ„/лІҲнҳё л’·4мһҗлҰ¬ кІҖмғү
     2) кё°мҲҳ м„ нғқ мӢң н•ҙлӢ№ кё°мҲҳ мҲҳк°•мғқл§Ң н‘ңмӢң
     3) мғҒнғң(trStatus) н•„н„° м Ғмҡ©
     4) н…ҢмҠӨнҠёкІ°кіј(trTestFilter) н•„н„° м Ғмҡ©
        - 'advanced' = мҲҳлЈҢ мҷ„лЈҢ + н…ҢмҠӨнҠё н•©кІ©(мӢ¬нҷ” лҢҖмғҒмһҗ)
  */
  var members;
  if(trKw.trim()){
    var kw=trKw.trim();
    members=TR_PARTICIPANTS.filter(function(p){
      return p.student_name.indexOf(kw)>=0||(p.phone_number||'').slice(-4).indexOf(kw)>=0;
    });
  }else if(trCourseId!=null){
    members=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
  }else{
    members=[];
  }
  if(trStatus!=='м „мІҙ')members=members.filter(function(p){return p.status===trStatus;});
  if(trTestFilter==='н•©кІ©')members=members.filter(function(p){return p.first_test_result==='н•©кІ©';});
  else if(trTestFilter==='л¶Ҳн•©кІ©')members=members.filter(function(p){return p.first_test_result==='л¶Ҳн•©кІ©';});
  else if(trTestFilter==='advanced'){
    /* мӢ¬нҷ” лҢҖмғҒмһҗ: мҲҳлЈҢ мҷ„лЈҢ AND н…ҢмҠӨнҠё н•©кІ© */
    members=members.filter(function(p){return p.status==='мҲҳлЈҢ'&&p.first_test_result==='н•©кІ©';});
  }
  window._trCurrentMembers=members; /* м—‘м…Җ лӢӨмҡҙлЎңл“ңмҡ© */

  var visibleIds=members.map(function(p){return p.id;});
  var allInCourse=trCourseId!=null?TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;}):[];

  /* в”Җв”Җ нҶөкі„ м№ҙл“ң л ҢлҚ” н•ЁмҲҳ в”Җв”Җ
     нҒҙлҰӯ мӢң н•ҙлӢ№ н•„н„°лҘј м Ғмҡ©н•ҳкі , нҷңм„ұ м№ҙл“ңлҠ” л°°кІҪмғүмңјлЎң к°•мЎ° н‘ңмӢң
  */
  /* в”Җв”Җ нҶөкі„ м№ҙл“ң л ҢлҚ” н•ЁмҲҳ в”Җв”Җ
     isA(нҷңм„ұ) мғҒнғң: м§„н•ң м»¬лҹ¬ л°°кІҪ мң„м—җ мҲ«мһҗВ·лқјлІЁ лӘЁл‘җ мҲңл°ұ/л°қмқҖ нҡҢмғүмңјлЎң
     л№„нҷңм„ұ мғҒнғң:   нқ° л°°кІҪ мң„м—җ м»¬лҹ¬ н…ҚмҠӨнҠё мӮ¬мҡ©
  в”Җв”Җ */
  function sc(icon,label,val,pct,sub,c,bg,filterType,filterVal){
    var isA=(filterType==='status')?(trTestFilter===''&&trStatus===filterVal)
              :(filterType==='test')?trTestFilter===filterVal:false;
    var clickFn=(filterType==='status')?"setTrStatus('"+filterVal+"')"
                :(filterType==='test')?"setTrTestFilter('"+filterVal+"')":'';
    /* нҷңм„ұ м№ҙл“ң н…ҚмҠӨнҠё мғүмғҒ вҖ” л°°кІҪмқҙ м§„н•ң м»¬лҹ¬мқҙлҜҖлЎң мөңлҢҖ лҢҖл№„ */

    var aSuffix='#E2E8F0'; /* л°қмқҖ нҡҢмғү: лӘ…/% лӢЁмң„ */
    var aSub  ='#E2E8F0';  /* л°қмқҖ нҡҢмғү: ліҙмЎ° м„ӨлӘ… */
    return'<div onclick="'+clickFn+'" style="'+
      'background:'+(isA?c:'#fff')+';'+
      'border:2px solid '+(isA?c:c+'33')+';'+
      'border-radius:10px;padding:10px 14px;flex:1;min-width:85px;max-width:145px;'+
      'cursor:'+(clickFn?'pointer':'default')+';transition:all .12s;user-select:none">'+
      '<p style="margin:0;font-size:10px;color:'+(isA?aLabel:c)+';font-weight:700;white-space:nowrap">'+icon+' '+label+'</p>'+
      '<p style="margin:3px 0 1px;font-size:21px;font-weight:900;color:'+(isA?aNum:'#0F172A')+';line-height:1">'+val+
      '<span style="font-size:10px;color:'+(isA?aSuffix:'#94A3B8')+';font-weight:400;margin-left:2px">лӘ…</span></p>'+
      /* л°ұл¶„мңЁ(%) мһҗлҸҷ н‘ңмӢң */
      (pct!==null?'<p style="margin:1px 0 0;font-size:11px;font-weight:800;color:'+(isA?aNum:c)+'">'+pct+'%</p>':'')+
      (sub?'<p style="margin:0;font-size:9px;color:'+(isA?aSub:c)+';font-weight:600">'+sub+'</p>':'')+
      '</div>';
  }

  /* в”Җв”Җ 7мў… нҶөкі„ м№ҙл“ң (кё°мҲҳ м„ нғқ мӢңл§Ң н‘ңмӢң) в”Җв”Җ */
  var statsHtml=trCourseId!=null?
    '<div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:stretch">'+
    '<div style="background:#1E293B;border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;justify-content:center;min-width:100px;flex-shrink:0">'+
    '<p style="margin:0;font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.08em">м„ нғқ кё°мҲҳ</p>'+
    '<p style="margin:4px 0 0;font-size:12px;font-weight:800;color:#E2E8F0;line-height:1.3">'+esc((curCourse?curCourse.course_name:'').slice(0,12))+'</p>'+
    (curCourse?'<p style="margin:3px 0 0;font-size:10px;color:#475569">'+(curCourse.type==='meeting'?'рҹ“қ нҡҢмқҳлЎқ':'рҹҺҘ VOD')+'</p>':'')+
    '</div>'+

/* в”Җ лё”лһҷлҰ¬мҠӨнҠё мӢңмҠӨн…ң в”Җ */
function getBlacklistCandidates(){
  var todayMs=new Date(TODAY).getTime();
  var result=[];
  JOBS.forEach(function(j){
    j.applicants.forEach(function(ap){
      if(!ap.interviewDocSent)return;
      var sentMs=new Date(String(ap.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&(ap.interviewFeedback||'').indexOf('нҡҢмӢ мҷ„лЈҢ')<0){
        var st=STUDENTS.find(function(s){return s.id===ap.studentId;});
        if(st&&st.restrictionLevel!=='м ңн•ң'){
          result.push({student:st,ap:ap,job:j,daysDiff:diff});
        }
      }
    });
  });
  return result;
}

function deleteStudent(id){customConfirm('н•ҷмғқмқ„ мӮӯм ңн•ҳл©ҙ кҙҖл Ё м§Җмӣҗмқҙл ҘлҸ„ н•Ёк»ҳ мӮӯм ңлҗ©лӢҲлӢӨ.\nкі„мҶҚн•ҳмӢңкІ мҠөлӢҲк№Ң?',async function(){var r=await SB.from('students').delete().eq('id',id);if(r.error){customAlert('мӮӯм ң мҳӨлҘҳ: '+r.error.message);return;}await loadAllData();},'мӮӯм ң','#DC2626');}

sform:uppercase;letter-spacing:.06em">рҹ“… м§Җмӣҗ нғҖмһ„лқјмқё В· кё°кҙҖлӘ… нҒҙлҰӯ мӢң кіөкі  мғҒм„ё нҶ кёҖ</p><div style="padding-left:4px">'+tlRows+'</div><div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6;gap:8px;flex-wrap:wrap">'+btn('рҹ“Ҙ CSV лӮҙліҙлӮҙкё°','exportHistory('+studentId+')','success')+' '+btn('вңҸ н•ҷмғқ мҲҳм •','closeModal();openEditStudentModal('+studentId+')','outline')+'</div>'+getTrHistoryHtml(s.phone||''),'660px');}

function exportStudents(){var filtered=filterStudents();csvExport(filtered.map(function(s,i){var apps=getApps(s.id),st=getStudentStatus(s.id);return{'No':i+1,'мқҙлҰ„':s.name,'мғҒнғң':st.label,'л“ұкёүм ңн•ң':s.restrictionLevel||'м—ҶмқҢ','лӮҳмқҙ':s.age||'лҜёл“ұлЎқ','м—°лқҪмІҳ':s.phone,'мқҙл©”мқј':s.email,'м§ҖмӣҗнҡҹмҲҳ':apps.length,'мөңмў…н•©кІ©':apps.filter(function(a){return a.status==='мөңмў…н•©кІ©'||a.status==='м·Ём—…м„ұкіө';}).length,'мғҒлӢҙл©”лӘЁ':s.counselingMemo||''};}),'н•ҷмғқDB_v75');}
function exportHistory(studentId){var s=STUDENTS.find(function(st){return st.id===studentId;});if(!s)return;csvExport(getApps(studentId).map(function(a){return{'кё°кҙҖлӘ…':a.jobName,'м№ҙн…Ңкі лҰ¬':a.category,'м„ңлҘҳм ‘мҲҳмқј':a.docDate||'','мөңмў…н•©кІ©л°ңн‘ңмқј':a.finalDate||'','мғҒнғң':a.status,'кёүмҲҳ':a.grade,'л°ңн‘ңл°©мӢқ':a.announceType,'л©”лӘЁ':a.memo||''};}),s.name+'_м§Җмӣҗмқҙл Ҙ');}
/* в”Җ renderView / setView / init в”Җ */
function renderView(){
  _saveScrollPositions();
  var focusedId=document.activeElement?document.activeElement.id:null;
  var cursorPos=(document.activeElement&&typeof document.activeElement.selectionStart==='number')?document.activeElement.selectionStart:null;
  var main=$('_main');if(!main)return;
  try{
    if(currentView==='dashboard')main.innerHTML=renderDashboard();
    else if(currentView==='jobs')main.innerHTML=renderJobs();
    else if(currentView==='students')main.innerHTML=renderStudents();
    else if(currentView==='employment')main.innerHTML=renderEmployment();
    else if(currentView==='interview')main.innerHTML=renderInterviewRoom();
    else if(currentView==='blacklist')main.innerHTML=renderBlacklist();
    else if(currentView==='training')main.innerHTML=renderTraining();
  }catch(e){console.error('renderView error',e);main.innerHTML='<div style="padding:40px;text-align:center;color:#DC2626">л ҢлҚ”л§Ғ мҳӨлҘҳ: '+(e.message||String(e))+'</div>';}
  var sb=$('_sidebar');if(sb)sb.outerHTML=renderSidebar();
  _restoreScrollPositions();
  var searchIds=['jobSearchInput','studentSearchInput','vaultSearchInput','trSearchInput'];
  if(focusedId&&searchIds.indexOf(focusedId)>=0){requestAnimationFrame(function(){var el=$(focusedId);if(el){el.focus();if(cursorPos!==null){try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}}}});}
}
function setView(v){
  _savedScrollTop=0;_savedTblScrollTop=0;currentView=v;$('app').innerHTML=renderSidebar()+'<main id="_main" style="flex:1;overflow:hidden;background:#F0F2F5;display:flex;flex-direction:column;min-height:0"></main>';renderView();
}
async function init(){
  /* лЎңк·ёмқё м—Ҷмқҙ л°”лЎң лҢҖмӢңліҙл“ң м§„мһ… */
  setView('dashboard');
  showLoading();
  try{await loadAllData();}finally{hideLoading();}
  setupRealtime();
}
init();
