function getKSTDateString(){const n=new Date();return new Date(n.getTime()+9*3600000).toISOString().slice(0,10);}

const CAT_COLORS={'법원':'#1D4ED8','의회':'#7C3AED','검찰청':'#DC2626','공공기관':'#059669','해바라기':'#D97706','팀벨':'#0891B2','사기업':'#374151','대학교':'#9333EA','기타':'#6B7280'};

let currentView='dashboard', expandedJobs=new Set(), detailJobs=new Set();

/* ══ IME 핸들러 ══ */
let _jobComposing=false,_stuComposing=false,_jobDT=null,_stuDT=null;
function onJobCompositionStart(){_jobComposing=true;clearTimeout(_jobDT);}
function onJobCompositionEnd(el){_jobComposing=false;clearTimeout(_jobDT);const v=el.value;_jobDT=setTimeout(()=>{jobFilter.kw=v;renderView();},0);}
function onJobInput(el){if(_jobComposing)return;clearTimeout(_jobDT);const v=el.value;_jobDT=setTimeout(()=>{jobFilter.kw=v;renderView();},200);}
function onStuCompositionStart(){_stuComposing=true;clearTimeout(_stuDT);}
function onStuCompositionEnd(el){_stuComposing=false;clearTimeout(_stuDT);const v=el.value;_stuDT=setTimeout(()=>{studentFilter.kw=v;renderView();},0);}
function onStuInput(el){if(_stuComposing)return;clearTimeout(_stuDT);const v=el.value;_stuDT=setTimeout(()=>{studentFilter.kw=v;renderView();},200);}
function setJobCat(v){jobFilter.cat=v;renderView();}
function setJobType(v){jobFilter.type=v;renderView();}
function setJobYear(v){jobFilter.year=v;renderView();}
function setJobDateFrom(v){jobFilter.dateFrom=v;renderView();}
function setJobDateTo(v){jobFilter.dateTo=v;renderView();}
function onStudentGradeChange(v){studentFilter.grade=v;renderView();}
function setStudentStatusTab(tab){studentFilter.statusTab=tab;renderView();}

/* ══ 유틸 ══ */
const fmt=d=>d?String(d).replace(/-/g,'.'):'';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dateOrNull=v=>(v&&String(v).trim())?v:null;
function calcDDay(ds){if(!ds)return null;const s=String(ds).slice(0,10);const[y,mo,da]=s.split('-').map(Number);const[ty,tm,td]=TODAY.split('-').map(Number);return Math.round((new Date(y,mo-1,da)-new Date(ty,tm-1,td))/86400000);}
function isTrulyOver(job){if(job.isClosed)return true;if(job.finalDate&&String(job.finalDate).slice(0,10)>=TODAY)return false;if(job.interviewDate&&String(job.interviewDate).slice(0,10)>=TODAY)return false;const dl=job.applyDeadline||job.docDate;return !!(dl&&String(dl).slice(0,10)<TODAY);}
function dDayBadge(dateStr,closed){
  if(closed)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB">마감됨</span>`;
  const d=calcDDay(dateStr);if(d===null)return'';
  if(d<0)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB">기간만료</span>`;
  if(d===0)return`<span style="background:#FEE2E2;color:#DC2626;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA">🔴 D-DAY</span>`;
  if(d<=3)return`<span style="background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA">D-${d}</span>`;
  if(d<=7)return`<span style="background:#FEF3C7;color:#D97706;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #FDE68A">D-${d}</span>`;
  return`<span style="background:#DBEAFE;color:#1D4ED8;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #BFDBFE">D-${d}</span>`;
}
function csvExport(data,name){if(!data||!data.length)return;const hdrs=Object.keys(data[0]);const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));const csv=[hdrs.join(','),...rows].join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();URL.revokeObjectURL(url);}
function getApps(sid){return JOBS.flatMap(j=>j.applicants.filter(a=>a.studentId===sid).map(a=>({...a,jobName:j.name,category:j.category,docDate:j.docDate,finalDate:j.finalDate,interviewDate:j.interviewDate})));}

/* ══ 학생 상태/등급 ══ */
function getStudentStatus(sid){
  const apps=getApps(sid);
  if(!apps.length)return{label:'지원가능',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
  if(apps.some(a=>a.status==='최종합격'||a.status==='취업성공'))return{label:'취업완료',color:'#1D4ED8',bg:'#DBEAFE',border:'#93C5FD'};
  if(apps.some(a=>!['최종합격','취업성공','불합격'].includes(a.status)))return{label:'진행중',color:'#D97706',bg:'#FEF3C7',border:'#FDE68A'};
  return{label:'지원가능',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
}
function getRestrictionBadge(student){
  if(!student.restrictionLevel)return'';
  if(student.restrictionLevel==='제한')return`<span style="background:#DC2626;color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:3px;vertical-align:middle;flex-shrink:0">🚫 제한</span>`;
  if(student.restrictionLevel==='주의')return`<span style="background:#FEF3C7;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;border:1px solid #FDE68A;display:inline-flex;align-items:center;gap:3px;vertical-align:middle;flex-shrink:0">⚠️ 주의</span>`;
  return'';
}
function filterStudents(){
  const kw=studentFilter.kw.trim();
  return STUDENTS.filter(s=>{
    if(kw&&!s.name.includes(kw)&&!(s.phone||'').includes(kw)&&!(s.email||'').includes(kw))return false;
    if(studentFilter.grade!=='전체'&&!getApps(s.id).some(a=>a.grade===studentFilter.grade))return false;
    if(studentFilter.statusTab!=='전체'){const st=getStudentStatus(s.id);if(st.label!==studentFilter.statusTab)return false;}
    return true;
  });
}

/* ══ 스마트 알림 ══ */
function getThisWeekInterviews(){
  const result=[];const todayMs=new Date(TODAY).getTime();const weekMs=todayMs+7*86400000;
  JOBS.forEach(j=>{if(!j.interviewDate)return;const d=new Date(String(j.interviewDate).slice(0,10)).getTime();if(d>=todayMs&&d<=weekMs){j.applicants.filter(a=>a.status==='면접대기').forEach(a=>{const st=STUDENTS.find(s=>s.id===a.studentId);if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category,studentId:st.id});});}});
  return result;
}
function getLongPendingNoReply(){
  const result=[];const todayMs=new Date(TODAY).getTime();
  JOBS.forEach(j=>{j.applicants.forEach(a=>{if(!a.interviewDocSent)return;const sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();const diff=Math.round((todayMs-sentMs)/86400000);if(diff>=7&&!(a.interviewFeedback||'').includes('회신완료')){const st=STUDENTS.find(s=>s.id===a.studentId);if(st)result.push({studentName:st.name,jobName:j.name,sentDate:a.interviewDocSent,daysDiff:diff,studentId:st.id});}});});
  return result;
}

/* ══ 퀵 메모 ══ */
function appendMemoText(fieldId,prefix){
  const el=$(fieldId);if(!el)return;
  const now=new Date(new Date().getTime()+9*3600000);
  const ds=now.toISOString().slice(0,10);const ts=now.toISOString().slice(11,16);
  const text=`${prefix} ${ds} ${ts}`;
  el.value=el.value?(el.value+'\n'+text):text;el.focus();
}
function quickMemoButtons(fieldId){
  const btns=[{l:'📤 자료발송',p:'[자료발송]'},{l:'📣 회신당부',p:'[회신당부]'},{l:'📵 연락두절',p:'[연락두절]'},{l:'✅ 회신완료',p:'[회신완료]'}];
  return`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">${btns.map(b=>`<button type="button" onclick="appendMemoText('${fieldId}','${b.p}')" style="background:#F1F5F9;color:#374151;border:1px solid #E2E8F0;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;font-family:inherit">${b.l}</button>`).join('')}</div>`;
}
/* ══ DB 변환 ══ */
function dbToStudent(r){return{id:r.id,name:r.name,age:r.age,phone:r.phone||'',email:r.email||'',counselingMemo:r.counseling_memo||'',isWarning:!!r.is_warning,restrictionLevel:r.restriction_level||null};}
function dbToJob(r){return{id:r.id,name:r.name,category:r.category||'기타',type:r.type||'',isRec:!!r.is_rec,isReA:!!r.is_rea,isClosed:!!r.is_closed,applyStartDate:r.apply_start_date||'',applyDeadline:r.apply_deadline||'',documentPassDate:r.document_pass_date||'',jobUrl:r.job_url||'',docDate:r.doc_date||'',interviewDate:r.interview_date||'',finalDate:r.final_date||'',startDate:r.start_date||'',endDate:r.end_date||'',note:r.note||'',submitDocs:r.submit_docs||'',submitDeadline:r.submit_deadline||'',managerName:r.manager_name||'',managerPhone:r.manager_phone||'',managerEmail:r.manager_email||'',createdAt:r.created_at||'',applicants:[]};}
function dbToApplicant(r){return{id:r.id,jobId:r.job_id,studentId:r.student_id,status:r.status||'서류접수',grade:r.grade||'3급',announceType:r.announce_type||'홈페이지',memo:r.memo||'',examNumber:r.exam_number||'',interviewDocSent:r.interview_doc_sent||'',interviewFeedback:r.interview_feedback||''};}

/* ══ 데이터 로드 / 실시간 ══ */
async function loadAllData(){
  try{
    const[{data:sd},{data:jd},{data:ad}]=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*')
    ]);
    STUDENTS=(sd||[]).map(dbToStudent);
    const jobs=(jd||[]).map(dbToJob);
    const aps=(ad||[]).map(dbToApplicant);
    JOBS=jobs.map(j=>({...j,applicants:aps.filter(a=>a.jobId===j.id)}));
    renderView();
  }catch(err){console.error(err);customAlert('데이터 로드 중 오류가 발생했습니다.');}
}
function scheduleReload(){clearTimeout(_reloadTimer);_reloadTimer=setTimeout(loadAllData,500);}
function setupRealtime(){
  SB.channel('jobms-v70')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'applicants'},scheduleReload)
    .subscribe();
}

/* ══ 모달 공통 ══ */
function customAlert(msg){return new Promise(res=>{const d=document.createElement('div');d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999';d.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center"><p style="font-size:14px;color:#1E293B;line-height:1.6;white-space:pre-wrap">${esc(msg)}</p><button onclick="this.closest('div[style]').remove();arguments[0].stopPropagation();" style="margin-top:18px;background:#2563EB;color:#fff;border:none;padding:9px 28px;border-radius:8px;font-size:13px;font-weight:600" onclick="this.parentElement.parentElement.remove()">확인</button></div>`;d.querySelector('button').addEventListener('click',()=>{d.remove();res();});document.body.appendChild(d);});}
function customConfirm(msg){return new Promise(res=>{const d=document.createElement('div');d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999';d.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center"><p style="font-size:14px;color:#1E293B;line-height:1.6;white-space:pre-wrap">${esc(msg)}</p><div style="display:flex;gap:10px;justify-content:center;margin-top:18px"><button id="_cfy" style="background:#2563EB;color:#fff;border:none;padding:9px 28px;border-radius:8px;font-size:13px;font-weight:600">확인</button><button id="_cfn" style="background:#F1F5F9;color:#374151;border:1px solid #E2E8F0;padding:9px 28px;border-radius:8px;font-size:13px;font-weight:600">취소</button></div></div>`;d.querySelector('#_cfy').addEventListener('click',()=>{d.remove();res(true);});d.querySelector('#_cfn').addEventListener('click',()=>{d.remove();res(false);});document.body.appendChild(d);});}
function showModal(html){const d=document.createElement('div');d.id='_modal_wrap';d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px';d.innerHTML=html;d.addEventListener('click',e=>{if(e.target===d)closeModal();});document.body.appendChild(d);return d;}
function closeModal(){const m=$('_modal_wrap');if(m)m.remove();}

function mField(label,content,required=false){return`<div style="margin-bottom:13px"><label style="display:block;font-size:11px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">${label}${required?'<span style="color:#EF4444;margin-left:2px">*</span>':''}</label>${content}</div>`;}
function mInput(id,value='',placeholder='',type='text'){return`<input id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}" style="width:100%;padding:8px 11px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;color:#1E293B;background:#FAFAFA;outline:none">`;}
function mSelect(id,options,value=''){return`<select id="${id}" style="width:100%;padding:8px 11px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;color:#1E293B;background:#FAFAFA">${options.map(o=>`<option value="${esc(o)}"${o===value?' selected':''}>${esc(o)}</option>`).join('')}</select>`;}
function mTextarea(id,value='',rows=3,placeholder=''){return`<textarea id="${id}" rows="${rows}" placeholder="${esc(placeholder)}" style="width:100%;padding:8px 11px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;color:#1E293B;background:#FAFAFA;resize:vertical">${esc(value)}</textarea>`;}
function mDateInput(id,value=''){return`<input id="${id}" type="date" value="${esc(value)}" style="width:100%;padding:8px 11px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;color:#1E293B;background:#FAFAFA">`;}
function mModalBox(title,body,footer){return`<div style="background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.2)"><div style="padding:20px 24px 16px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1"><h3 style="font-size:16px;font-weight:800;color:#1E293B">${title}</h3><button onclick="closeModal()" style="background:#F1F5F9;border:none;width:32px;height:32px;border-radius:8px;font-size:18px;color:#94A3B8;display:flex;align-items:center;justify-content:center">✕</button></div><div style="padding:20px 24px">${body}</div>${footer?`<div style="padding:14px 24px;border-top:1px solid #F3F4F6;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff">${footer}</div>`:''}</div>`;}
/* ══ 스마트 알림 렌더 ══ */
function renderSmartAlerts(){
  const interviews=getThisWeekInterviews();
  const noReply=getLongPendingNoReply();
  if(!interviews.length&&!noReply.length)return'';
  const ivHtml=interviews.length?`<div style="background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:12px 14px"><div style="font-size:11px;font-weight:800;color:#7C3AED;margin-bottom:8px">📅 이번 주 면접 예정자 (${interviews.length}명)</div>${interviews.map(i=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #EDE9FE"><span style="font-size:12px;font-weight:700;color:#1E293B">${esc(i.studentName)}</span><span style="font-size:10px;color:#7C3AED;background:#EDE9FE;padding:1px 6px;border-radius:4px">${esc(i.category)}</span><span style="margin-left:auto;font-size:11px;color:#6B7280">${fmt(i.interviewDate)}</span></div>`).join('')}</div>`:'';

/* ══ 취업현황 집계 ══ */
function getEmpData(){
  const rows=[];
  STUDENTS.forEach(s=>{
    const apps=getApps(s.id).filter(a=>a.status==='최종합격'||a.status==='취업성공');
    apps.forEach(a=>{
      const job=JOBS.find(j=>j.id===a.jobId);if(!job)return;
      const yr=(job.finalDate||job.docDate||'').slice(0,4);
      if(!yr)return;
      rows.push({studentId:s.id,studentName:s.name,age:s.age,jobName:job.name,category:job.category,type:job.type,grade:a.grade,finalDate:job.finalDate,docDate:job.docDate,year:yr,jobId:job.id});
    });
  });
  rows.sort((a,b)=>(b.finalDate||b.docDate||'').localeCompare(a.finalDate||a.docDate||''));
  return rows;
}

/* ══ 인포그래픽 ══ */
function buildStageBar(){
  const counts={};STATUSES.forEach(s=>counts[s]=0);
  JOBS.forEach(j=>j.applicants.forEach(a=>{if(counts[a.status]!==undefined)counts[a.status]++;}));
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const segments=STATUSES.map(s=>{const pct=Math.round(counts[s]/total*100);return pct>0?`<div title="${s}: ${counts[s]}명" style="height:100%;width:${pct}%;background:${STATUS_COLORS[s]||'#94A3B8'};display:flex;align-items:center;justify-content:center;overflow:hidden;transition:width .4s"><span style="font-size:9px;color:#fff;font-weight:800;white-space:nowrap;opacity:${pct>5?1:0}">${counts[s]}</span></div>`:''}).join('');
  const legend=STATUSES.filter(s=>counts[s]>0).map(s=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${STATUS_COLORS[s]||'#94A3B8'};flex-shrink:0"></div><span style="font-size:10px;color:#64748B">${s} <strong style="color:#1E293B">${counts[s]}</strong></span></div>`).join('');
  return`<div style="height:28px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:8px">${segments}</div><div style="display:flex;flex-wrap:wrap;gap:8px">${legend}</div>`;
}
function buildAgeBar(){
  const emp=getEmpData();
  const buckets={'20대':0,'30대':0,'40대':0,'50대이상':0};
  emp.forEach(r=>{const a=Number(r.age||0);if(a<30)buckets['20대']++;else if(a<40)buckets['30대']++;else if(a<50)buckets['40대']++;else buckets['50대이상']++;});
  const total=Object.values(buckets).reduce((a,b)=>a+b,0)||1;
  const CLRS={'20대':'#60A5FA','30대':'#34D399','40대':'#FBBF24','50대이상':'#F87171'};
  const segments=Object.entries(buckets).map(([k,v])=>{const pct=Math.round(v/total*100);return pct>0?`<div title="${k}: ${v}명" style="height:100%;width:${pct}%;background:${CLRS[k]};display:flex;align-items:center;justify-content:center;overflow:hidden"><span style="font-size:9px;color:#fff;font-weight:800;opacity:${pct>5?1:0}">${v}</span></div>`:''}).join('');
  const legend=Object.entries(buckets).filter(([,v])=>v>0).map(([k,v])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${CLRS[k]};flex-shrink:0"></div><span style="font-size:10px;color:#64748B">${k} <strong style="color:#1E293B">${v}</strong></span></div>`).join('');
  return`<div style="height:28px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:8px">${segments}</div><div style="display:flex;flex-wrap:wrap;gap:8px">${legend}</div>`;
}

/* ══ 공고 관리 ══ */
function getFilteredJobs(){
  return JOBS.filter(j=>{
    if(jobFilter.cat!=='전체'&&j.category!==jobFilter.cat)return false;
    if(jobFilter.type!=='전체'&&j.type!==jobFilter.type)return false;
    if(jobFilter.year&&!(j.docDate||j.finalDate||j.applyDeadline||'').startsWith(jobFilter.year))return false;
    if(jobFilter.kw&&!j.name.includes(jobFilter.kw)&&!j.note.includes(jobFilter.kw))return false;
    if(jobFilter.dateFrom){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl<jobFilter.dateFrom)return false;}
    if(jobFilter.dateTo){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl>jobFilter.dateTo)return false;}
    return true;
  }).sort((a,b)=>{
    if(a.isClosed!==b.isClosed)return a.isClosed?1:-1;
    const da=a.finalDate||a.interviewDate||a.applyDeadline||a.docDate||'';
    const db=b.finalDate||b.interviewDate||b.applyDeadline||b.docDate||'';
    return da.localeCompare(db);
  });
}

async function saveJob(jobId){
  const name=($('jm_name')?.value||'').trim();if(!name)return customAlert('기관명을 입력하세요.');
  const data={name,category:$('jm_cat')?.value||'기타',type:$('jm_type')?.value||'한시임기제',is_closed:!!$('jm_closed')?.checked,is_rec:!!$('jm_rec')?.checked,is_rea:!!$('jm_rea')?.checked,apply_start_date:dateOrNull($('jm_applyStart')?.value),apply_deadline:dateOrNull($('jm_deadline')?.value),doc_date:dateOrNull($('jm_docDate')?.value),submit_deadline:dateOrNull($('jm_submitDl')?.value),interview_date:dateOrNull($('jm_ivDate')?.value),final_date:dateOrNull($('jm_finalDate')?.value),start_date:dateOrNull($('jm_start')?.value),end_date:dateOrNull($('jm_end')?.value),job_url:$('jm_url')?.value||'',submit_docs:$('jm_submitDocs')?.value||'',manager_name:$('jm_mgrName')?.value||'',manager_phone:$('jm_mgrPhone')?.value||'',manager_email:$('jm_mgrEmail')?.value||'',note:$('jm_note')?.value||''};
  try{
    if(jobId){const{error}=await SB.from('jobs').update(data).eq('id',jobId);if(error)throw error;}
    else{const{error}=await SB.from('jobs').insert(data);if(error)throw error;}
    closeModal();await loadAllData();
  }catch(e){customAlert('저장 오류: '+e.message);}

function showMonthlyReport(){
  const emp=getEmpData().filter(r=>r.year===selectedMonth.slice(0,4)&&(r.finalDate||r.docDate||'').startsWith(selectedMonth));
  const allAps=JOBS.flatMap(j=>j.applicants);
  const stageCount={};STATUSES.forEach(s=>stageCount[s]=0);allAps.forEach(a=>{if(stageCount[a.status]!==undefined)stageCount[a.status]++;});
  const lines=[`📊 [${selectedMonth} 취업 월간 보고서]`,``,`✅ 취업 성사: ${emp.length}명`,emp.map(r=>`  · ${r.studentName} → ${r.jobName} (${r.category})`).join('\n'),``,`📋 전체 지원 현황 (누적)`,STATUSES.filter(s=>stageCount[s]>0).map(s=>`  · ${s}: ${stageCount[s]}건`).join('\n'),``,`👥 총 등록 학생: ${STUDENTS.length}명`,`📋 총 공고: ${JOBS.length}건`,``,`생성일시: ${TODAY}`];
  const text=lines.join('\n');
  const body=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><input type="month" id="rpt_month" value="${selectedMonth}" onchange="selectedMonth=this.value;$('rpt_txt').value=buildReportText(this.value)" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px"><button onclick="copyReportText()" style="background:#7C3AED;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700">📋 복사</button></div><textarea id="rpt_txt" rows="18" readonly style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;color:#1E293B;background:#F8FAFC;font-family:monospace;resize:none;line-height:1.7">${esc(text)}</textarea>`;
  showModal(mModalBox('📊 월간 보고서',body,`<button onclick="closeModal()" style="background:#F1F5F9;color:#374151;border:1px solid #E2E8F0;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600">닫기</button>`));
}
function copyReportText(){const el=$('rpt_txt');if(!el)return;navigator.clipboard.writeText(el.value).then(()=>customAlert('보고서가 복사되었습니다.')).catch(()=>{el.select();document.execCommand('copy');customAlert('복사되었습니다.');});}

/* ══ 초기화 ══ */
async function init(){
  $('app').innerHTML=`<div style="width:100%;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="width:36px;height:36px;border:4px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin 1s linear infinite"></div><div style="font-size:13px;color:#94A3B8;font-weight:600">JobMS v7.0 로딩 중...</div></div>`;
  await loadAllData();
  setupRealtime();
}
init();
</script>
