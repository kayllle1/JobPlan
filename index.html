          +'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
          +[['공고',totalJobCount+'건','#1D4ED8','#EFF6FF','#BFDBFE'],['지원자',totalAps+'명','#7C3AED','#F5F3FF','#DDD6FE'],['합격',totalPass+'명','#059669','#F0FDF4','#BBF7D0'],['합격률',overallRate+'%','#D97706','#FFFBEB','#FDE68A']].map(function(x){
            return'<div style="background:'+x[3]+';border:1px solid '+x[4]+';padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;color:'+x[2]+'"><span style="opacity:.7">'+x[0]+' </span>'+x[1]+'</div>';
          }).join('')
        +'</div>'
      +'</div>'
      /* 추천/지원 토글 + 날짜 조회 */
      +'<div style="padding:0 16px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<div style="display:flex;gap:5px;background:#F8FAFC;padding:4px;border-radius:11px;border:1px solid #E5E7EB">'+typeTabs+'</div>'
        +'<div style="flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:'+(hasFilter?'#F5F3FF':'#F8FAFC')+';border:1.5px solid '+(hasFilter?'#C4B5FD':'#E5E7EB')+';border-radius:10px;padding:6px 12px">'

          +'<input id="_nat_from" type="date" value="'+fFrom+'" onkeydown="if(event.key===\'Enter\')_natQuery()" style="border:1px solid '+(hasFilter?'#C4B5FD':'#E2E8F0')+';border-radius:7px;padding:4px 9px;font-size:12px;font-family:inherit;outline:none;color:#1F2937;background:#fff">'
          +'<span style="color:#CBD5E1;font-weight:700">—</span>'
          +'<input id="_nat_to" type="date" value="'+fTo+'" onkeydown="if(event.key===\'Enter\')_natQuery()" style="border:1px solid '+(hasFilter?'#C4B5FD':'#E2E8F0')+';border-radius:7px;padding:4px 9px;font-size:12px;font-family:inherit;outline:none;color:#1F2937;background:#fff">'
          +'<button onclick="_natQuery()" style="background:linear-gradient(135deg,#2563EB,#1E3A8A);color:#fff;border:none;padding:5px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">🔍 조회</button>'
          +(hasFilter?'<button onclick="_natReset()" style="background:#FFF5F5;color:#EF4444;border:1px solid #FEE2E2;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">✕ 초기화</button>':'')
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div style="flex:1;min-height:0;display:flex;overflow:hidden">'
      +'<div id="_nat_tbl" style="flex:1;min-width:0;overflow-y:auto;background:#fff;border-right:1px solid #E5E7EB">'
        +(totalJobCount===0
          ?'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:40px"><div style="font-size:36px">🔍</div><div style="font-size:14px;font-weight:700;color:#374151">해당 조건 공고 없음</div><button onclick="_natReset()" style="background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px">초기화 · 전체 보기</button></div>'
          :'<table style="width:100%;border-collapse:collapse">'
            +'<thead><tr style="background:#F8FAFC;border-bottom:2px solid #E5E7EB;position:sticky;top:0;z-index:1">'
              +'<th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.05em;white-space:nowrap">지역</th>'
              +'<th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.05em">공고수</th>'
              +'<th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.05em">지원자</th>'
              +'<th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.05em">합격</th>'
              +'<th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.05em">합격률</th>'
            +'</tr></thead>'

        +panelHtml

/* ── 인텔리전트 보드: SVG 지도 불필요 — 빈 stub 유지 ── */
function initNationalSVGMap(){
  /* 슬라이드 패널 애니메이션 */
  var panel=document.getElementById('_map_slide');
  if(panel){setTimeout(function(){panel.style.transform='translateX(0)';},30);}
}

function renderView(){
  _saveScrollPositions();
  var focusedId=document.activeElement?document.activeElement.id:null;
  var cursorPos=(document.activeElement&&typeof document.activeElement.selectionStart==='number')?document.activeElement.selectionStart:null;
  var main=$('_main');if(!main)return;
  try{
    if(currentView==='dashboard'){main.innerHTML=renderDashboard();setTimeout(initDashAnimations,60);}
    else if(currentView==='calendar')main.innerHTML=renderCalendar();
    else if(currentView==='insights')main.innerHTML=renderInsights();
    else if(currentView==='national'){main.innerHTML=renderNationalStatus();setTimeout(initNationalSVGMap,60);}
    else if(currentView==='jobs')main.innerHTML=renderJobs();
    else if(currentView==='students')main.innerHTML=renderStudents();
    else if(currentView==='employment')main.innerHTML=renderEmployment();
    else if(currentView==='interview')main.innerHTML=renderInterviewRoom();
    else if(currentView==='employers')main.innerHTML=renderEmployerDB();
    else if(currentView==='blacklist')main.innerHTML=renderBlacklist();
    else if(currentView==='favorites')main.innerHTML=renderFavorites();
    else if(currentView==='training')main.innerHTML=renderTraining();
  }catch(e){console.error('renderView error',e);main.innerHTML='<div style="padding:40px;text-align:center;color:#DC2626">렌더링 오류: '+(e.message||String(e))+'</div>';}
  var sb=$('_sidebar');if(sb)sb.outerHTML=renderSidebar();
  _restoreScrollPositions();
  var searchIds=['jobSearchInput','studentSearchInput','vaultSearchInput','trSearchInput'];
  if(focusedId&&searchIds.indexOf(focusedId)>=0){requestAnimationFrame(function(){var el=$(focusedId);if(el){el.focus();if(cursorPos!==null){try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}}}});}
}
function setView(v){
  /* 스태프 접근 제한 */
  if(isStaff2()&&STAFF2_VIEWS.indexOf(v)<0)v='training';
  else if(isStaff()&&!isStaff2()&&STAFF_VIEWS.indexOf(v)<0)v='dashboard';
  _savedScrollTop=0;_savedTblScrollTop=0;currentView=v;
  $('app').innerHTML=renderSidebar()+'<main id="_main" style="flex:1;overflow:hidden;background:#FAFAF9;color:#0F172A;display:flex;flex-direction:column;min-height:0"></main>';
  renderView();
}

/* ── 로그인 UI 핸들러 ── */
var _loginRole='master';

/* 저장된 비밀번호 불러오기 */
function loadSavedPw(role){
  var pw=document.getElementById('_login_pw');
  var cb=document.getElementById('_login_save_pw');
  var clrBtn=document.getElementById('_login_clear_pw');
  var saved=null;
  try{saved=localStorage.getItem('sorizava_pw_'+role);}catch(e){}
  if(saved&&pw){
    pw.value=saved;
    if(cb)cb.checked=true;
    if(clrBtn)clrBtn.style.display='inline-flex';
  } else {
    if(pw)pw.value='';
    if(cb)cb.checked=false;
    if(clrBtn)clrBtn.style.display='none';
  }
}
function clearSavedPw(){
  try{localStorage.removeItem('sorizava_pw_master');localStorage.removeItem('sorizava_pw_staff');}catch(e){}
  var pw=document.getElementById('_login_pw');
  var cb=document.getElementById('_login_save_pw');
  var clrBtn=document.getElementById('_login_clear_pw');
  if(pw)pw.value='';
  if(cb)cb.checked=false;
  if(clrBtn)clrBtn.style.display='none';
}
function selectRole(r){
  _loginRole=r;
  var mb=document.getElementById('_login_role_master');
  var sb=document.getElementById('_login_role_staff');
  var s2b=document.getElementById('_login_role_staff2');
  var btns=[mb,sb,s2b];
  btns.forEach(function(b){
    if(!b)return;
    b.style.background='transparent';
    b.style.border='1.5px solid rgba(255,255,255,.1)';
    var sp=b.querySelector('span');var ic=b.querySelector('i');
    if(sp)sp.style.color='#94A3B8';
    if(ic)ic.style.color='#94A3B8';
  });
  var active=r==='master'?mb:r==='staff'?sb:s2b;
  var color=r==='master'?'#2563EB':r==='staff'?'#7C3AED':'#059669';
  var iconColor=r==='master'?'#60A5FA':r==='staff'?'#A78BFA':'#34D399';
  if(active){
    active.style.background='rgba('+( r==='master'?'37,99,235':r==='staff'?'124,58,237':'5,150,105')+',.15)';
    active.style.border='1.5px solid '+color;
    var sp=active.querySelector('span');var ic=active.querySelector('i');
    if(sp)sp.style.color='#fff';
    if(ic)ic.style.color=iconColor;
  }
  var err=document.getElementById('_login_err');
  if(err)err.style.display='none';
  var pw=document.getElementById('_login_pw');
  if(pw)pw.focus();
  loadSavedPw(r);
}
function doLogout(){
  _currentUser=null;
  try{localStorage.removeItem('sorizava_session');}catch(e){}
  var app=document.getElementById('app');
  var ls=document.getElementById('_login_screen');
  if(app)app.style.display='none';
  if(ls)ls.style.display='flex';
  var pw=document.getElementById('_login_pw');
  var err=document.getElementById('_login_err');
  if(pw)pw.value='';
  if(err)err.style.display='none';
  selectRole('master');
  setTimeout(function(){loadSavedPw('master');},50);
}

async function init(){
  /* 저장된 세션 확인 → 자동 로그인 */
  var saved=null;
  try{saved=localStorage.getItem('sorizava_session');}catch(e){}
  if(saved&&(saved==='master'||saved==='staff'||saved==='staff2')){
    _currentUser={type:saved};
    document.getElementById('_login_screen').style.display='none';
    var _appEl=document.getElementById('app');_appEl.style.display='flex';_appEl.style.flexDirection='row';
    var allowedViews=saved==='staff2'?STAFF2_VIEWS:saved==='staff'?STAFF_VIEWS:null;
    if(allowedViews&&allowedViews.indexOf(currentView)<0)currentView=saved==='staff2'?'training':'dashboard';
    setView(currentView);
    showLoading();
    try{await loadAllData();}finally{hideLoading();}
    setupRealtime();
  } else {
    document.getElementById('app').style.display='none';
    document.getElementById('_login_screen').style.display='flex';
  }
}
init();
</script>
