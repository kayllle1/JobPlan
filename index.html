/* ── 유틸 ── */
const fmt        = d => d?String(d).replace(/-/g,'.'):'-';
const $          = id => document.getElementById(id);
const esc        = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dateOrNull = v => (v&&String(v).trim())?v:null;
const isToday    = d => !!d&&String(d).slice(0,10)===TODAY;

function calcDDay(ds){
  if(!ds)return null;
  const s=String(ds).slice(0,10);
  const[y,mo,da]=s.split('-').map(Number);
  const[ty,tmo,tda]=TODAY.split('-').map(Number);
  return Math.round((new Date(y,mo-1,da)-new Date(ty,tmo-1,tda))/86400000);
}
function isTrulyOver(job){
  if(job.isClosed)return true;
  if(job.finalDate&&String(job.finalDate).slice(0,10)>=TODAY)return false;
  if(job.interviewDate&&String(job.interviewDate).slice(0,10)>=TODAY)return false;
  const dl=job.applyDeadline||job.docDate;
  return !!(dl&&String(dl).slice(0,10)<TODAY);
}
function dDayBadge(dateStr,closed){
  if(closed)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">마감됨</span>`;
  const d=calcDDay(dateStr);if(d===null)return'';
  if(d<0)  return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">기간만료</span>`;
  if(d===0)return`<span style="background:#FEE2E2;color:#DC2626;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">🔴 D-DAY</span>`;
  if(d<=3) return`<span style="background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">D-${d}</span>`;
  if(d<=7) return`<span style="background:#FEF3C7;color:#D97706;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #FDE68A;white-space:nowrap">D-${d}</span>`;
  return`<span style="background:#DBEAFE;color:#1D4ED8;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #BFDBFE;white-space:nowrap">D-${d}</span>`;
}
function csvExport(data,name){
  if(!data||!data.length)return;
  const hdrs=Object.keys(data[0]);
  const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));
  const csv=[hdrs.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();
  URL.revokeObjectURL(url);
}
function getApps(sid){return JOBS.flatMap(j=>j.applicants.filter(a=>a.studentId===sid).map(a=>({...a,jobName:j.name,category:j.category,docDate:j.docDate,finalDate:j.finalDate,interviewDate:j.interviewDate})));}

/* ── 학생 상태 / 등급 배지 ── */
function getStudentStatus(sid){
  const apps=getApps(sid);
  if(!apps.length)return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
  if(apps.some(a=>a.status==='최종합격'||a.status==='취업성공'))return{label:'취업완료',emoji:'🔵',color:'#1D4ED8',bg:'#DBEAFE',border:'#93C5FD'};
  if(apps.some(a=>!['최종합격','취업성공','불합격'].includes(a.status)))return{label:'진행중',emoji:'🟡',color:'#D97706',bg:'#FEF3C7',border:'#FDE68A'};
  return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
}
function getRestrictionBadge(student){

}
function filterStudents(){
  const kw=studentFilter.kw.trim();
  return STUDENTS.filter(s=>{
    if(kw&&!s.name.includes(kw)&&!(s.phone||'').includes(kw)&&!(s.email||'').includes(kw))return false;
    if(studentFilter.grade!=='전체'&&!getApps(s.id).some(a=>a.grade===studentFilter.grade))return false;
    if(studentFilter.statusTab!=='전체'){const st=getStudentStatus(s.id);if(st.label!==studentFilter.statusTab)return false;}
    return true;
  });
}

/* ── 스마트 알림 ── */
function getThisWeekInterviews(){
  const result=[];
  const todayMs=new Date(TODAY).getTime();
  const weekMs=todayMs+7*86400000;
  JOBS.forEach(j=>{
    if(!j.interviewDate)return;
    const d=new Date(String(j.interviewDate).slice(0,10)).getTime();
    if(d>=todayMs&&d<=weekMs){
      j.applicants.filter(a=>a.status==='면접대기').forEach(a=>{
        const st=STUDENTS.find(s=>s.id===a.studentId);
        if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category,studentId:st.id});
      });
    }
  });
  return result;
}
function getLongPendingNoReply(){
  const result=[];
  const todayMs=new Date(TODAY).getTime();
  JOBS.forEach(j=>{
    j.applicants.forEach(a=>{
      if(!a.interviewDocSent)return;
      const sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();
      const diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&!(a.interviewFeedback||'').includes('회신완료')){
        const st=STUDENTS.find(s=>s.id===a.studentId);
        if(st)result.push({studentName:st.name,jobName:j.name,sentDate:a.interviewDocSent,daysDiff:diff,studentId:st.id,category:j.category});
      }
    });
  });
  return result;
}
function renderSmartAlerts(){
  const interviews=getThisWeekInterviews();
  const noReply=getLongPendingNoReply();
  if(!interviews.length&&!noReply.length)return'';

      </div>`).join('')}
    </div>`:'';
  const nrHtml=noReply.length?`
    <div style="background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:12px 14px">
      <div style="font-size:11px;font-weight:800;color:#DC2626;margin-bottom:8px">⚠️ 미회신 장기 방치 (${noReply.length}명)</div>
      ${noReply.map(i=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #FEE2E2;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:700;color:#1E293B">${esc(i.studentName)}</span>
        <span style="font-size:10px;color:#DC2626;background:#FEE2E2;padding:1px 6px;border-radius:4px">${esc(i.category)}</span>
        <span style="font-size:11px;color:#6B7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:80px">${esc(i.jobName.length>16?i.jobName.slice(0,16)+'…':i.jobName)}</span>
        <span style="margin-left:auto;font-size:11px;color:#DC2626;font-weight:700;white-space:nowrap">${i.daysDiff}일 경과</span>
      </div>`).join('')}
    </div>`:'';
  return`<div id="dash-alerts">
    <div style="display:grid;grid-template-columns:${interviews.length&&noReply.length?'1fr 1fr':'1fr'};gap:10px">
      ${ivHtml}${nrHtml}
    </div>
  </div>`;
}

/* ── 퀵 메모 ── */
function appendMemoText(fieldId,prefix){
  const el=$(fieldId);if(!el)return;
  const now=new Date(new Date().getTime()+9*3600000);
  const ds=now.toISOString().slice(0,10);
  const ts=now.toISOString().slice(11,16);
  const text=`${prefix} ${ds} ${ts}`;
  el.value=el.value?(el.value+'\n'+text):text;
  el.focus();
}
function quickMemoButtons(fieldId){
  const btns=[
    {label:'📤 자료발송',p:'[자료발송]'},
    {label:'📣 회신당부',p:'[회신당부]'},
    {label:'📵 연락두절',p:'[연락두절]'},
    {label:'✅ 회신완료',p:'[회신완료]'}
  ];
  return`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">${
    btns.map(b=>`<button type="button" onclick="appendMemoText('${fieldId}','${b.p}')" style="background:#F1F5F9;color:#374151;border:1px solid #E2E8F0;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">${b.label}</button>`).join('')
  }</div>`;
}
/* ── DB 변환 ── */
function dbToStudent(r){
  return{id:r.id,name:r.name,age:r.age,phone:r.phone||'',email:r.email||'',
    counselingMemo:r.counseling_memo||'',isWarning:!!r.is_warning,
    restrictionLevel:r.restriction_level||null};
}
function dbToJob(r){return{id:r.id,name:r.name,category:r.category||'기타',type:r.type||'',isRec:!!r.is_rec,isReA:!!r.is_rea,isClosed:!!r.is_closed,applyStartDate:r.apply_start_date||'',applyDeadline:r.apply_deadline||'',documentPassDate:r.document_pass_date||'',jobUrl:r.job_url||'',docDate:r.doc_date||'',interviewDate:r.interview_date||'',finalDate:r.final_date||'',startDate:r.start_date||'',endDate:r.end_date||'',note:r.note||'',submitDocs:r.submit_docs||'',submitDeadline:r.submit_deadline||'',managerName:r.manager_name||'',managerPhone:r.manager_phone||'',managerEmail:r.manager_email||'',createdAt:r.created_at||'',applicants:[]};}
function dbToApplicant(r){return{id:r.id,jobId:r.job_id,studentId:r.student_id,status:r.status||'서류접수',grade:r.grade||'3급',announceType:r.announce_type||'홈페이지',memo:r.memo||'',examNumber:r.exam_number||'',interviewDocSent:r.interview_doc_sent||'',interviewFeedback:r.interview_feedback||''};}

/* ── 데이터 로드 / 실시간 ── */
async function loadAllData(){
  try{
    const[{data:sd,error:e1},{data:jd,error:e2},{data:ad,error:e3}]=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*')
    ]);
    if(e1||e2||e3){console.error(e1,e2,e3);customAlert('데이터 로드 오류.\nSupabase 연결 정보를 확인하세요.');return;}
    STUDENTS=(sd||[]).map(dbToStudent);
    const jobs=(jd||[]).map(dbToJob);
    const aps=(ad||[]).map(dbToApplicant);
    JOBS=jobs.map(j=>({...j,applicants:aps.filter(a=>a.jobId===j.id)}));
    renderView();
  }catch(err){console.error(err);customAlert('네트워크 오류.');}
}
function scheduleReload(){clearTimeout(_reloadTimer);_reloadTimer=setTimeout(loadAllData,500);}
function setupRealtime(){
  SB.channel('jobms-v70')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'applicants'},scheduleReload)
    .subscribe(s=>{
      _dbConnected=(s==='SUBSCRIBED');
      const dot=$('_conn_dot'),txt=$('_conn_txt');
      if(dot)dot.style.background=_dbConnected?'#10B981':'#F59E0B';
      if(txt)txt.textContent=_dbConnected?'실시간 연동 활성':'연결 중...';
    });
}
function showLoading(){if($('_loading'))return;const d=document.createElement('div');d.id='_loading';d.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:20000;backdrop-filter:blur(2px)';d.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 36px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)"><div style="font-size:36px;animation:spin 1s linear infinite;display:inline-block">⟳</div><p style="margin:10px 0 0;font-size:13px;color:#6B7280;font-weight:600">Supabase 연결 중...</p></div>`;document.body.appendChild(d);}
function hideLoading(){const el=$('_loading');if(el)el.remove();}

/* ── 인포그래픽 ── */
function renderStatusInfographic(allAps){
  const total=allAps.length;
  if(!total)return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#CBD5E1"><span style="font-size:52px">📊</span><span style="font-size:15px;font-weight:700">지원 데이터 없음</span><span style="font-size:12px;color:#E2E8F0">공고에 지원자를 등록하면 표시됩니다</span></div>`;
  const PAL={'서류접수':{bg:'#94A3B8',dk:'#475569',light:'#F1F5F9'},'서류합격':{bg:'#60A5FA',dk:'#1D4ED8',light:'#DBEAFE'},'면접대기':{bg:'#FBBF24',dk:'#D97706',light:'#FEF3C7'},'최종합격':{bg:'#34D399',dk:'#059669',light:'#D1FAE5'},'취업성공':{bg:'#10B981',dk:'#047857',light:'#D1FAE5'},'불합격':{bg:'#F87171',dk:'#DC2626',light:'#FEE2E2'}};
  const items=STATUSES.map(s=>({s,...PAL[s]||{bg:'#CBD5E1',dk:'#6B7280',light:'#F3F4F6'},cnt:allAps.filter(a=>a.status===s).length})).filter(x=>x.cnt>0);
  const flowHtml=items.map((x,i)=>`${i>0?`<span style="color:#D1D5DB;font-size:11px">→</span>`:''}<span style="font-size:10px;font-weight:700;color:${x.dk};background:${x.light};padding:3px 9px;border-radius:99px;white-space:nowrap">${x.s}</span>`).join('');
  const barSegs=items.map(x=>{const pct=(x.cnt/total*100);const showFull=pct>=18,showNum=pct>=9;return`<div style="width:${pct.toFixed(2)}%;background:${x.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;transition:width .4s ease" title="${x.s}: ${x.cnt}명 (${pct.toFixed(1)}%)">${showFull?`<span style="font-size:22px;font-weight:900;color:#fff;line-height:1.1;text-shadow:0 1px 4px rgba(0,0,0,.2)">${x.cnt}</span><span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.9)">${pct.toFixed(0)}%</span>`:showNum?`<span style="font-size:16px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)">${x.cnt}</span>`:''}</div>`;}).join('');
  const legendHtml=items.map(x=>{const pct=(x.cnt/total*100).toFixed(1);return`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F8FAFC;border-radius:9px;border:1px solid #F1F5F9"><span style="width:10px;height:10px;border-radius:3px;background:${x.bg};flex-shrink:0;display:inline-block"></span><span style="font-size:11px;color:#64748B;font-weight:600;flex:1;white-space:nowrap">${x.s}</span><span style="font-size:17px;font-weight:900;color:#0F172A;line-height:1">${x.cnt}</span><span style="font-size:10px;color:#94A3B8;font-weight:500;margin-left:2px;white-space:nowrap">${pct}%</span></div>`;}).join('');
  const passCount=items.filter(x=>x.s==='최종합격'||x.s==='취업성공').reduce((s,x)=>s+x.cnt,0);
  const passRate=total>0?Math.round(passCount/total*100):0;
  return`
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:10px;flex-shrink:0">${flowHtml}</div>
    <div style="display:flex;height:72px;border-radius:12px;overflow:hidden;border:1px solid #E2E8F0;flex-shrink:0">${barSegs}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;flex:1;align-content:start">${legendHtml}</div>
    <div style="margin-top:12px;padding:11px 16px;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border-radius:11px;border:1px solid #BFDBFE;display:flex;gap:0;flex-shrink:0">
      <div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding-right:12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em">총 지원</p><p style="margin:3px 0 0;font-size:26px;font-weight:900;color:#0F172A;line-height:1">${total}<span style="font-size:11px;color:#94A3B8;font-weight:500;margin-left:2px">건</span></p></div>
      <div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding:0 12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em">취업성사</p><p style="margin:3px 0 0;font-size:26px;font-weight:900;color:#059669;line-height:1">${passCount}<span style="font-size:11px;color:#94A3B8;font-weight:500;margin-left:2px">명</span></p></div>
      <div style="flex:1;text-align:center;padding-left:12px"><p style="margin:0;font-size:10px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em">합격률</p><p style="margin:3px 0 0;font-size:26px;font-weight:900;color:#2563EB;line-height:1">${passRate}<span style="font-size:11px;color:#94A3B8;font-weight:500;margin-left:1px">%</span></p></div>
    </div>`;
}
function renderAgeInfographic(finalSids){
  if(!finalSids.length)return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#CBD5E1"><span style="font-size:52px">👥</span><span style="font-size:15px;font-weight:700">합격자 데이터 없음</span><span style="font-size:12px;color:#E2E8F0">최종합격자가 등록되면 표시됩니다</span></div>`;
  const groups=[{label:'10대',color:'#C4B5FD',textDk:'#4C1D95',min:0,max:19},{label:'20대',color:'#7DD3FC',textDk:'#0C4A6E',min:20,max:29},{label:'30대',color:'#6EE7B7',textDk:'#064E3B',min:30,max:39},{label:'40대+',color:'#FCD34D',textDk:'#78350F',min:40,max:999},{label:'미상',color:'#E2E8F0',textDk:'#475569',min:-1,max:-1}];
  groups.forEach(g=>{g.cnt=0;finalSids.forEach(sid=>{const st=STUDENTS.find(s=>s.id===sid);if(!st||!st.age){if(g.label==='미상')g.cnt++;return;}if(g.label!=='미상'&&st.age>=g.min&&st.age<=g.max)g.cnt++;});});
  const total=groups.reduce((s,g)=>s+g.cnt,0);
  if(!total)return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#CBD5E1"><span style="font-size:52px">👥</span><span style="font-size:15px;font-weight:700">합격자 데이터 없음</span></div>`;
  const active=groups.filter(g=>g.cnt>0);
  const barHtml=active.map(g=>{const pct=(g.cnt/total*100);const showFull=pct>=16,showMid=pct>=9;return`<div style="width:${pct.toFixed(2)}%;background:${g.color};display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:width .4s" title="${g.label}: ${g.cnt}명 (${pct.toFixed(1)}%)">${showFull?`<span style="font-size:15px;font-weight:900;color:${g.textDk};line-height:1.15;white-space:nowrap">${g.label}</span><span style="font-size:14px;font-weight:800;color:${g.textDk};opacity:.85">${pct.toFixed(0)}%</span>`:showMid?`<span style="font-size:12px;font-weight:900;color:${g.textDk};white-space:nowrap">${pct.toFixed(0)}%</span>`:''}</div>`;}).join('');
  const rowHtml=active.map(g=>{const pct=(g.cnt/total*100);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#F8FAFC;border-radius:9px;border:1px solid #F1F5F9"><div style="width:12px;height:12px;border-radius:50%;background:${g.color};flex-shrink:0"></div><span style="font-size:12px;font-weight:700;color:#374151;flex:1">${g.label}</span><div style="flex:2;height:8px;background:#F1F5F9;border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct.toFixed(1)}%;background:${g.color};border-radius:99px"></div></div><span style="font-size:13px;font-weight:900;color:#0F172A;min-width:36px;text-align:right">${pct.toFixed(0)}<span style="font-size:9px;color:#94A3B8;font-weight:500">%</span></span><span style="font-size:11px;color:#94A3B8;min-width:28px;text-align:right">${g.cnt}명</span></div>`;}).join('');
  const peak=[...active].sort((a,b)=>b.cnt-a.cnt)[0];
  return`
    <p style="margin:0 0 10px;font-size:11px;color:#94A3B8;font-weight:600;flex-shrink:0">최종합격자 ${total}명의 연령 분포</p>
    <div style="display:flex;height:90px;border-radius:14px;overflow:hidden;border:1px solid #E2E8F0;flex-shrink:0">${barHtml}</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-top:12px;flex:1;overflow-y:auto;min-height:0">${rowHtml}</div>
    <div style="margin-top:12px;padding:11px 16px;background:linear-gradient(135deg,#FFFBEB,#FEF9C3);border-radius:11px;border:1px solid #FDE68A;display:flex;align-items:center;gap:12px;flex-shrink:0">
      <span style="font-size:22px;flex-shrink:0">🏆</span>
      <div style="flex:1;min-width:0"><p style="margin:0;font-size:10px;color:#92400E;font-weight:700;text-transform:uppercase;letter-spacing:.04em">최빈 연령대</p><p style="margin:3px 0 0;font-size:16px;font-weight:900;color:#78350F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${peak.label}<span style="font-size:12px;color:#B45309;font-weight:600;margin-left:6px">${(peak.cnt/total*100).toFixed(0)}% · ${peak.cnt}명</span></p></div>
      <div style="text-align:right;flex-shrink:0"><p style="margin:0;font-size:10px;color:#92400E;font-weight:700">총 합격자</p><p style="margin:3px 0 0;font-size:22px;font-weight:900;color:#0F172A;line-height:1">${total}<span style="font-size:11px;color:#94A3B8;margin-left:2px">명</span></p></div>
    </div>`;
}
/* ── UI 헬퍼 ── */
function btn(label,onclick,variant,sm){
  variant=variant||'primary';sm=sm||false;
  const vs={primary:'background:#2563EB;color:#fff;border:none',success:'background:#059669;color:#fff;border:none',danger:'background:#DC2626;color:#fff;border:none',outline:'background:#fff;color:#374151;border:1px solid #D1D5DB',warn:'background:#D97706;color:#fff;border:none'};
  return`<button onclick="${onclick}" style="${vs[variant]};padding:${sm?'4px 9px':'7px 14px'};border-radius:6px;font-size:${sm?'11px':'12px'};font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit">${label}</button>`;
}
function badge(t,c){const cc=c||CAT_COLORS[t]||'#6B7280';return`<span style="background:${cc}1A;color:${cc};padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block;border:1px solid ${cc}33">${esc(t)}</span>`;}
function fInp(label,id,type,value,extra){type=type||'text';value=value||'';extra=extra||'';return`<div style="margin-bottom:10px">${label?`<label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">${label}</label>`:''}<input id="${id}" type="${type}" value="${esc(value)}" ${extra} style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;outline:none;font-family:inherit"></div>`;}
function fSel(label,id,opts,value){value=value||'';const options=opts.map(o=>`<option value="${esc(o)}" ${o===value?'selected':''}>${esc(o)}</option>`).join('');return`<div style="margin-bottom:10px">${label?`<label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">${label}</label>`:''}<select id="${id}" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;background:#fff;font-family:inherit">${options}</select></div>`;}

/* ── 모달 ── */
function customAlert(msg){var old=$('_alert');if(old)old.remove();var div=document.createElement('div');div.id='_alert';div.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:11000;backdrop-filter:blur(2px)';div.innerHTML=`<div style="background:#fff;border-radius:12px;width:420px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden"><div style="padding:20px 20px 8px;display:flex;align-items:flex-start;gap:12px"><span style="font-size:22px">ℹ️</span><p style="margin:0;font-size:13px;color:#111827;line-height:1.6;white-space:pre-wrap">${esc(msg)}</p></div><div style="padding:12px 20px 18px;display:flex;justify-content:flex-end"><button onclick="document.getElementById('_alert').remove()" style="background:#2563EB;color:#fff;border:none;padding:8px 22px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">확인</button></div></div>`;document.body.appendChild(div);}
function customConfirm(msg,onYes,yesLabel,yesColor){
  yesLabel=yesLabel||'확인';yesColor=yesColor||'#2563EB';
  var old=$('_cfrm');if(old)old.remove();
  var fn='_cfrmYes_'+Date.now();
  window[fn]=async function(){var el=$('_cfrm');if(el)el.remove();delete window[fn];try{await onYes();}catch(e){customAlert('오류: '+e.message);}};
  var div=document.createElement('div');div.id='_cfrm';div.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:11000;backdrop-filter:blur(2px)';
  div.innerHTML=`<div style="background:#fff;border-radius:12px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.28);overflow:hidden"><div style="padding:20px 20px 8px;display:flex;align-items:flex-start;gap:12px"><span style="font-size:22px">${yesColor==='#DC2626'?'⚠️':'❓'}</span><p style="margin:0;font-size:14px;color:#111827;line-height:1.6;white-space:pre-wrap">${esc(msg)}</p></div><div style="padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:8px"><button onclick="document.getElementById('_cfrm').remove()" style="background:#fff;color:#374151;border:1px solid #D1D5DB;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">취소</button><button onclick="${fn}()" style="background:${yesColor};color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">${yesLabel}</button></div></div>`;
  document.body.appendChild(div);
}
function showModal(title,body,w){w=w||'600px';var old=$('_modal');if(old)old.remove();var div=document.createElement('div');div.id='_modal';div.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.65);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px)';div.innerHTML=`<div style="background:#fff;border-radius:14px;width:${w};max-width:95vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 25px 80px rgba(0,0,0,.3);overflow:hidden"><div style="padding:14px 20px;background:linear-gradient(135deg,#1E3A5F,#1E40AF);display:flex;justify-content:space-between;align-items:center;flex-shrink:0"><h3 style="margin:0;font-size:14px;font-weight:700;color:#fff">${esc(title)}</h3><button onclick="closeModal()" style="border:none;background:rgba(255,255,255,.15);color:#fff;font-size:16px;font-weight:700;border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit">✕</button></div><div id="_modal_body" style="padding:20px;overflow-y:auto;flex:1">${body}</div></div>`;document.body.appendChild(div);}
function closeModal(){var m=$('_modal');if(m)m.remove();}

/* ── 공고 삭제 ── */
function confirmDeleteJob(jobId){const job=JOBS.find(j=>j.id===jobId);if(!job)return;const n=job.applicants.length;customConfirm(`"${job.name}"\n\n공고를 삭제하시겠습니까?${n>0?`\n\n주의: 지원자 ${n}명 데이터도 함께 삭제됩니다.`:''}`,()=>executeDeleteJob(jobId),'삭제','#DC2626');}
async function executeDeleteJob(jobId){const{error}=await SB.from('jobs').delete().eq('id',jobId);if(error){customAlert('삭제 오류: '+error.message);return;}expandedJobs.delete(jobId);detailJobs.delete(jobId);await loadAllData();}

/* ── 월간 보고서 ── */
function showMonthlyReport(){
  const m=selectedMonth||MONTH;const[yy,mm]=m.split('-');const label=`${yy}년 ${parseInt(mm)}월`;
  const newJobs=JOBS.filter(j=>(j.createdAt||'').slice(0,7)===m);
  const newJobsByCat={};CATS.slice(1).forEach(c=>{const cnt=newJobs.filter(j=>j.category===c).length;if(cnt>0)newJobsByCat[c]=cnt;});
  const docMonthJobs=JOBS.filter(j=>(j.docDate||'').slice(0,7)===m);
  const monthApplicants=docMonthJobs.flatMap(j=>j.applicants);
  const finalMonthJobs=JOBS.filter(j=>(j.finalDate||'').slice(0,7)===m);
  const finalPass=finalMonthJobs.flatMap(j=>j.applicants.filter(a=>a.status==='최종합격'||a.status==='취업성공'));
  const rate=monthApplicants.length>0?Math.round(finalPass.length/monthApplicants.length*100):0;
  const catCounts={};finalPass.forEach(a=>{const job=JOBS.find(j=>j.id===a.jobId);if(job)catCounts[job.category]=(catCounts[job.category]||0)+1;});
  const top3=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const catSummaryTxt=Object.keys(newJobsByCat).length>0?Object.entries(newJobsByCat).map(([c,n])=>`    · ${c}: ${n}건`).join('\n'):'    · 없음';
  const top3Txt=top3.length>0?top3.map(([c,n],i)=>`    ${i+1}위. ${c} — ${n}명`).join('\n'):'    · 데이터 없음';
  const sep='─'.repeat(32);
  const reportText=`📊 ${label} 취업 실적 보고서\n${sep}\n\n■ 신규 공고: ${newJobs.length}건\n${catSummaryTxt}\n\n■ 이번 달 총 지원자: ${monthApplicants.length}명\n■ 이번 달 최종합격: ${finalPass.length}명\n■ 취업 성공률: ${rate}%\n\n■ 주요 취업 기관 TOP 3\n${top3Txt}\n\n${sep}\n※ JobMS v7.1 자동 생성 · ${TODAY} KST 기준`;
  const catBadgesHtml=Object.keys(newJobsByCat).length>0?Object.entries(newJobsByCat).map(([c,n])=>`<span style="display:inline-flex;align-items:center;gap:4px;background:${CAT_COLORS[c]||'#6B7280'}18;color:${CAT_COLORS[c]||'#6B7280'};border:1px solid ${CAT_COLORS[c]||'#6B7280'}33;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${c} <strong>${n}건</strong></span>`).join(''):'<span style="color:#CBD5E1;font-size:12px">없음</span>';

function copyReportText(){const text=window._reportTextForCopy||'';if(!text)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>customAlert('✅ 보고서가 클립보드에 복사되었습니다!\n\n메신저나 한글 문서에 바로 붙여넣기 할 수 있습니다.')).catch(()=>fallbackCopy(text));}else{fallbackCopy(text);}}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');customAlert('✅ 복사 완료!');}catch(e){customAlert('복사 실패: 미리보기 텍스트를 직접 선택하여 복사해주세요.');}document.body.removeChild(ta);}

/* ── 취업 현황 ── */
function getEmpData(cat){
  const result=[];
  JOBS.forEach(j=>{
    if(cat!=='전체'&&j.category!==cat)return;
    j.applicants.filter(a=>a.status==='최종합격'||a.status==='취업성공').forEach(a=>{
      const st=STUDENTS.find(s=>s.id===a.studentId);
      result.push({name:st?st.name:'(삭제된 학생)',phone:st?(st.phone||'-'):'-',email:st?(st.email||'-'):'-',jobName:j.name,category:j.category,finalDate:j.finalDate||'',grade:a.grade||'-',memo:a.memo||''});
    });
  });
  result.sort((a,b)=>(b.finalDate||'').localeCompare(a.finalDate||''));
  return result;
}

/* ══════════════════════════════════════════════════════════════
   ★ v7.1 핵심: 정렬/필터 함수
   sortByFinalDate — 대시보드 "진행중 공고" 카드용 (기존 유지)
   getSorted       — 공고 관리 테이블용 (★ 3가지 옵션 추가)
══════════════════════════════════════════════════════════════ */
function sortByFinalDate(jobs){
  const active=jobs.filter(j=>!j.isClosed),closed=jobs.filter(j=>j.isClosed);
  active.sort((a,b)=>{const fa=a.finalDate?String(a.finalDate).slice(0,10):'',fb=b.finalDate?String(b.finalDate).slice(0,10):'';const aF=fa&&fa>=TODAY,bF=fb&&fb>=TODAY,aP=fa&&fa<TODAY,bP=fb&&fb<TODAY;if(aF&&bF)return fa.localeCompare(fb);if(aF&&!bF)return -1;if(!aF&&bF)return 1;if(aP&&bP)return fb.localeCompare(fa);if(aP&&!bP)return -1;if(!aP&&bP)return 1;return(a.applyDeadline||a.docDate||'9999').localeCompare(b.applyDeadline||b.docDate||'9999');});
  return[...active,...closed];
}

/* ★ v7.1 getSorted: sortBy 옵션에 따라 분기 */
function getSorted(filtered){
  /* ① 서류 마감 임박순 */
  if(jobFilter.sortBy==='deadline'){
    const withDl=filtered.filter(j=>j.applyDeadline||j.docDate);
    const noDl  =filtered.filter(j=>!j.applyDeadline&&!j.docDate);
    withDl.sort((a,b)=>{
      const da=String(a.applyDeadline||a.docDate).slice(0,10);
      const db=String(b.applyDeadline||b.docDate).slice(0,10);
      return da.localeCompare(db);
    });
    return[...withDl,...noDl];
  }
  /* ② 면접 일정 가까운순 */
  if(jobFilter.sortBy==='interview'){
    const withIv=filtered.filter(j=>j.interviewDate);
    const noIv  =filtered.filter(j=>!j.interviewDate);
    withIv.sort((a,b)=>String(a.interviewDate).slice(0,10).localeCompare(String(b.interviewDate).slice(0,10)));
    return[...withIv,...noIv];
  }
  /* ③ 최신 등록순 (기본값) — 기존 sortByFinalDate 사용 */
  return sortByFinalDate(filtered);
}

function getFiltered(){
  return JOBS.filter(j=>{
    if(jobFilter.cat!=='전체'&&j.category!==jobFilter.cat)return false;
    if(jobFilter.year&&!(j.docDate||'').startsWith(jobFilter.year))return false;
    if(jobFilter.kw&&!j.name.includes(jobFilter.kw))return false;
    if(jobFilter.type==='추천'&&!j.isRec)return false;
    if(jobFilter.type==='지원'&&j.isRec)return false;
    if(jobFilter.dateFrom){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl<jobFilter.dateFrom)return false;}
    if(jobFilter.dateTo){const dl=j.applyDeadline||j.docDate||'';if(dl&&dl>jobFilter.dateTo)return false;}
    return true;
  });
}

  const urlBtn=job.jobUrl?`<a href="${esc(job.jobUrl)}" target="_blank" style="background:#F0FDF4;color:#059669;border:1px solid #6EE7B7;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:3px">🔗 공고</a>`:'';
  const manageBtns=`<div style="display:flex;gap:4px;flex-wrap:nowrap;align-items:center">${urlBtn} ${btn('✏',`openJobModal(${job.id})`,'outline',true)} ${btn('🗑',`confirmDeleteJob(${job.id})`,'danger',true)} ${btn('+지원',`openAddApModal(${job.id})`,'primary',true)}</div>`;
  const docDateText=job.docDate?`<span style="color:${tD?'#DC2626':'#475569'};font-weight:${tD?700:400};font-size:11px">${fmt(job.docDate)}</span>`:`<span style="color:#E2E8F0;font-size:11px">-</span>`;
  const dlText=job.isClosed?`<span style="color:#9CA3AF;font-size:10px">마감됨</span>`:deadline?`<div style="display:flex;flex-direction:column;gap:2px">${dDayBadge(deadline,false)}<span style="color:${dlDNum!==null&&dlDNum>=0&&dlDNum<=3?'#DC2626':dlDNum!==null&&dlDNum>=0&&dlDNum<=7?'#D97706':'#6B7280'};font-size:10px;font-weight:${dlDNum!==null&&dlDNum>=0&&dlDNum<=7?700:400}">${fmt(deadline)}</span></div>`:`<span style="color:#E2E8F0">-</span>`;

  const finalText=job.finalDate?`<div style="display:flex;flex-direction:column;gap:2px">${dDayBadge(job.finalDate,job.isClosed)}<span style="color:${tF?'#EA580C':finalDNum!==null&&finalDNum>=0&&finalDNum<=3?'#DC2626':'#475569'};font-weight:${(tF||(finalDNum!==null&&finalDNum>=0&&finalDNum<=3))?700:400};font-size:10px">${fmt(job.finalDate)}</span></div>`:`<span style="color:#E2E8F0">-</span>`;

/* ── 학생 DB 뷰 ── */
function renderStudents(){

    return`<button onclick="setStudentStatusTab('${t}')" style="white-space:nowrap;padding:5px 13px;border-radius:99px;border:1.5px solid ${active?'#2563EB':'#E2E8F0'};background:${active?'#2563EB':'#fff'};color:${active?'#fff':'#374151'};font-size:12px;font-weight:${active?700:500};cursor:pointer;font-family:inherit;flex-shrink:0">${t} <span style="font-size:10px;opacity:.75">${cnt}</span></button>`;

    const stBadge=`<span style="background:${st.bg};color:${st.color};border:1px solid ${st.border};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap">${st.emoji} ${st.label}</span>`;

    return`<tr class="tbl-tr${isRestricted?' row-restricted':''}" style="border-bottom:1px solid #F1F5F9">
      <td style="padding:10px 14px;text-align:center;color:#94A3B8;font-size:11px;font-weight:700">${i+1}</td>
      <td style="padding:10px 14px"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><button onclick="openHistoryModal(${s.id})" style="border:none;background:none;cursor:pointer;color:#2563EB;font-weight:700;text-decoration:underline;font-size:13px;padding:0;font-family:inherit">${esc(s.name)}</button>${resBadge}</div></td>
      <td style="padding:10px 14px">${stBadge}</td>
      <td style="padding:10px 14px;color:#374151">${s.age?s.age+'세':'<span style="color:#CBD5E1;font-size:11px">미등록</span>'}</td>
      <td style="padding:10px 14px;color:#6B7280;font-size:12px">${esc(s.phone)}</td>
      <td style="padding:10px 14px;color:#9CA3AF;font-size:12px">${esc(s.email)}</td>
      <td style="padding:10px 14px"><span style="font-size:12px;color:#374151;font-weight:600">지원 ${apps.length}건</span>${pass>0?`<span style="margin-left:6px;font-size:10px;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid #A7F3D0">합격 ${pass}</span>`:''}${ongoing>0?`<span style="margin-left:4px;font-size:10px;background:#DBEAFE;color:#1E40AF;padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid #BFDBFE">진행 ${ongoing}</span>`:''}${s.counselingMemo?`<span style="margin-left:4px;font-size:9px;background:#FFFBEB;color:#92400E;padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid #FEF3C7">📝메모</span>`:''}</td>
      <td style="padding:10px 14px;display:flex;gap:4px">${btn('수정',`openEditStudentModal(${s.id})`,'outline',true)} ${btn('삭제',`deleteStudent(${s.id})`,'danger',true)}</td>
    </tr>`;
  }).join('');
  const hasFilter=studentFilter.kw||studentFilter.grade!=='전체';
  return`<div id="_view_scroll" style="padding:20px 24px 24px;height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-shrink:0"><div><h2 style="margin:0;font-size:20px;font-weight:800;color:#0F172A">학생 DB</h2><p style="margin:3px 0 0;font-size:12px;color:#94A3B8">총 ${filtered.length}명 / 전체 ${STUDENTS.length}명</p></div><div style="display:flex;gap:8px;align-items:center">${btn('📥 CSV 내보내기','exportStudents()','success')} ${btn('+ 학생 추가','openAddStudentModal()','primary')}</div></div>

      ${hasFilter?`<button onclick="studentFilter={kw:'',grade:'전체',statusTab:studentFilter.statusTab};renderView()" style="border:none;background:#F1F5F9;color:#64748B;padding:7px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">✕ 필터 초기화</button>`:''}

    <div id="_tbl_scroll" style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:auto;flex:1;min-height:0"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#F8FAFC;border-bottom:2px solid #E2E8F0;position:sticky;top:0;z-index:2">${['No.','이름 / 등급','상태','나이','연락처','이메일','지원현황','관리'].map(h=>`<th style="padding:10px 14px;text-align:left;font-weight:700;color:#374151;font-size:11px;letter-spacing:.04em;background:#F8FAFC">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;

/* ── renderView / setView ── */
function renderView(){
  _saveScrollPositions();
  const focusedId=document.activeElement?document.activeElement.id:null;
  const cursorPos=(document.activeElement&&typeof document.activeElement.selectionStart==='number')?document.activeElement.selectionStart:null;
  const main=$('_main');if(!main)return;
  if(currentView==='dashboard')main.innerHTML=renderDashboard();
  else if(currentView==='jobs')main.innerHTML=renderJobs();
  else if(currentView==='students')main.innerHTML=renderStudents();
  else if(currentView==='employment')main.innerHTML=renderEmployment();
  const sb=$('_sidebar');if(sb)sb.outerHTML=renderSidebar();
  _restoreScrollPositions();
  const searchIds=['jobSearchInput','studentSearchInput'];
  if(focusedId&&searchIds.includes(focusedId)){requestAnimationFrame(()=>{const el=$(focusedId);if(el){el.focus();if(cursorPos!==null)try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}}});}
}
function setView(v){_savedScrollTop=0;_savedTblScrollTop=0;currentView=v;$('app').innerHTML=renderSidebar()+'<main id="_main" style="flex:1;overflow:hidden;background:#F0F2F5;display:flex;flex-direction:column;min-height:0"></main>';renderView();}

async function saveJob(jobId){
  const name=$('jf_name')&&$('jf_name').value.trim();if(!name)return customAlert('공고명을 입력하세요');
  const f={name,category:$('jf_cat').value,type:$('jf_type').value,is_rec:!!$('jf_rc').checked,is_rea:!!$('jf_ra').checked,is_closed:!!$('jf_cl').checked,doc_date:dateOrNull($('jf_dd')&&$('jf_dd').value),apply_deadline:dateOrNull($('jf_ad')&&$('jf_ad').value),document_pass_date:dateOrNull($('jf_dpd')&&$('jf_dpd').value),interview_date:dateOrNull($('jf_id')&&$('jf_id').value),final_date:dateOrNull($('jf_fd')&&$('jf_fd').value),start_date:dateOrNull($('jf_sd2')&&$('jf_sd2').value),end_date:dateOrNull($('jf_ed')&&$('jf_ed').value),job_url:($('jf_url')&&$('jf_url').value)||'',note:($('jf_note')&&$('jf_note').value)||'',submit_docs:($('jf_sd')&&$('jf_sd').value)||'',submit_deadline:dateOrNull($('jf_sl')&&$('jf_sl').value),manager_name:($('jf_mn')&&$('jf_mn').value)||'',manager_phone:($('jf_mp')&&$('jf_mp').value)||'',manager_email:($('jf_me')&&$('jf_me').value)||''};
  let{error}=jobId!=null?await SB.from('jobs').update(f).eq('id',jobId):await SB.from('jobs').insert(f);
  if(error){const newCols=['apply_deadline','job_url','document_pass_date'];if(error.message&&newCols.some(c=>error.message.includes(c))){const f2={...f};newCols.forEach(c=>delete f2[c]);const{error:e2}=jobId!=null?await SB.from('jobs').update(f2).eq('id',jobId):await SB.from('jobs').insert(f2);if(e2){customAlert('저장 오류: '+e2.message);return;}}else{customAlert('저장 오류: '+error.message);return;}}
  closeModal();await loadAllData();
}

function selectExistingAp(sid,name){_addApSelectedSid=sid;const r=$('ap_search_results');if(r)r.innerHTML='';const s=$('ap_search');if(s){s.value=name;s.disabled=true;s.style.background='#F3F4F6';}const si=$('ap_selected_info');if(si)si.innerHTML=`<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:700;color:#1E40AF">✅ 기존 학생 선택됨: ${esc(name)}</span><button onclick="clearApSelection()" style="background:none;border:1px solid #93C5FD;color:#2563EB;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">변경</button></div>`;}

async function saveAddAp(jobId){if(!_addApSelectedSid)return customAlert('학생을 검색하여 선택하거나 신규 등록을 먼저 해주세요.');let sid;if(_addApSelectedSid==='new'){const nm=$('ns_nm')&&$('ns_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');const{data:newSt,error:se}=await SB.from('students').insert({name:nm,age:parseInt($('ns_ag')&&$('ns_ag').value)||null,phone:($('ns_ph')&&$('ns_ph').value)||'',email:($('ns_em')&&$('ns_em').value)||''}).select().single();if(se){customAlert('학생 등록 오류: '+se.message);return;}sid=newSt.id;}else{sid=_addApSelectedSid;}const{error:ae}=await SB.from('applicants').insert({job_id:jobId,student_id:sid,status:($('ap_st')&&$('ap_st').value)||'서류접수',grade:($('ap_gr')&&$('ap_gr').value)||'3급',announce_type:($('ap_an')&&$('ap_an').value)||'홈페이지',memo:($('ap_mm')&&$('ap_mm').value)||'',exam_number:'',interview_doc_sent:null,interview_feedback:''});if(ae){customAlert('지원자 추가 오류: '+ae.message);return;}closeModal();await loadAllData();}

  const stOpts=STATUSES.map(s=>`<option value="${s}" ${s===ap.status?'selected':''}>${s}</option>`).join('')+(!STATUSES.includes(ap.status)?`<option value="${ap.status}" selected>${ap.status}(기존)</option>`:'');
  showModal('지원자 수정 — '+st.name,`<div style="background:#EFF6FF;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.06em">개인정보 (학생 DB 동기화)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','ea_nm','text',st.name)} ${fInp('나이','ea_ag','number',st.age)} ${fInp('연락처','ea_ph','text',st.phone)} ${fInp('이메일','ea_em','email',st.email)}</div></div><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">공고 정보 — ${esc(job.name.slice(0,22))}</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px"><div><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">상태</label><select id="ea_st" onchange="toggleInterviewSection(this.value)" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;background:#fff;font-family:inherit;margin-bottom:10px">${stOpts}</select></div>${fSel('급수','ea_gr',GRADES,GRADES.includes(ap.grade)?ap.grade:'3급')} ${fSel('발표방식','ea_an',ANNOUNCE,ap.announceType)}</div>${quickMemoButtons('ea_mm')}<div style="margin-bottom:14px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">메모</label><textarea id="ea_mm" rows="2" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(ap.memo||'')}</textarea></div>${ivSection}<div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid #F3F4F6">${btn('취소','closeModal()','outline')} ${btn('💾 저장 (DB 동기화)',`saveEditAp(${jobId},${apId},${ap.studentId})`,'primary')}</div>`,'580px');

function toggleInterviewSection(status){const show=['면접대기','최종합격','취업성공','불합격'].includes(status);const wrap=$('ea_interview_wrap');if(wrap)wrap.style.display=show?'block':'none';}
async function saveEditAp(jobId,apId,studentId){
  const nm=$('ea_nm')&&$('ea_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');
  const newDocSent=dateOrNull($('ea_docsent')&&$('ea_docsent').value);
  let ap=null;for(const j of JOBS){const a=j.applicants.find(a=>a.id===apId);if(a){ap=a;break;}}
  const stuObj=STUDENTS.find(s=>s.id===studentId);
  /* ★ v7.0 제한 등급 강제발송 제어 (그대로 보존) */
  if(newDocSent&&newDocSent!==(ap?.interviewDocSent||null)&&stuObj?.restrictionLevel==='제한'){
    const ok=await new Promise(res=>{customConfirm(`⚠️ [${stuObj.name}]은 제한 등급 학생입니다.\n자료 발송 이력이 자동 기록됩니다.\n\n강제 발송하시겠습니까?`,()=>res(true),'강제 발송','#DC2626');});
    if(!ok){const el=$('ea_docsent');if(el)el.value=ap?.interviewDocSent||'';return;}
    const now=new Date(new Date().getTime()+9*3600000);
    const note=`[강제발송승인] ${now.toISOString().slice(0,10)} ${now.toISOString().slice(11,16)} — 제한대상 강제발송`;
    const memoEl=$('ea_mm');if(memoEl)memoEl.value=memoEl.value?(memoEl.value+'\n'+note):note;
  }
  const[{error:ae},{error:se}]=await Promise.all([
    SB.from('applicants').update({status:$('ea_st').value,grade:$('ea_gr').value,announce_type:$('ea_an').value,memo:($('ea_mm')&&$('ea_mm').value)||'',exam_number:($('ea_exam')&&$('ea_exam').value)||'',interview_doc_sent:newDocSent,interview_feedback:($('ea_feedback')&&$('ea_feedback').value)||''}).eq('id',apId),
    SB.from('students').update({name:nm,age:parseInt($('ea_ag')&&$('ea_ag').value)||null,phone:($('ea_ph')&&$('ea_ph').value)||'',email:($('ea_em')&&$('ea_em').value)||''}).eq('id',studentId)
  ]);
  if(ae||se){customAlert('저장 오류: '+(ae?.message||se?.message));return;}
  closeModal();await loadAllData();
}
function deleteAp(jobId,apId){customConfirm('이 지원자를 삭제하시겠습니까?',async function(){const{error}=await SB.from('applicants').delete().eq('id',apId);if(error){customAlert('삭제 오류: '+error.message);return;}await loadAllData();},'삭제','#DC2626');}

function restrictionRadios(current){
  const opts=[{v:'',l:'✅ 없음'},{v:'주의',l:'⚠️ 주의'},{v:'제한',l:'🚫 제한'}];
  return`<div style="display:flex;gap:8px;flex-wrap:wrap">${opts.map(o=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 12px;border-radius:6px;border:1px solid ${(current||'')===(o.v)?'#2563EB':'#E5E7EB'};background:${(current||'')===(o.v)?'#EFF6FF':'#fff'};color:${(current||'')===(o.v)?'#1D4ED8':'#374151'}"><input type="radio" name="stu_restriction" value="${o.v}" ${(current||'')===(o.v)?'checked':''} style="accent-color:#2563EB">${o.l}</label>`).join('')}</div>`;
}
function openAddStudentModal(){showModal('학생 추가',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름 *','ns2_nm')} ${fInp('나이','ns2_ag','number')} ${fInp('연락처','ns2_ph')} ${fInp('이메일','ns2_em','email')}</div><div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">신뢰 등급</label>${restrictionRadios('')}</div><div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">★ 상담 메모</label><textarea id="ns2_cm" rows="3" placeholder="상담 내용을 입력하세요..." style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit"></textarea></div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">${btn('취소','closeModal()','outline')} ${btn('등록','saveNewStudent()','primary')}</div>`,'480px');}
async function saveNewStudent(){
  const nm=$('ns2_nm')&&$('ns2_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');
  const rl=document.querySelector('input[name="stu_restriction"]:checked')?.value||null;
  const f={name:nm,age:parseInt($('ns2_ag')&&$('ns2_ag').value)||null,phone:($('ns2_ph')&&$('ns2_ph').value)||'',email:($('ns2_em')&&$('ns2_em').value)||'',counseling_memo:($('ns2_cm')&&$('ns2_cm').value)||'',restriction_level:rl||null};
  const{error}=await SB.from('students').insert(f);
  if(error){
    if(error.message&&(error.message.includes('counseling_memo')||error.message.includes('restriction_level'))){
      const f2={name:f.name,age:f.age,phone:f.phone,email:f.email};
      const{error:e2}=await SB.from('students').insert(f2);
      if(e2){customAlert('저장 오류: '+e2.message);return;}
      customAlert('저장 완료.\n\n※ 컬럼 추가 필요:\nALTER TABLE students ADD COLUMN IF NOT EXISTS counseling_memo TEXT DEFAULT \'\';\nALTER TABLE students ADD COLUMN IF NOT EXISTS restriction_level TEXT;');
    }else{customAlert('저장 오류: '+error.message);return;}
  }
  closeModal();await loadAllData();
}
function openEditStudentModal(id){
  const s=STUDENTS.find(st=>st.id===id);if(!s)return;
  showModal('학생 정보 수정',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','es_nm','text',s.name)} ${fInp('나이','es_ag','number',s.age)} ${fInp('연락처','es_ph','text',s.phone)} ${fInp('이메일','es_em','email',s.email)}</div>
    <div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">신뢰 등급</label>${restrictionRadios(s.restrictionLevel||'')}</div>
    <div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">★ 상담 메모</label><textarea id="es_cm" rows="4" placeholder="상담 내용을 입력하세요..." style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(s.counselingMemo||'')}</textarea></div>
    <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:12px 14px;margin-bottom:12px">
      <p style="margin:0 0 8px;font-size:11px;font-weight:700;color:#065F46">🏆 취업완료 일괄처리</p>
      <p style="margin:0 0 10px;font-size:11px;color:#374151">진행중인 모든 지원 건을 <strong>취업성공</strong> 상태로 일괄 변경합니다.</p>
      <button onclick="markStudentEmployed(${id})" style="background:#059669;color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🏆 취업완료 일괄처리</button>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">${btn('취소','closeModal()','outline')} ${btn('저장',`saveStudent(${id})`,'primary')}</div>`,'480px');
}
async function saveStudent(id){
  const nm=$('es_nm')&&$('es_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');
  const rl=document.querySelector('input[name="stu_restriction"]:checked')?.value||null;
  const f={name:nm,age:parseInt($('es_ag')&&$('es_ag').value)||null,phone:($('es_ph')&&$('es_ph').value)||'',email:($('es_em')&&$('es_em').value)||'',counseling_memo:($('es_cm')&&$('es_cm').value)||'',restriction_level:rl||null};
  const{error}=await SB.from('students').update(f).eq('id',id);
  if(error){
    if(error.message&&(error.message.includes('counseling_memo')||error.message.includes('restriction_level'))){
      const f2={name:f.name,age:f.age,phone:f.phone,email:f.email};
      const{error:e2}=await SB.from('students').update(f2).eq('id',id);
      if(e2){customAlert('저장 오류: '+e2.message);return;}
    }else{customAlert('저장 오류: '+error.message);return;}
  }
  closeModal();await loadAllData();
}
async function markStudentEmployed(stuId){
  const apps=getApps(stuId).filter(a=>!['최종합격','취업성공','불합격'].includes(a.status));
  if(!apps.length){customAlert('변경할 진행중 지원 건이 없습니다.');return;}
  customConfirm(`진행중인 지원 ${apps.length}건을 모두\n"취업성공" 상태로 변경하시겠습니까?`,async()=>{
    for(const a of apps){await SB.from('applicants').update({status:'취업성공'}).eq('id',a.id);}
    closeModal();await loadAllData();customAlert(`✅ ${apps.length}건이 취업성공으로 변경되었습니다.`);
  },'취업성공 처리','#059669');
}
function deleteStudent(id){customConfirm('학생을 삭제하면 관련 지원이력도 함께 삭제됩니다.\n계속하시겠습니까?',async function(){const{error}=await SB.from('students').delete().eq('id',id);if(error){customAlert('삭제 오류: '+error.message);return;}await loadAllData();},'삭제','#DC2626');}
/* ── 지원이력 팝업 ── */
let _historyExpandedJobId=null;

function buildJobInlineDetail(jobId){
  const job=JOBS.find(j=>j.id===jobId);if(!job)return'';
  return`<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-top:6px;font-size:11px">
    <div style="display:flex;flex-wrap:wrap;gap:10px 20px">
      ${job.type?`<div><span style="color:#6B7280">채용형태</span> <strong>${esc(job.type)}</strong></div>`:''}
      ${job.docDate?`<div><span style="color:#6B7280">서류접수</span> <strong>${fmt(job.docDate)}</strong></div>`:''}
      ${job.applyDeadline?`<div><span style="color:#6B7280">서류마감</span> <strong>${fmt(job.applyDeadline)}</strong></div>`:''}
      ${job.documentPassDate?`<div><span style="color:#6B7280">서류합격발표</span> <strong>${fmt(job.documentPassDate)}</strong></div>`:''}
      ${job.interviewDate?`<div><span style="color:#6B7280">면접일</span> <strong style="color:#7C3AED">${fmt(job.interviewDate)}</strong></div>`:''}
      ${job.finalDate?`<div><span style="color:#6B7280">최종합격발표</span> <strong style="color:#059669">${fmt(job.finalDate)}</strong></div>`:''}
      ${job.startDate?`<div><span style="color:#6B7280">근무시작</span> <strong>${fmt(job.startDate)}</strong></div>`:''}
      ${job.jobUrl?`<div style="flex:1;min-width:100%"><span style="color:#6B7280">공고URL</span> <a href="${esc(job.jobUrl)}" target="_blank" style="color:#2563EB;font-size:10px;word-break:break-all">${esc(job.jobUrl.length>40?job.jobUrl.slice(0,40)+'…':job.jobUrl)}</a></div>`:''}
      ${job.note?`<div style="flex:1;min-width:100%"><span style="color:#6B7280">메모</span> ${esc(job.note)}</div>`:''}
    </div>
  </div>`;
}

function openHistoryModal(studentId){
  const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;
  _historyExpandedJobId=null;
  _renderHistoryModal(studentId,s);
}
function _renderHistoryModal(studentId,s){
  const apps=getApps(studentId),sorted=[...apps].sort((a,b)=>(b.docDate||'').localeCompare(a.docDate||''));
  const pass=apps.filter(a=>a.status==='최종합격'||a.status==='취업성공').length;
  const ongoing=apps.filter(a=>!['최종합격','취업성공','불합격'].includes(a.status)).length;
  const tlRows=sorted.length===0?`<div style="text-align:center;padding:30px;color:#CBD5E1;font-size:13px">지원 이력 없음</div>`:sorted.map((ap,i)=>{
    const sc=STATUS_COLORS[ap.status]||'#6B7280',isLast=i===sorted.length-1;
    const isExpanded=_historyExpandedJobId===ap.jobId;
    return`<div style="position:relative;padding-left:28px;padding-bottom:${isLast?'0':'16px'}">
      ${!isLast?`<div style="position:absolute;left:7px;top:18px;bottom:0;width:2px;background:#E5E7EB"></div>`:''}
      <div style="position:absolute;left:0;top:4px;width:16px;height:16px;border-radius:50%;background:${sc};border:3px solid #fff;box-shadow:0 0 0 2px ${sc}44"></div>
      <div style="background:#F8FAFC;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px">
          ${ap.docDate?`<span style="font-size:10px;color:#94A3B8;font-weight:600">${fmt(ap.docDate)}</span>`:''}
          ${badge(ap.category)}
          <span style="background:${sc}22;color:${sc};padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid ${sc}44">${esc(ap.status)}</span>
          ${ap.grade?`<span style="font-size:10px;color:#94A3B8">${esc(ap.grade)}</span>`:''}
          ${(ap.status==='최종합격'||ap.status==='취업성공')?'<span style="font-size:11px">🎉</span>':''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button onclick="_historyExpandedJobId=${isExpanded?'null':ap.jobId};_reRenderHistory(${studentId})" style="border:none;background:none;cursor:pointer;color:#2563EB;font-weight:700;font-size:13px;text-decoration:underline;padding:0;font-family:inherit;text-align:left">${esc(ap.jobName)}</button>
          <span style="font-size:10px;color:#94A3B8">${isExpanded?'▲ 닫기':'▼ 공고 상세'}</span>
        </div>
        ${isExpanded?buildJobInlineDetail(ap.jobId):''}
        ${ap.memo?`<p style="margin:6px 0 0;font-size:11px;color:#6B7280">${esc(ap.memo)}</p>`:''}
        ${ap.interviewDocSent?`<p style="margin:4px 0 0;font-size:10px;color:#94A3B8">자료발송: ${fmt(ap.interviewDocSent)}</p>`:''}
        ${ap.interviewFeedback?`<p style="margin:3px 0 0;font-size:11px;color:#475569">${esc(ap.interviewFeedback)}</p>`:''}
      </div>
    </div>`;
  }).join('');
  const memoSection=s.counselingMemo?`<div style="background:#FFFBEB;border:1px solid #FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 6px;font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em">📝 상담 메모</p><p style="margin:0;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap">${esc(s.counselingMemo)}</p></div>`:'';
  const resBadge=getRestrictionBadge(s);
  const stObj=getStudentStatus(s.id);
  showModal(s.name+' — 지원이력 & 타임라인',`${memoSection}<div style="display:flex;gap:10px;margin-bottom:16px;padding:10px 14px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;flex-wrap:wrap;align-items:center"><span style="background:${stObj.bg};color:${stObj.color};border:1px solid ${stObj.border};padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${stObj.emoji} ${stObj.label}</span>${resBadge?`<span style="color:#D1D5DB">|</span>${resBadge}`:''}<span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#374151"><strong>${apps.length}</strong>건 지원</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#059669"><strong>${pass}</strong>건 합격</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#2563EB"><strong>${ongoing}</strong>건 진행 중</span></div><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">📅 지원 타임라인 · 기관명 클릭 시 공고 상세 토글</p><div style="padding-left:4px">${tlRows}</div><div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6;gap:8px;flex-wrap:wrap">${btn('📥 CSV 내보내기',`exportHistory(${studentId})`,'success')} ${btn('✏ 학생 수정',`closeModal();openEditStudentModal(${studentId})`,'outline')}</div>`,'660px');
}
window._reRenderHistory=function(studentId){
  const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;
  _renderHistoryModal(studentId,s);
};

/* ── CSV ── */
function exportJobs(){csvExport(getSorted(getFiltered()).map((j,i)=>({'No':i+1,'카테고리':j.category,'채용형태':j.type,'공고명':j.name,'서류접수일':j.docDate||'','서류마감일':j.applyDeadline||'','서류합격발표일':j.documentPassDate||'','면접일':j.interviewDate||'','최종합격발표일':j.finalDate||'','공고URL':j.jobUrl||'','지원자수':j.applicants.length,'서류합격':j.applicants.filter(a=>a.status==='서류합격').length,'면접대기':j.applicants.filter(a=>a.status==='면접대기').length,'합격':j.applicants.filter(a=>a.status==='최종합격'||a.status==='취업성공').length,'불합격':j.applicants.filter(a=>a.status==='불합격').length,'상태':j.isClosed?'마감':'진행'})),'공고목록_v71');}
function exportStudents(){const filtered=filterStudents();csvExport(filtered.map((s,i)=>{const apps=getApps(s.id),st=getStudentStatus(s.id);return{'No':i+1,'이름':s.name,'상태':st.label,'등급제한':s.restrictionLevel||'없음','나이':s.age||'미등록','연락처':s.phone,'이메일':s.email,'지원횟수':apps.length,'최종합격':apps.filter(a=>a.status==='최종합격'||a.status==='취업성공').length,'상담메모':s.counselingMemo||''};}),'학생DB_v71');}
function exportHistory(studentId){const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;csvExport(getApps(studentId).map(a=>({'기관명':a.jobName,'카테고리':a.category,'서류접수일':a.docDate||'','최종합격발표일':a.finalDate||'','상태':a.status,'급수':a.grade,'발표방식':a.announceType,'메모':a.memo||''})),s.name+'_지원이력');}

/* ── 초기화 ── */
async function init(){setView('dashboard');showLoading();try{await loadAllData();}finally{hideLoading();}setupRealtime();}
init();
</script>
