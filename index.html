<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorizava Archive v1.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,* {box-sizing:border-box}
body{height:100%;overflow:hidden;font-family:'Pretendard Variable','Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color:#1F2937}
body{font-family:'Pretendard Variable','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#FFFFFF;font-size:13px;color:#111111}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}::-webkit-scrollbar-track{background:transparent}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit;color:#111111}
/* ── 전역 텍스트 가시성 강제 적용 ── */
div,span,p,h1,h2,h3,h4,td,th,label{color:inherit}
.tbl-tr:hover{background:#F8FAFC!important}.acc-tr:hover{background:#EFF6FF!important}.emp-tr:hover{background:#F0FDF4!important}
.job-name-btn:hover{color:#1D4ED8!important;text-decoration:underline!important}
.row-urgent{background:#FFF1E6!important}.row-urgent:hover{background:#FFE8D6!important}
.row-restricted{background:#FFF5F5!important}.row-restricted:hover{background:#FEE2E2!important}
.job-detail-panel{background:#F0F7FF;border-left:4px solid #2563EB;border-bottom:2px solid #DBEAFE}
.cat-tab-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}.cat-tab-wrap::-webkit-scrollbar{display:none}
.emp-kpi-card{border-radius:10px;padding:10px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rowIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:4000px}}
@keyframes boardCardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.emp-row-anim{animation:rowIn .18s ease both}
input[type="month"]{-webkit-appearance:none;appearance:none}
.sort-th{transition:background .12s,color .12s}.sort-th:hover{background:#EFF6FF!important;color:#2563EB!important}
.inst-group{background:#fff;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;transition:box-shadow .15s;margin-bottom:8px}
.inst-group:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.inst-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;transition:background .12s}
.inst-header:hover{background:#F8FAFC}
.inst-header.expanded{background:#EFF6FF}
.inst-body{border-top:1px solid #E5E7EB;animation:slideDown .2s ease}
#dash-recruitment{padding:6px 24px 0;flex-shrink:0}
.rec-chip{background:#fff;border:1.5px solid #E2E8F0;border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:border-color .12s,background .12s,color .12s,box-shadow .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;font-family:inherit;color:#374151}
.rec-chip:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}
.rec-chip.sel{background:#2563EB;color:#fff;border-color:#2563EB;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.entry-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #F3F4F6;transition:background .1s}
.entry-row:last-child{border-bottom:none}
.entry-row:hover{background:#FAFAFA}
.entry-row.sel{background:#F0F9FF!important}
#dash-root{display:flex;flex-direction:column;height:100%;overflow-y:auto;background:#FAFAF9;color:#0F172A}
#dash-header{padding:14px 24px 8px;flex-shrink:0}
#dash-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 24px;flex-shrink:0}
#dash-monthly{padding:8px 24px 0;flex-shrink:0}
#dash-4grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:12px 24px 20px;flex-shrink:0}
.dash-card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;overflow:hidden;display:flex;flex-direction:column;height:440px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.dash-card-head{padding:13px 18px 11px;flex-shrink:0;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:8px}
.dash-card-body{flex:1;overflow-y:auto;padding:14px 16px 14px;min-height:0;display:flex;flex-direction:column}
#dash-alerts{padding:0 24px 8px;flex-shrink:0}
/* ── 전국현황 — Fintech Bento Grid v5 ── */
@keyframes panelReveal{from{opacity:0;transform:translateY(-14px) scale(.99)}to{opacity:1;transform:none}}
.nat-board-card{
  background:#FFFFFF;
  border:1px solid rgba(0,0,0,.055);
  border-radius:22px;
  padding:20px 22px 52px;
  cursor:pointer;
  transition:box-shadow .32s cubic-bezier(.4,0,.2,1),transform .32s cubic-bezier(.4,0,.2,1),border-color .22s,background .22s;
  animation:boardCardIn .38s cubic-bezier(.22,1,.36,1) both;
  position:relative;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);
}
/* 상단 컬러 스트라이프 */
.nat-board-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:22px 22px 0 0;
  background:linear-gradient(90deg,#6366F1,#818CF8,#38BDF8);
  opacity:0;transition:opacity .24s;
}
.nat-board-card.rank-1::before{background:linear-gradient(90deg,#D97706,#F59E0B,#FCD34D);opacity:1}
.nat-board-card.rank-2::before{background:linear-gradient(90deg,#64748B,#94A3B8,#CBD5E1);opacity:1}
.nat-board-card.rank-3::before{background:linear-gradient(90deg,#92400E,#B45309,#D97706);opacity:.9}
.nat-board-card:hover::before{opacity:1!important}
/* Rank 배경 워시 */
.nat-board-card.rank-1:not(.sel){background:linear-gradient(155deg,#FAFBFF 0%,#EEF0FF 100%)}
.nat-board-card.rank-2:not(.sel){background:linear-gradient(155deg,#FAFAFA 0%,#F0F4F8 100%)}
.nat-board-card.rank-3:not(.sel){background:linear-gradient(155deg,#FFFBF5 0%,#FFF0D8 100%)}
/* Hover */
.nat-board-card:hover{
  box-shadow:0 10px 36px rgba(0,0,0,.09),0 24px 64px rgba(99,102,241,.13);
  transform:translateY(-7px) scale(1.013);
  border-color:#C7D2FE;
}
/* 선택 상태 */
.nat-board-card.sel{
  background:linear-gradient(155deg,#F8F9FF 0%,#EEF2FF 100%)!important;
  border-color:#A5B4FC;
  box-shadow:0 8px 30px rgba(99,102,241,.18),0 2px 8px rgba(99,102,241,.12);
}
.nat-board-card.sel::before{opacity:1}
/* 벤토 와이드 카드 */
.nat-board-card.wide{grid-column:span 2}
/* 제로 상태 */
.nat-board-card.zero{opacity:.48}
.nat-board-card.zero:hover{opacity:.72}
/* ── 숨겨진 '상세보기' 화살표 ── */
.nat-card-arrow{
  position:absolute;bottom:16px;right:18px;
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#818CF8,#4F46E5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15px;font-weight:300;line-height:1;
  opacity:0;transform:translateX(12px) scale(.78);
  transition:opacity .26s cubic-bezier(.4,0,.2,1),transform .26s cubic-bezier(.4,0,.2,1);
  box-shadow:0 4px 16px rgba(99,102,241,.42);
  pointer-events:none;
}
.nat-board-card:hover .nat-card-arrow{opacity:1;transform:translateX(0) scale(1)}
.nat-board-card.sel .nat-card-arrow{opacity:.7;transform:translateX(0) scale(1)}
/* ── 타이포그래피 ── */
.nat-board-card .reg-name{
  font-size:10px;font-weight:700;
  color:#1A1A1A;letter-spacing:.07em;
  text-transform:uppercase;line-height:1.2;
}
.nat-board-card.sel .reg-name{color:#3730A3}
.nat-board-card .reg-count{
  font-size:52px;font-weight:200;
  color:#111111;letter-spacing:-.08em;line-height:1;
  font-variant-numeric:tabular-nums;
}
.nat-board-card.wide .reg-count{font-size:64px;font-weight:200}
.nat-board-card.sel .reg-count{color:#2E26B0}
.nat-board-card.zero .reg-count{color:#CACACE}
.nat-board-card .reg-unit{
  font-size:13px;font-weight:500;color:#555555;
  margin-left:3px;letter-spacing:.02em;align-self:flex-end;margin-bottom:8px;
}
/* ── 슬림 게이지 바 ── */
.nat-board-card .reg-bar-bg{
  height:3px;background:#F0F0F4;border-radius:99px;overflow:hidden;margin-top:12px;
}
.nat-board-card .reg-bar-fill{
  height:100%;
  background:linear-gradient(90deg,#6366F1,#5558F0,#4338CA);
  border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1);
}
.nat-board-card.sel .reg-bar-fill{background:linear-gradient(90deg,#818CF8,#5558F0,#3730A3)}
.nat-board-card.zero .reg-bar-fill{background:#E5E5EA}
/* ── 공고 리스트 행 ── */
.nat-job-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 10px;border-bottom:1px solid #F4F4F6;
  transition:background .14s;cursor:default;border-radius:8px;margin:0 -10px;
}
.nat-job-row:last-child{border-bottom:none}
.nat-job-row:hover{background:#F5F6FF}
/* ── 상단 요약 스탯 카드 ── */
.nat-stat-card{
  border-radius:18px;padding:18px 22px;flex:1;min-width:130px;
}
/* ── 선택 지역 상세 패널 ── */
.nat-detail-panel{
  background:#fff;border:1.5px solid #E8EAFF;border-radius:22px;
  padding:28px 30px;margin-top:22px;
  box-shadow:0 2px 8px rgba(99,102,241,.05),0 8px 24px rgba(99,102,241,.06);
  animation:panelReveal .32s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
#_print_target{display:none}
@media print{
  body>*{display:none!important}
  #_print_target{display:block!important;overflow:visible!important}
  *{overflow:visible!important;max-height:none!important;box-shadow:none!important}
  /* ── @page: margin 0으로 브라우저 자동 정보(날짜·URL) 제거, 여백은 .pdf-pg로 ── */
  @page{margin:0;size:A4}
  .pdf-wrap{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#1E293B;background:#fff;position:relative;}
  /* ── 워터마크 ── */
  .pdf-wm{position:fixed;top:-15%;left:-15%;width:200%;height:200%;display:flex;flex-direction:column;gap:0;pointer-events:none;z-index:0;transform:rotate(-28deg);}
  .pdf-wm-r{display:flex;gap:0;white-space:nowrap;height:54pt;align-items:center;}
  .pdf-wm-c{font-size:13pt;font-weight:900;color:rgba(180,180,180,.05);letter-spacing:.22em;padding:0 24pt;white-space:nowrap;user-select:none;flex-shrink:0;}
  /* ── 페이지 래퍼: @page margin 0 보정으로 직접 여백 확보 ── */
  .pdf-pg{position:relative;z-index:1;padding:20mm 22mm 18mm;box-sizing:border-box;}
  /* ══════════════════════════════
     헤더: 연한 하늘색 배경 + 타이틀 한 줄 중앙
  ══════════════════════════════ */
  .pdf-hdr{
    background:linear-gradient(160deg,#EFF6FF 0%,#F0F9FF 100%);
    border:1.5pt solid #BFDBFE;
    border-radius:6pt;
    padding:14pt 22pt 12pt;
    margin-bottom:18pt;
    text-align:center;
  }
  /* 메인 타이틀: 한 줄 유지 */
  .pdf-hdr-title{
    font-size:21pt;
    font-weight:900;
    color:#0F172A;
    white-space:nowrap;
    letter-spacing:-.03em;
    line-height:1.25;
    display:block;
  }
  /* 보조 정보: 문항 수 등 */
  .pdf-hdr-sub{
    font-size:9pt;
    font-weight:500;
    color:#475569;
    margin-top:5pt;
    display:block;
    letter-spacing:.04em;
  }
  /* ══════════════════════════════
     질문 목록
  ══════════════════════════════ */
  .pdf-ql{margin-top:4pt;display:flex;flex-direction:column;}
  /* ── 개별 질문 행 ── break-inside:avoid로 페이지 경계 짤림 방지 */
  .pdf-qi{
    display:flex;
    align-items:flex-start;
    gap:14pt;
    padding:10pt 2pt;
    border:none!important;
    background:none!important;
    outline:none!important;
    border-bottom:.75pt dashed #CBD5E1!important;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .pdf-qi:last-child{border-bottom:none!important;}
  /* ── 노란 원형 번호표 ── */
  .pdf-qi-n{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:25pt;height:25pt;
    border-radius:50%;
    background:#F5C030;
    color:#0F172A;
    font-size:10.5pt;font-weight:900;
    flex-shrink:0;
    line-height:1;
    letter-spacing:0;
    margin-top:1.5pt;
  }
  /* ── 질문 텍스트 ── */
  .pdf-qi-t{
    font-size:12pt;font-weight:700;
    color:#1E293B;
    line-height:1.7;
    flex:1;
  }
  /* ── 날짜 뱃지: 연한 회색 라운드 박스 ── */
  .pdf-qi-date{
    font-size:7.5pt;
    color:#475569;
    font-weight:700;
    background:#F1F5F9;
    border:.5pt solid #CBD5E1;
    border-radius:3pt;
    padding:2pt 6pt;
    white-space:nowrap;
    flex-shrink:0;
    align-self:flex-start;
    margin-top:3.5pt;
    letter-spacing:.02em;
  }
  /* ── 폴백: 자유형 텍스트 ── */
  .pdf-raw{
    font-size:11pt;line-height:2.0;color:#1E293B;
    white-space:pre-wrap;word-break:break-word;
    margin-top:10pt;background:none;border:none;padding:0;
  }
  /* ── 푸터 ── */
  .pdf-ftr{
    margin-top:20pt;padding-top:8pt;
    border-top:.75pt solid #CBD5E1;
    display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .pdf-ftr-brand{font-size:8pt;font-weight:800;color:#334155;letter-spacing:.14em;}
  .pdf-ftr-sec{font-size:7pt;color:#64748B;text-align:right;line-height:1.7;}
}
@media(max-width:900px){#dash-4grid{grid-template-columns:1fr;gap:10px;padding:10px 14px 16px}.dash-card{height:380px}#dash-kpi{grid-template-columns:repeat(2,1fr);padding:0 14px}#dash-header,#dash-monthly{padding-left:14px;padding-right:14px}}
@media(max-width:500px){.dash-card{height:340px}#dash-kpi{grid-template-columns:1fr 1fr}}
/* ═══ DASHBOARD LIGHT THEME ═══ */
#dash-root{background:#FAFAF9;color:#0F172A}
.dk-card{background:#fff;border:0.5px solid #E2E8F0;border-radius:12px;overflow:hidden;color:#0F172A}
.dk-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 22px;flex-shrink:0}

.dk-kpi-card:hover{box-shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.08)}

<body>
<!-- ── 로그인 화면 ── -->
<div id="_login_screen" style="display:none;position:fixed;inset:0;z-index:9999;background:#0C1524;align-items:center;justify-content:center;font-family:'Pretendard Variable','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(37,99,235,.18) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(124,58,237,.12) 0%,transparent 55%);pointer-events:none"></div>
  <div style="position:relative;width:440px;max-width:92vw;background:#111C2E;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.5)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(37,99,235,.4)">
        <i class="ti ti-building-community" style="font-size:28px;color:#fff" aria-hidden="true"></i>
      </div>
      <div style="font-size:23px;font-weight:900;color:#fff;margin-bottom:5px;letter-spacing:-.3px">Sorizava Archive</div>
      <div style="font-size:13px;color:#64748B">채용 관리 시스템 v1.0</div>
    </div>
    <div style="margin-bottom:20px">

const GEO_TO_LOC=(function(){
  var m={};
  /* 기본 정방향/역방향 매핑 */
  Object.entries(GEO_NAME_MAP).forEach(function(e){m[e[1]]=e[0];});

  m['전라북도']='전북';
  return m;
})();
/* geoNameToLoc: GeoJSON 지역명 → DB 저장값
   1순위: 정확 매칭  2순위: includes 포함 매칭  3순위: 단축 키 포함 */
function geoNameToLoc(gName){
  if(!gName)return null;
  if(GEO_TO_LOC[gName])return GEO_TO_LOC[gName];
  var locKeys=Object.keys(GEO_NAME_MAP);
  for(var i=0;i<locKeys.length;i++){
    var loc=locKeys[i];
    var full=GEO_NAME_MAP[loc];
    if(gName.includes(full)||full.includes(gName)||gName.includes(loc)){return loc;}
  }
  return null;
}

var fmt=function(d){return d?String(d).replace(/-/g,'.'):'-';};
/* ─ 날짜 문자열에서 YYYY-MM 추출 (여러 형식 대응: YYYY-MM-DD, YYYY.MM.DD, YYYY/MM/DD 등) ─ */
function parseDocMonth(dateStr){
  if(!dateStr)return'';
  var s=String(dateStr).trim();
  var m=s.match(/(\d{4})[-.\\/년\s](\d{1,2})/);
  if(m)return m[1]+'-'+('0'+m[2]).slice(-2);
  /* 8자리 숫자 YYYYMMDD 형식도 처리 */
  var m2=s.match(/^(\d{4})(\d{2})/);
  if(m2)return m2[1]+'-'+m2[2];
  return'';
}

/* ── 기간 선택 헬퍼 ── */
function getDashPeriod(){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,'0');};
  var fmt=function(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
  if(_dashPeriodMode==='today'){var t=fmt(now);return{from:t,to:t};}
  if(_dashPeriodMode==='week'){
    var day=now.getDay();
    var mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));
    var sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return{from:fmt(mon),to:fmt(sun)};
  }
  if(_dashPeriodMode==='month'){
    var y=now.getFullYear(),m=now.getMonth()+1;
    var last=new Date(y,m,0).getDate();
    return{from:y+'-'+pad(m)+'-01',to:y+'-'+pad(m)+'-'+last};
  }
  if(_dashPeriodMode==='prev'){
    var d=new Date(now.getFullYear(),now.getMonth()-1,1);
    var y=d.getFullYear(),m=d.getMonth()+1;
    var last=new Date(y,m,0).getDate();
    return{from:y+'-'+pad(m)+'-01',to:y+'-'+pad(m)+'-'+last};
  }
  /* custom */
  var t=fmt(now);
  return{from:_dashDateFrom||t,to:_dashDateTo||t};
}
function setDashPeriod(mode,fr,to){
  _dashPeriodMode=mode;
  if(fr)_dashDateFrom=fr;
  if(to)_dashDateTo=to;
  /* selectedMonth 동기화 */
  var p=getDashPeriod();
  selectedMonth=p.from.slice(0,7);
  _dashInstSel=null;
  _dashLastRefresh=(new Date()).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  renderView();
}

function isToday(d){return !!d&&String(d).slice(0,10)===TODAY;}
function calcDDay(ds){
  if(!ds)return null;
  var s=String(ds).slice(0,10);
  var parts=s.split('-').map(Number);
  var tparts=TODAY.split('-').map(Number);
  return Math.round((new Date(parts[0],parts[1]-1,parts[2])-new Date(tparts[0],tparts[1]-1,tparts[2]))/86400000);
}

}

function csvExport(data,name){
  if(!data||!data.length)return;

  var csv=[hdrs.join(',')].concat(rows).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});

}

/* ─ 질문 파싱 (공용) ─ */
function parseQsShared(text){
  try{
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    var pat=/^(\d{1,2}[\.\)\s]+|Q[\.\:\s]+|[①-⑳]\s*)/;
    var qs=[],buf='';
    lines.forEach(function(line){
      if(pat.test(line)){if(buf)qs.push(buf.trim());buf=line.replace(pat,'').trim();}
      else{buf=buf?(buf+' '+line):line;}
    });
    if(buf)qs.push(buf.trim());
    return qs.filter(function(q){return q.length>1;});
  }catch(e){return[];}
}

/* ─ 자료실 그룹화 ─ */
function getGroupedVault(){
  try{
    var filtered=VAULT.slice();
    if(vaultFilter!=='전체')filtered=filtered.filter(function(v){return v.category===vaultFilter;});
    if(vaultKw.trim()){
      var kw=vaultKw.trim();
      filtered=filtered.filter(function(v){return v.institutionName.indexOf(kw)>=0||v.content.indexOf(kw)>=0;});
    }
    var groupMap={};
    filtered.forEach(function(v){
      var k=v.institutionName||'(기관명 없음)';
      if(!groupMap[k])groupMap[k]={institutionName:k,category:v.category,items:[]};
      groupMap[k].items.push(v);
    });
    var groups=Object.values(groupMap);
    groups.forEach(function(g){
      g.items.sort(function(a,b){
        if((b.year||0)!==(a.year||0))return (b.year||0)-(a.year||0);
        return (b.createdAt||'').localeCompare(a.createdAt||'');
      });
      var latest=g.items[0];
      g.category=latest?latest.category:g.category;
    });
    groups.sort(function(a,b){
      var aMax=Math.max.apply(null,a.items.map(function(i){return i.year||0;}));
      var bMax=Math.max.apply(null,b.items.map(function(i){return i.year||0;}));
      if(bMax!==aMax)return bMax-aMax;
      return a.institutionName.localeCompare(b.institutionName);
    });
    return groups;
  }catch(e){console.error('getGroupedVault error',e);customAlert('그룹화 오류: '+(e.message||JSON.stringify(e)));return[];}
}

function filterStudents(){
  var kw=studentFilter.kw.trim().toLowerCase();
  return STUDENTS.filter(function(s){
    if(kw){
      var nameMatch=s.name.toLowerCase().indexOf(kw)>=0;
      var phoneMatch=(s.phone||'').indexOf(kw)>=0;
      var emailMatch=(s.email||'').toLowerCase().indexOf(kw)>=0;
      /* 기관명/공고명 검색 — 이 학생이 지원한 공고 중 이름에 키워드가 있는지 */
      var jobMatch=JOBS.some(function(j){
        if(!j.applicants.some(function(a){return a.studentId===s.id||a.studentId===String(s.id);}))return false;
        return j.name.toLowerCase().indexOf(kw)>=0||
               (j.category||'').toLowerCase().indexOf(kw)>=0||
               (j.location||'').toLowerCase().indexOf(kw)>=0;
      });
      if(!nameMatch&&!phoneMatch&&!emailMatch&&!jobMatch)return false;
    }
    if(studentFilter.grade!=='전체'&&!getApps(s.id).some(function(a){return a.grade===studentFilter.grade;}))return false;
    if(studentFilter.statusTab!=='전체'){var st=getStudentStatus(s.id);if(st.label!==studentFilter.statusTab)return false;}
    return true;
  });
}

/* ─ 스마트 알림 ─ */
function getThisWeekInterviews(){
  var result=[],todayMs=new Date(TODAY).getTime(),weekMs=todayMs+7*86400000;
  JOBS.forEach(function(j){
    if(!j.interviewDate)return;
    var d=new Date(String(j.interviewDate).slice(0,10)).getTime();
    if(d>=todayMs&&d<=weekMs){
      j.applicants.filter(function(a){return a.status==='면접대기';}).forEach(function(a){
        var st=STUDENTS.find(function(s){return s.id===a.studentId;});
        if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category});
      });
    }
  });
  return result;
}
function getLongPendingNoReply(){
  var result=[],todayMs=new Date(TODAY).getTime();
  JOBS.forEach(function(j){
    j.applicants.forEach(function(a){
      if(!a.interviewDocSent)return;
      var sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&(a.interviewFeedback||'').indexOf('회신완료')<0){
        var st=STUDENTS.find(function(s){return s.id===a.studentId;});
        if(st)result.push({studentName:st.name,jobName:j.name,daysDiff:diff,category:j.category});
      }
    });
  });
  return result;
}

/* ─ 데이터 로드 ─ */
/* safeArr: Supabase 응답에서 순수 plain-object 배열만 추출
   (DataCloneError 방지 — headers/prototype 등 비직렬화 객체 제거) */
function safeArr(res){
  try{
    var raw=res&&res.data;
    if(!raw||!Array.isArray(raw))return[];
    /* JSON round-trip으로 non-cloneable 속성 완전 제거 */
    return JSON.parse(JSON.stringify(raw));
  }catch(e){return[];}
}
async function loadAllData(){
  try{
    var r0=await SB.from('students').select('*').order('created_at',{ascending:false});
    var r1=await SB.from('jobs').select('*').order('created_at',{ascending:false});
    var r2=await SB.from('applicants').select('*');
    var r3=await SB.from('interview_vault').select('*').order('year',{ascending:false}).order('created_at',{ascending:false});
    var r4=await SB.from('training_courses').select('*').order('created_at',{ascending:false});
    var r5=await SB.from('training_participants').select('*').order('created_at',{ascending:false});

    /* 에러 체크 — error 객체도 message 문자열만 추출 */
    var errs=[r0,r1,r2].map(function(r){return r&&r.error;}).filter(Boolean);
    if(errs.length){
      var msg=errs.map(function(e){return(typeof e==='object'&&e.message)?e.message:String(e);}).join(' / ');
      console.error('DB error',errs);
      customAlert('DB 에러: '+msg);
      return;
    }

    /* plain-object 배열만 추출 (DataCloneError 원천 차단) */
    var sd=safeArr(r0);
    var jd=safeArr(r1);
    var ad=safeArr(r2);
    var vd=safeArr(r3);
    var tcd=safeArr(r4);
    var tpd=safeArr(r5);

    STUDENTS=sd.map(dbToStudent);
    var jobs=jd.map(dbToJob);
    var aps=ad.map(dbToApplicant);
    JOBS=jobs.map(function(j){return Object.assign({},j,{applicants:aps.filter(function(a){return a.jobId===j.id;})});});
    VAULT=vd.map(dbToVault);
    TR_COURSES=tcd;
    TR_PARTICIPANTS=tpd;
    /* employers (없으면 빈 배열) */
    try{var r6=await SB.from('employers').select('*').order('name',{ascending:true});EMPLOYERS=(r6&&!r6.error)?safeArr(r6):[];}catch(e){EMPLOYERS=[];}
    /* favorites (없으면 빈 배열) */
    try{var r7=await SB.from('favorites').select('*').order('created_at',{ascending:false});FAVORITES=(r7&&!r7.error)?safeArr(r7):[];}catch(e){FAVORITES=[];}
    console.log('Loaded: students='+STUDENTS.length+' jobs='+JOBS.length+' vault='+VAULT.length+' employers='+EMPLOYERS.length+' favorites='+FAVORITES.length);
    renderView();
  }catch(err){console.error('loadAllData error',err);customAlert('네트워크 오류: '+(err&&err.message||String(err)));}
}

function buildWatermark(){var rows=Array.from({length:22},function(){return'<div class="pdf-wm-r">'+Array.from({length:8},function(){return'<span class="pdf-wm-c">SORIZAVA ACADEMY</span>';}).join('')+'</div>';}).join('');return'<div class="pdf-wm">'+rows+'</div>';}
function yearLabel(year){return year?'\''+String(year).slice(2)+'년':'';}

/* ─ PDF: 단일 자료 출력 ─ */
function printVaultPDF(vaultId){
  var v=VAULT.find(function(x){return x.id===vaultId;});
  if(!v){customAlert('자료를 찾을 수 없습니다.');return;}
  var qs=parseQsShared(v.content);
  var isQ=qs.length>=2;
  var yl=yearLabel(v.year);
  /* 타이틀: [기관명] 면접 기출 완벽 가이드 */
  var mainTitle=esc(v.institutionName)+' 면접 기출 완벽 가이드';

  if(isQ)subParts.push('총 '+qs.length+'개 문항');

  var html='<div class="pdf-wrap">'+buildWatermark()+'<div class="pdf-pg">'+hdrHtml+bodyHtml+'<div class="pdf-ftr"><div class="pdf-ftr-brand">SORIZAVA ACADEMY</div><div class="pdf-ftr-sec">본 자료의 저작권은 SORIZAVA ACADEMY에 있습니다.<br>무단 배포 시 법적 책임을 물을 수 있습니다.</div></div></div></div>';

/* ─ PDF: 선택 항목 통합 출력 ─ */
function printSelectedVaultPDF(){
  if(!selectedVaultItems.size){customAlert('PDF로 출력할 자료를 체크해주세요.');return;}
  var selected=VAULT.filter(function(v){return selectedVaultItems.has(v.id);});
  if(!selected.length)return;
  var instNames=[...new Set(selected.map(function(v){return v.institutionName;}))];
  var isSingle=instNames.length===1;
  var sorted=selected.slice().sort(function(a,b){return (a.year||9999)-(b.year||9999)||a.institutionName.localeCompare(b.institutionName);});
  var allItems=[],hasQ=false;
  sorted.forEach(function(v){
    var qs=parseQsShared(v.content);
    var yl=yearLabel(v.year);
    if(qs.length>=2){hasQ=true;qs.forEach(function(q){allItems.push({q:q,yl:yl});});}
    else if(v.content.trim()){allItems.push({q:v.content.trim(),yl:yl,raw:true});}
  });
  /* 타이틀 */
  var mainTitle=isSingle?esc(instNames[0])+' 면접 기출 완벽 가이드':'통합 면접 기출 완벽 가이드';

    ?'<div class="pdf-ql">'+allItems.map(function(item,i){return'<div class="pdf-qi"><span class="pdf-qi-n">'+String(i+1).padStart(2,'0')+'</span><span class="pdf-qi-t">'+esc(item.raw?item.q.slice(0,200):item.q)+'</span>'+(item.yl?'<span class="pdf-qi-date">'+item.yl+'</span>':'')+'</div>';}).join('')+'</div>'

  var hdrHtml='<div class="pdf-hdr"><span class="pdf-hdr-title">'+mainTitle+'</span><span class="pdf-hdr-sub">'+esc(subText)+'</span></div>';
  var html='<div class="pdf-wrap">'+buildWatermark()+'<div class="pdf-pg">'+hdrHtml+bodyHtml+'<div class="pdf-ftr"><div class="pdf-ftr-brand">SORIZAVA ACADEMY</div><div class="pdf-ftr-sec">본 자료의 저작권은 SORIZAVA ACADEMY에 있습니다.<br>무단 배포 시 법적 책임을 물을 수 있습니다.</div></div></div></div>';
  var pt=$('_print_target');if(!pt)return;
  pt.innerHTML=html;window.print();setTimeout(function(){pt.innerHTML='';},1500);

/* ─ CSV 미리보기 ─ */
function _previewTrCsv(file,previewId){
  if(!file)return;
  var prev=document.getElementById(previewId);if(!prev)return;
  Papa.parse(file,{
    header:true,skipEmptyLines:true,
    complete:function(res){
      var rows=res.data.filter(function(r){return r['이름']&&r['이름'].trim();});
      if(!rows.length){
        prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">❌ 유효한 데이터가 없습니다.</span></div>';
        window._trImportRows=null;return;
      }
      window._trImportRows=rows;
      prev.innerHTML='<div style="background:#F0FDF4;border-radius:6px;padding:8px 12px;border:1px solid #BBF7D0;display:flex;align-items:center;gap:8px">'+
        '<span style="font-size:16px">✅</span>'+
        '<span style="font-size:12px;font-weight:700;color:#065F46">'+rows.length+'명 인식 완료 — 등록 버튼으로 확정하세요</span></div>';
    },
    error:function(err){
      prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">❌ '+esc(err.message||String(err))+'</span></div>';
    }
  });
}

/* ─ 수강생 일괄 Upsert (phone_number 복합키) ─ */
async function _bulkUpsertParticipants(courseId,rows){
  var allowedStatus=['수료','진행 중','중도포기'];
  var ok=0,fail=0;
  var slice=rows.slice(0,100);
  for(var i=0;i<slice.length;i++){
    var r=slice[i];
    var status=allowedStatus.includes(r['상태'])?r['상태']:'진행 중';
    var obj={
      course_id:Number(courseId),
      student_name:(r['이름']||'').trim(),
      phone_number:(r['휴대전화']||'').trim(),
      license_info:(r['자격증']||'').trim()||null,
      status:status,
      first_test_score:(r['특이사항']||'').trim()||null,
      first_test_result:(r['테스트통과유무']||'').trim()||null
    };
    if(!obj.student_name)continue;
    var res=obj.phone_number
      ?await SB.from('training_participants').upsert(obj,{onConflict:'course_id,phone_number'})
      :await SB.from('training_participants').insert(obj);
    if(res.error)fail++;else ok++;
  }
  return{ok:ok,fail:fail};
}

/* ─ 누적 수료생 집계 (전체 기수 합산) ─ */
function getTrCumulativeStats(){
  /* VOD 기수(type='vod')와 회의록 기수(type='meeting')의 수료생 수를 각각 집계 */
  var vodCourseIds=TR_COURSES.filter(function(c){return c.type!=='meeting';}).map(function(c){return c.id;});
  var meetingCourseIds=TR_COURSES.filter(function(c){return c.type==='meeting';}).map(function(c){return c.id;});
  var totalSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료';}).length;
  var vodSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료'&&vodCourseIds.indexOf(p.course_id)>=0;}).length;
  var meetingSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료'&&meetingCourseIds.indexOf(p.course_id)>=0;}).length;
  var totalParticipants=TR_PARTICIPANTS.length;
  return{total:totalSuryo,vod:vodSuryo,meeting:meetingSuryo,participants:totalParticipants,courses:TR_COURSES.length};
}

/* ─ 기수별 집계 (선택 기수만) ─ */
function getTrStats(){
  /* 선택된 기수의 수강생 통계를 계산합니다 */
  var course={total:0,suryo:0,ongoing:0,drop:0,pass:0,fail:0,advanced:0};
  if(trCourseId!=null){
    var cp=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
    course.total=cp.length;
    course.suryo=cp.filter(function(p){return p.status==='수료';}).length;
    course.ongoing=cp.filter(function(p){return p.status==='진행 중';}).length;
    course.drop=cp.filter(function(p){return p.status==='중도포기';}).length;
    course.pass=cp.filter(function(p){return p.first_test_result==='합격';}).length;
    course.fail=cp.filter(function(p){return p.first_test_result==='불합격';}).length;
    /* 심화 대상자: 수료 완료 + 테스트 합격인 학생 */
    course.advanced=cp.filter(function(p){return p.status==='수료'&&p.first_test_result==='합격';}).length;
  }
  /* 비율 계산 (0으로 나누기 방지) */
  course.suryoRate=course.total>0?Math.round(course.suryo/course.total*100):0;
  course.passRate=course.total>0?Math.round(course.pass/course.total*100):0;
  course.advRate=course.suryo>0?Math.round(course.advanced/course.suryo*100):0;
  return{course:course};
}

function previewEmpCsv(){
  var file=document.getElementById('emp_csv_file');
  if(!file||!file.files||!file.files[0])return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result.replace(/^\uFEFF/,'');
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){customAlert('데이터가 없습니다. (헤더 + 1행 이상 필요)');return;}
    var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
    var nameIdx=headers.indexOf('기관명');
    if(nameIdx<0){customAlert('"기관명" 컬럼이 없습니다. 템플릿을 사용해주세요.');return;}
    var COL_MAP={'카테고리':'category','지역':'location','기관명':'name','채용담당부서':'dept','채용담당자':'contact_person','연락처':'contact_phone','이메일':'contact_email','대표속기사':'stenographer_info','특이사항':'memo','등록일':'last_confirmed'};
    _empCsvRows=[];
    for(var i=1;i<lines.length;i++){
      var cols=lines[i].split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});
      if(!cols[nameIdx])continue;
      var row={};
      headers.forEach(function(h,hi){var key=COL_MAP[h];if(key)row[key]=cols[hi]||'';});
      if(!row.name)continue;
      if(row.last_confirmed&&!/^\d{4}-\d{2}-\d{2}$/.test(row.last_confirmed))row.last_confirmed=null;
      _empCsvRows.push(row);
    }
    var previewHtml='<table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:#F8FAFC">'+['기관명','카테고리','지역','담당자'].map(function(h){return'<th style="padding:5px 8px;text-align:left;color:#6B7280;font-weight:700;border-bottom:1px solid #E5E7EB">'+h+'</th>';}).join('')+'</tr></thead><tbody>'
      +_empCsvRows.slice(0,5).map(function(r){return'<tr style="border-bottom:1px solid #F1F5F9"><td style="padding:5px 8px;font-weight:600">'+esc(r.name||'-')+'</td><td style="padding:5px 8px;color:#64748B">'+esc(r.category||'-')+'</td><td style="padding:5px 8px;color:#64748B">'+esc(r.location||'-')+'</td><td style="padding:5px 8px;color:#64748B">'+esc(r.contact_person||'-')+'</td></tr>';}).join('')
      +(_empCsvRows.length>5?'<tr><td colspan="4" style="padding:5px 8px;color:#64748B;text-align:center">외 '+(_empCsvRows.length-5)+'행 더...</td></tr>':'')
      +'</tbody></table>';
    var prev=document.getElementById('emp_csv_preview');
    var prevTbl=document.getElementById('emp_csv_preview_table');
    var info=document.getElementById('emp_csv_info');
    var importBtn=document.getElementById('_emp_import_btn');
    if(prev)prev.style.display='block';
    if(prevTbl)prevTbl.innerHTML=previewHtml;
    if(info)info.textContent='✅ '+_empCsvRows.length+'개 행 인식됨 · 기존 데이터 유지하고 추가됩니다';
    if(importBtn)importBtn.style.display='inline-block';
  };
  reader.readAsText(file.files[0],'UTF-8');
}
async function executeEmpImport(){
  if(!isAdmin()||!_empCsvRows.length)return;
  var btn=document.getElementById('_emp_import_btn');
  if(btn){btn.disabled=true;btn.textContent='가져오는 중...';}
  var r=await SB.from('employers').insert(_empCsvRows);

    if(btn){btn.disabled=false;btn.textContent='📤 가져오기';}
    customAlert('가져오기 오류: '+r.error.message);return;

  _empCsvRows=[];
}

/* ─ 연수 관리 메인 뷰 v7.0 ─ */
function renderTraining(){
  /* ── 누적 통계 및 기수별 집계 ── */
  var cumul=getTrCumulativeStats();   /* 전체 누적 수료생 */
  var stats=getTrStats();             /* 선택 기수 통계 */
  var curCourse=trCourseId!=null?TR_COURSES.find(function(c){return c.id===trCourseId;}):null;

  /* ── 수강생 필터링 로직 ──
     1) 검색어 있으면 전체 기수에서 이름/번호 뒷4자리 검색
     2) 기수 선택 시 해당 기수 수강생만 표시
     3) 상태(trStatus) 필터 적용
     4) 테스트결과(trTestFilter) 필터 적용
        - 'advanced' = 수료 완료 + 테스트 합격(심화 대상자)
  */
  var members;
  if(trKw.trim()){
    var kw=trKw.trim();
    members=TR_PARTICIPANTS.filter(function(p){
      return p.student_name.indexOf(kw)>=0||(p.phone_number||'').slice(-4).indexOf(kw)>=0;
    });
  }else if(trCourseId!=null){
    members=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
  }else{
    members=[];
  }
  if(trStatus!=='전체')members=members.filter(function(p){return p.status===trStatus;});
  if(trTestFilter==='합격')members=members.filter(function(p){return p.first_test_result==='합격';});
  else if(trTestFilter==='불합격')members=members.filter(function(p){return p.first_test_result==='불합격';});
  else if(trTestFilter==='advanced'){
    /* 심화 대상자: 수료 완료 AND 테스트 합격 */
    members=members.filter(function(p){return p.status==='수료'&&p.first_test_result==='합격';});
  }
  window._trCurrentMembers=members; /* 엑셀 다운로드용 */

  var visibleIds=members.map(function(p){return p.id;});
  var allInCourse=trCourseId!=null?TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;}):[];

/* ─ 블랙리스트 시스템 ─ */
function getBlacklistCandidates(){
  var todayMs=new Date(TODAY).getTime();
  var result=[];
  JOBS.forEach(function(j){
    j.applicants.forEach(function(ap){
      if(!ap.interviewDocSent)return;
      var sentMs=new Date(String(ap.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&(ap.interviewFeedback||'').indexOf('회신완료')<0){
        var st=STUDENTS.find(function(s){return s.id===ap.studentId;});
        if(st&&st.restrictionLevel!=='제한'){
          result.push({student:st,ap:ap,job:j,daysDiff:diff});
        }
      }
    });
  });
  return result;
}
function confirmBlacklist(studentId){
  var st=STUDENTS.find(function(s){return s.id===studentId;});
  if(!st)return;
  var msg='"'+st.name+'" ('+(st.phone||'-')+')\n\n이 학생을 영구 블랙리스트로 등록하시겠습니까?\n\n이후 동일 전화번호 등록 시 경고가 표시됩니다.';
  customConfirm(msg,async function(){
    var r=await SB.from('students').update({restriction_level:'제한'}).eq('id',studentId);
    if(r.error){customAlert('등록 오류: '+(r.error.message||JSON.stringify(r.error)));return;}
    await loadAllData();
    customAlert('✅ 블랙리스트에 등록되었습니다.');
  },'🚫 블랙 확정','#DC2626');
}
function removeFromBlacklist(studentId){
  var st=STUDENTS.find(function(s){return s.id===studentId;});
  if(!st)return;
  var msg='"'+st.name+'"\n\n블랙리스트에서 해제하시겠습니까?';
  customConfirm(msg,async function(){
    var r=await SB.from('students').update({restriction_level:null}).eq('id',studentId);
    if(r.error){customAlert('오류: '+(r.error.message||JSON.stringify(r.error)));return;}
    await loadAllData();
  },'해제','#059669');
}

function getEmpData(cat){
  var result=[];
  JOBS.forEach(function(j){
    if(cat!=='전체'&&j.category!==cat)return;
    j.applicants.filter(function(a){return a.status==='최종합격'||a.status==='취업성공';}).forEach(function(a){
      var st=STUDENTS.find(function(s){return s.id===a.studentId;});
      result.push({name:st?(isStaff()?maskName(st.name):st.name):'(삭제된 학생)',phone:st?(isStaff()?maskPhone(st.phone||''):st.phone||'-'):'-',email:st?(isStaff()?maskEmail(st.email||''):st.email||'-'):'-',jobName:j.name,category:j.category,finalDate:j.finalDate||'',grade:a.grade||'-',memo:a.memo||''});
    });
  });
  result.sort(function(a,b){return (b.finalDate||'').localeCompare(a.finalDate||'');});
  return result;
}

function renderStatusInfographicDark(allAps){

  var PAL={'서류접수':{bg:'#94A3B8'},'서류합격':{bg:'#3B82F6'},'면접대기':{bg:'#FBBF24'},'최종합격':{bg:'#10B981'},'취업성공':{bg:'#34D399'},'불합격':{bg:'#F87171'}};

  var barSegs=items.map(function(x){var pct=(x.cnt/total*100);var sf=pct>=18,sn=pct>=9;return'<div style="width:'+pct.toFixed(2)+'%;background:'+x.bg+';display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s" title="'+x.s+': '+x.cnt+'명">'+(sf?'<span style="font-size:20px;font-weight:900;color:#fff;line-height:1.1">'+x.cnt+'</span><span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.85)">'+pct.toFixed(0)+'%</span>':sn?'<span style="font-size:15px;font-weight:900;color:#fff">'+x.cnt+'</span>':'')+'</div>';}).join('');
  var legendHtml=items.map(function(x){var pct=(x.cnt/total*100).toFixed(1);return'<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border-radius:8px;border:1px solid #F1F5F9"><span style="width:10px;height:10px;border-radius:3px;background:'+x.bg+';flex-shrink:0"></span><span style="font-size:12px;color:#64748B;flex:1">'+x.s+'</span><span style="font-size:16px;font-weight:900;color:#0F172A">'+x.cnt+'</span><span style="font-size:12px;color:#64748B;margin-left:2px">'+pct+'%</span></div>';}).join('');
  var passCount=items.filter(function(x){return x.s==='최종합격'||x.s==='취업성공';}).reduce(function(s,x){return s+x.cnt;},0);
  var passRate=total>0?Math.round(passCount/total*100):0;
  return'<div style="display:flex;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.1)">'+barSegs+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;flex:1;align-content:start">'+legendHtml+'</div><div style="margin-top:10px;padding:10px 14px;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border-radius:10px;border:1px solid #BFDBFE;display:flex;gap:0;flex-shrink:0"><div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding-right:10px"><p style="margin:0;font-size:12px;color:#6B7280;font-weight:700">총 지원</p><p style="margin:2px 0 0;font-size:24px;font-weight:900;color:#0F172A;line-height:1">'+total+'<span style="font-size:12px;color:#64748B;font-weight:500;margin-left:2px">건</span></p></div><div style="flex:1;text-align:center;border-right:1px solid #DBEAFE;padding:0 10px"><p style="margin:0;font-size:12px;color:#6B7280;font-weight:700">취업성사</p><p style="margin:2px 0 0;font-size:24px;font-weight:900;color:#059669;line-height:1">'+passCount+'<span style="font-size:12px;color:#64748B;font-weight:500;margin-left:2px">명</span></p></div><div style="flex:1;text-align:center;padding-left:10px"><p style="margin:0;font-size:12px;color:#6B7280;font-weight:700">합격률</p><p style="margin:2px 0 0;font-size:24px;font-weight:900;color:#2563EB;line-height:1">'+passRate+'<span style="font-size:12px;color:#64748B;font-weight:500;margin-left:1px">%</span></p></div></div>';
}

/* ── 대시보드 카운트업 + 지도 초기화 ── */
function initDashAnimations(){
  /* Count-up for KPI cards */
  document.querySelectorAll('.dk-num[data-target]').forEach(function(el){
    var target=parseInt(el.getAttribute('data-target'))||0;
    if(!target){el.textContent='0';return;}
    var duration=Math.min(1200,400+target*2);
    var startTime=performance.now();
    var ease=function(t){return 1-Math.pow(1-t,3);};
    (function tick(now){
      var elapsed=now-startTime;
      var progress=Math.min(elapsed/duration,1);
      el.textContent=Math.round(target*ease(progress));
      if(progress<1)requestAnimationFrame(tick);
    })(startTime);
  });
}

/* ── ECharts 3D 대한민국 지도 ── */
function initKoreaMap(){
  var mapDom=document.getElementById('korea-map-3d');
  if(!mapDom)return;
  if(typeof echarts==='undefined'){
    showMapFallback(mapDom);
    return;
  }
  /* Dispose previous instance */
  if(_mapChartInstance){try{_mapChartInstance.dispose();}catch(e){}   _mapChartInstance=null;}

  function buildChart(geoJSON){
    try{
      var mapData=geoJSON;
      /* 속성 이름 정규화 */
      if(mapData&&mapData.features){
        mapData.features.forEach(function(f){
          if(!f.properties)f.properties={};
          var n=f.properties.name||f.properties.NAME||f.properties.CTP_KOR_NM||f.properties.NAME_1||'';
          f.properties.name=n;
        });
      }
      echarts.registerMap('korea_adm',mapData);
    }catch(e){console.warn('registerMap error',e);}
    var chart=echarts.init(mapDom,null,{renderer:'canvas'});
    _mapChartInstance=chart;
    applyMapOption(chart,geoJSON);
    chart.on('click',function(params){
      if(params.componentType!=='series')return;
      var gName=params.name;
      var loc=geoNameToLoc(gName);
      if(!loc)return;
      _dashMapLocation=(_dashMapLocation===loc)?null:loc;
      jobFilter.location=_dashMapLocation||'';
      applyMapOption(chart,geoJSON);
      /* 지역 칩 UI 업데이트 */
      document.querySelectorAll('.dk-chip').forEach(function(el){
        var txt=el.textContent.trim().split(' ')[0];
        if(_dashMapLocation&&txt===_dashMapLocation){el.classList.add('sel','gold');}
        else{el.classList.remove('sel','gold');}
      });
      /* 폴백 탭 UI 업데이트 */
      document.querySelectorAll('.map-fallback-tab').forEach(function(el){
        var txt=el.getAttribute('data-loc');
        if(_dashMapLocation&&txt===_dashMapLocation){el.classList.add('sel');}
        else{el.classList.remove('sel');}
      });
      /* 필터 해제 버튼 업데이트 */
      var head=document.querySelector('.dk-map-head');
      if(head){
        var oldBtn=head.querySelector('#map-clear-btn');
        if(oldBtn)oldBtn.remove();
        if(_dashMapLocation){
          var btn2=document.createElement('button');
          btn2.id='map-clear-btn';
          btn2.setAttribute('onclick','setMapLocationFilter(null)');
          btn2.style.cssText='background:#FFFBEB;color:#D97706;border:1px solid #FCD34D;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit';
          btn2.textContent='✕ '+_dashMapLocation+' 필터 해제';
          var rightDiv=head.querySelector('div:last-child');
          if(rightDiv)rightDiv.prepend(btn2);
        }
      }
    });
    window.addEventListener('resize',function(){if(chart&&!chart.isDisposed())chart.resize();});
  }

  function applyMapOption(chart,geoJSON){
    /* 지역별 공고 수 집계 */
    var locCounts={};
    LOCATIONS.forEach(function(l){locCounts[l]=JOBS.filter(function(j){return j.location===l;}).length;});
    var maxCnt=Math.max.apply(null,Object.values(locCounts).concat([1]));

    /* 모든 GeoJSON 지역에 대한 데이터 생성 */
    var allGeoNames=[];
    if(geoJSON&&geoJSON.features){
      geoJSON.features.forEach(function(f){
        var name=(f.properties&&(f.properties.name||f.properties.CTP_KOR_NM||f.properties.NAME_1))||'';
        if(name)allGeoNames.push(name);
      });
    }

    var seriesData=allGeoNames.map(function(gName){
      var loc=geoNameToLoc(gName);
      var cnt=loc?(locCounts[loc]||0):0;
      var isSel=_dashMapLocation&&loc===_dashMapLocation;
      var isMapped=!!loc&&LOCATIONS.indexOf(loc)>=0;
      var baseH=isMapped?(2+Math.round(cnt/maxCnt*5)):1.5;
      var h=isSel?12:baseH;
      var itemColor=isSel?'#F59E0B':isMapped&&cnt>0?'#1D4ED8':isMapped?'#93C5FD':'#DBEAFE';
      return{
        name:gName,
        value:cnt,
        regionHeight:h,
        itemStyle:{
          color:itemColor,
          opacity:isMapped?1:0.8
        },
        label:{show:isMapped&&(cnt>0||isSel),formatter:function(p){var l=geoNameToLoc(p.name);return l||'';},textStyle:{color:isSel?'#fff':'#fff',fontSize:10,fontWeight:'bold'}}
      };
    });

    chart.setOption({
      backgroundColor:'transparent',
      series:[{
        type:'map3D',
        map:'korea_adm',
        boxWidth:92,
        boxHeight:14,
        regionHeight:2,
        shading:'lambert',
        light:{
          main:{intensity:2.2,shadow:true,shadowQuality:'high',alpha:45,beta:35},
          ambient:{intensity:0.7},
          ambientCubemap:{diffuseIntensity:0.6}
        },
        viewControl:{
          distance:88,alpha:38,beta:3,
          rotateSensitivity:0.7,zoomSensitivity:0.8,panSensitivity:0,
          panMouseButton:'right',rotateMouseButton:'left',
          animationDurationUpdate:700,animationEasingUpdate:'cubicOut'
        },
        itemStyle:{color:'#BFDBFE',opacity:1,borderWidth:1,borderColor:'rgba(59,130,246,.4)'},
        emphasis:{
          itemStyle:{color:'#F59E0B',opacity:1,borderWidth:1.5,borderColor:'#D97706'},
          label:{show:true,textStyle:{color:'#fff',fontWeight:'bold',fontSize:13,textBorderColor:'#1E293B',textBorderWidth:2}}
        },
        label:{show:false},
        data:seriesData,
        animation:true,
        animationDurationUpdate:600,
        animationEasingUpdate:'cubicOut'
      }]
    },true);
  }

  function showMapFallback(dom){
    var locCounts={};
    LOCATIONS.forEach(function(l){locCounts[l]=JOBS.filter(function(j){return j.location===l;}).length;});
    var tabs=LOCATIONS.map(function(loc){
      var cnt=locCounts[loc]||0;
      var isSel=_dashMapLocation===loc;
      return'<button class="map-fallback-tab'+(isSel?' sel':'')+'" data-loc="'+loc+'" onclick="setMapLocationFilter(\''+loc+'\')">'+loc+' <span style="font-weight:900">'+cnt+'</span></button>';
    }).join('');
    dom.innerHTML='<div style="padding:20px 16px"><p style="margin:0 0 12px;font-size:11px;color:#64748B;font-weight:600">📍 지역별 공고 현황 (지도 로딩 불가 — 탭으로 필터링)</p><div style="display:flex;flex-wrap:wrap;gap:8px">'+tabs+'</div></div>';
  }

  /* 인라인 GeoJSON 직접 사용 — 외부 fetch 불필요 */
  if(!_mapGeoJSON){
    try{
      var gj=JSON.parse(JSON.stringify(KOREA_MAP_DATA));/* deep-clone */
      /* name 속성 정규화 (이미 한국어 이름으로 세팅됨) */
      if(gj&&gj.features){
        gj.features.forEach(function(f){
          if(!f.properties)f.properties={};
          f.properties.name=f.properties.name||'';
        });
      }
      _mapGeoJSON=gj;
    }catch(e){
      console.warn('GeoJSON init error',e);
      showMapFallback(mapDom);
      return;
    }
  }
  buildChart(_mapGeoJSON);
}

async function saveVault(vaultId){

function deleteVault(vaultId){
  var v=VAULT.find(function(x){return x.id===vaultId;});if(!v)return;

        +'<span style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700">'+esc(ap.grade||'-')+'</span>'

      +'</div></div>';

  /* ── [Step 2] 중복 없음 → 기존 학생 검색 로직 ── */

}
function selectExistingAp(sid,name){
  var st=STUDENTS.find(function(s){return s.id===sid;});
  if(st){
    var todayMs=new Date(TODAY).getTime();
    var isBlack=st.restrictionLevel==='제한';
    var isNoReply=!isBlack&&JOBS.some(function(j){return j.applicants.some(function(ap){
      if(ap.studentId!==sid||!ap.interviewDocSent)return false;
      var diff=Math.round((todayMs-new Date(String(ap.interviewDocSent).slice(0,10)).getTime())/86400000);
      return diff>=7&&(ap.interviewFeedback||'').indexOf('회신완료')<0;
    });});
    if(isBlack)customAlert('🚫 이 학생은 영구 블랙리스트입니다!\n\n'+name+' / '+(st.phone||'-')+'\n\n블랙리스트 해제 후 등록 가능합니다.');
    else if(isNoReply)customAlert('⚠️ 이 학생은 과거 미회신 이력이 있는 블랙리스트입니다!\n\n'+name+' / '+(st.phone||'-')+'\n\n신중히 검토 후 진행하세요.');
  }
  _addApSelectedSid=sid;
  /* Feature 2: 급수 자동 완성 — 해당 학생의 가장 최근 지원 기록에서 grade 추출 */
  (function(){
    var _grEl=$('ap_gr');if(!_grEl)return;
    var _allAps=[];
    JOBS.forEach(function(j){j.applicants.forEach(function(a){
      if(a.studentId===sid)_allAps.push(a);
    });});
    if(_allAps.length){
      /* 가장 최근(id 기준 내림차순) 지원의 grade 사용 */
      _allAps.sort(function(a,b){return b.id-a.id;});
      var _latestGrade=_allAps[0].grade||'';
      if(_latestGrade){_grEl.value=_latestGrade;}
    }
  })();
  var r=$('ap_search_results');if(r)r.innerHTML='';
  var s=$('ap_search');if(s){s.value=name;s.disabled=true;s.style.background='#F3F4F6';}
  var si=$('ap_selected_info');if(si)si.innerHTML='<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:700;color:#1E40AF">✅ 기존 학생 선택됨: '+esc(name)+'</span><button onclick="clearApSelection()" style="background:none;border:1px solid #93C5FD;color:#2563EB;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">변경</button></div>';
}

function checkDupApName(){
  var nm=$('ns_nm');var warn=$('_ns_dup_warn');var saveBtn=$('_ap_save_btn');
  if(!nm)return;
  var val=nm.value.trim();
  if(!val){if(warn)warn.style.display='none';if(saveBtn)saveBtn.disabled=false;return;}
  var job=JOBS.find(function(j){return j.id===_addApJobId;});
  if(!job){if(warn)warn.style.display='none';return;}
  /* 이미 이 공고 지원자 중 동일 이름 존재 여부 */
  var isDup=job.applicants.some(function(ap){

  });
  var entries=Object.values(jobMap).sort(function(a,b){

  });

  var totalPass=entries.filter(function(a){return a.status==='최종합격'||a.status==='취업성공';}).length;

  var STAGES=[
    {key:'서류접수',label:'서류접수',c:'#3B82F6',bg:'#EFF6FF'},
    {key:'서류합격',label:'서류합격',c:'#7C3AED',bg:'#F5F3FF'},

/* ══ 일정 캘린더 ══ */
var _calMonth=MONTH;
function renderCalendar(){
  var parts=_calMonth.split('-');
  var cy=parseInt(parts[0]),cm=parseInt(parts[1]);
  var firstDay=new Date(cy,cm-1,1).getDay();
  var daysInMonth=new Date(cy,cm,0).getDate();
  var daysInPrev=new Date(cy,cm-1,0).getDate();

  /* ── 이벤트 수집 ── */
  var evMap={};
  JOBS.forEach(function(j){
    var jn=j.name.length>16?j.name.slice(0,16)+'…':j.name;
    var cat=j.category||'기타';
    function mark(ds,lbl,c){
      if(!ds)return;
      var d=String(ds).slice(0,10);
      if(d.slice(0,7)!==_calMonth)return;
      if(!evMap[d])evMap[d]=[];
      evMap[d].push({lbl:lbl,c:c,jn:jn,fullName:j.name,cat:cat});
    }
    mark(j.docDate,'서류접수','#3B82F6');
    mark(j.applyDeadline,'지원마감','#EF4444');
    mark(j.documentPassDate,'서류합격','#7C3AED');
    mark(j.interviewDate,'면접','#F59E0B');
    mark(j.finalDate,'합격발표','#059669');
  });

  /* 각 날짜 이벤트를 지정 순서로 정렬 */
  var EV_ORDER={'서류접수':0,'지원마감':1,'서류합격':2,'면접':3,'합격발표':4};
  Object.keys(evMap).forEach(function(d){
    evMap[d].sort(function(a,b){
      return (EV_ORDER[a.lbl]!==undefined?EV_ORDER[a.lbl]:99)
           - (EV_ORDER[b.lbl]!==undefined?EV_ORDER[b.lbl]:99);
    });
  });

  /* ── 날짜 셀 생성 ── */
  var cells=[];
  for(var p=firstDay-1;p>=0;p--)cells.push({day:daysInPrev-p,cur:false});
  for(var d=1;d<=daysInMonth;d++)cells.push({day:d,cur:true});
  var rem=(7-cells.length%7)%7;
  for(var n=1;n<=rem;n++)cells.push({day:n,cur:false});

  var DOW=['일','월','화','수','목','금','토'];
  var dowHtml=DOW.map(function(d,i){
    return'<div style="text-align:center;font-size:11px;font-weight:700;padding:8px 0 6px;color:'+(i===0?'#EF4444':i===6?'#3B82F6':'#64748B')+'">'+d+'</div>';
  }).join('');

  /* ── 셀 렌더 (이벤트 카드 포함) ── */
  var gridCells=cells.map(function(cell){
    if(!cell.cur){
      return'<div style="min-height:120px;background:#FAFAFA;border:1px solid #F1F5F9;border-radius:6px;padding:6px;opacity:.4">'
        +'<span style="font-size:14px;color:#CBD5E1">'+cell.day+'</span>'
      +'</div>';
    }
    var dStr=cy+'-'+(cm<10?'0':'')+cm+'-'+(cell.day<10?'0':'')+cell.day;
    var isT=dStr===TODAY;
    var evs=evMap[dStr]||[];
    /* 이벤트 카드: 레이블 + 기관명 */
    var eHtml=evs.map(function(ev){
      return'<div title="'+esc(ev.fullName)+' · '+ev.lbl+'" style="margin-top:4px;background:'+ev.c+'18;border-left:3px solid '+ev.c+';border-radius:0 6px 6px 0;padding:3px 6px 3px 7px;cursor:default">'
        +'<div style="font-size:10.5px;font-weight:800;color:'+ev.c+';line-height:1.3">'+ev.lbl+'</div>'
        +'<div style="font-size:11px;font-weight:600;color:#1E293B;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.jn)+'</div>'
      +'</div>';
    }).join('');

    return'<div '+(isT?'id="cal-today"':'')+' style="min-height:120px;border:1.5px solid '+(isT?'#3B82F6':'#E5E7EB')+';border-radius:8px;background:'+(isT?'#EFF6FF':'#FFFFFF')+';padding:6px;box-shadow:'+(isT?'0 0 0 2px #BFDBFE':'none')+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">'
        +'<span style="font-size:14px;font-weight:'+(isT?'900':'700')+';width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:'+(isT?'#2563EB':'transparent')+';color:'+(isT?'#fff':'#374151')+'">'+cell.day+'</span>'
        +(evs.length>0?'<span style="font-size:10px;font-weight:700;color:#64748B">'+evs.length+'건</span>':'')
      +'</div>'
      +eHtml
    +'</div>';
  }).join('');

  /* ── 이번달 전체 이벤트 수 ── */
  var allEvs=[];
  Object.keys(evMap).sort().forEach(function(d){evMap[d].forEach(function(ev){allEvs.push(Object.assign({},ev,{date:d}));});});

  /* ── 월 이동 ── */
  function adj(n){var d=new Date(cy,cm-1+n,1);return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);}

  /* ── 범례 ── */
  var legend=[['서류접수','#3B82F6'],['지원마감','#EF4444'],['서류합격','#7C3AED'],['면접','#F59E0B'],['합격발표','#059669']].map(function(x){
    return'<div style="display:flex;align-items:center;gap:5px"><div style="width:3px;height:16px;border-radius:99px;background:'+x[1]+'"></div><span style="font-size:12px;color:#4B5563;font-weight:700">'+x[0]+'</span></div>';
  }).join('');

  return'<div style="display:flex;flex-direction:column;height:100%;background:#F8FAFC;overflow:hidden">'
    /* 헤더 */
    +'<div style="flex-shrink:0;padding:13px 20px 11px;background:#fff;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
      +'<div style="display:flex;align-items:center;gap:10px">'
        +'<div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#0EA5E9,#0284C7);display:flex;align-items:center;justify-content:center"><span style="font-size:14px">📅</span></div>'
        +'<div>'
          +'<div style="font-size:15px;font-weight:800;color:#0A0A0A">일정 캘린더</div>'
          +'<div style="font-size:10px;color:#9CA3AF">'+cy+'년 '+cm+'월 · 총 '+allEvs.length+'건 일정</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +legend
        +'<div style="width:1px;height:18px;background:#E2E8F0;margin:0 4px"></div>'

/* ══ AI 채용 브리핑 ══ */
var _insightCache=null;
var _anthropicKey='';
var _insightFrom='';
var _insightTo='';
var _natFrom='';
var _natTo='';
var _natType='';
/* ── 취업처 관리 ── */
var EMPLOYERS=[];
var FAVORITES=[]; // 즐겨찾기
var _empKw='';
var _empCatF='전체';
var _empLocF='';
var _empSelected=new Set();
var _empDetailId=null;
function renderInsights(){
  var fFrom=_insightFrom, fTo=_insightTo;
  var hasFilter=!!(fFrom||fTo);
  var periodLabel=hasFilter?(fFrom&&fTo?fFrom+' ~ '+fTo:fFrom?fFrom+' 이후':fTo+' 이전'):'전체 기간';

  /* ── 기간 내 날짜 판별 ── */
  function inRange(ds){
    var d=(ds||'').slice(0,10); if(!d) return !hasFilter;
    if(fFrom&&d<fFrom) return false;
    if(fTo&&d>fTo) return false;
    return true;
  }

  /* ── 기간 기준 데이터 필터링 ── */
  var filtJobs=hasFilter
    ? JOBS.filter(function(j){ return inRange(j.docDate)||inRange(j.interviewDate)||inRange(j.finalDate)||inRange(j.applyDeadline); })
    : JOBS;

  /* 기간 내 서류접수 공고 → 지원자 집계 */
  var docPeriodJobs=filtJobs.filter(function(j){ return hasFilter?inRange(j.docDate):true; });
  var periodAps=docPeriodJobs.reduce(function(a,j){return a.concat(j.applicants);},[]);

  /* 기간 내 최종발표 공고 → 합격/불합격 */
  var finalPeriodJobs=filtJobs.filter(function(j){ return hasFilter?inRange(j.finalDate):true; });
  var periodPass=finalPeriodJobs.reduce(function(a,j){
    return a.concat(j.applicants.filter(function(ap){return ap.status==='최종합격'||ap.status==='취업성공';}));
  },[]);
  var periodFail=finalPeriodJobs.reduce(function(a,j){
    return a.concat(j.applicants.filter(function(ap){return ap.status==='불합격';}));
  },[]);

  /* 기간 내 면접 공고 → 면접 대기 */
  var ivPeriodJobs=filtJobs.filter(function(j){ return hasFilter?inRange(j.interviewDate):true; });
  var periodIvWait=ivPeriodJobs.reduce(function(a,j){
    return a.concat(j.applicants.filter(function(ap){return ap.status==='면접대기';}));
  },[]);

  /* 스테이지별 집계 */
  var byS={'서류접수':0,'서류합격':0,'면접대기':0,'최종합격':0,'불합격':0};
  periodAps.forEach(function(a){if(byS[a.status]!==undefined)byS[a.status]++;});

  var activeJobs=filtJobs.filter(function(j){return !j.isClosed;});
  var pass=periodPass.length;
  var fail=periodFail.length;
  var passRate=periodAps.length>0?Math.round(pass/periodAps.length*100):0;
  var ivWaitCnt=periodIvWait.length;

  /* 기간 내 날짜별 이벤트 집계 */
  var noApJobs=activeJobs.filter(function(j){return j.applicants.length===0;});
  var unlocated=filtJobs.filter(function(j){return !j.location||j.location.trim()==='';});
  var catMap={};filtJobs.forEach(function(j){var c=j.category||'기타';catMap[c]=(catMap[c]||0)+1;});
  var topCat=Object.entries(catMap).sort(function(a,b){return b[1]-a[1];})[0];

  /* ── 분석 생성 (기간 기준) ── */
  var ts=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  var trend=passRate>=20?'상승':passRate>=10?'유지':pass===0&&filtJobs.length>0?'데이터 없음':'하락';
  var trendC=trend==='상승'?'#059669':trend==='하락'?'#DC2626':trend==='유지'?'#D97706':'#94A3B8';
  var trendE=trend==='상승'?'📈':trend==='하락'?'📉':trend==='유지'?'➡️':'📊';
  var trendR=trend==='상승'?'합격률 양호 수준':trend==='유지'?'합격률 평균 수준':trend==='하락'?'합격률 개선 필요':'합격 데이터 없음';

  /* 헤드라인 */
  var headline=hasFilter
    ?('['+periodLabel+'] '+filtJobs.length+'건 공고 · 지원자 '+periodAps.length+'명 · 합격 '+pass+'명')
    :(activeJobs.length+'건 진행 중 · 지원자 '+periodAps.length+'명 · 합격 '+pass+'명');

  /* 종합 분석 */
  var summaryParts=[];
  if(hasFilter){
    summaryParts.push('['+periodLabel+'] 기간에 해당하는 공고 '+filtJobs.length+'건이 분석 대상입니다.');
    if(periodAps.length>0)summaryParts.push('서류접수 기준 지원자 '+periodAps.length+'명 중 최종합격 '+pass+'명(합격률 '+passRate+'%).');
    else summaryParts.push('해당 기간 내 서류접수 데이터가 없습니다.');
    if(ivWaitCnt>0)summaryParts.push('면접 대기 중인 지원자는 '+ivWaitCnt+'명입니다.');
  } else {
    summaryParts.push('전체 공고 '+JOBS.length+'건 중 '+activeJobs.length+'건이 현재 진행 중입니다.');
    if(periodAps.length>0)summaryParts.push('전체 지원자 '+periodAps.length+'명 중 최종합격 '+pass+'명(합격률 '+passRate+'%).');
    if(topCat)summaryParts.push(topCat[0]+' 분야 공고가 '+topCat[1]+'건으로 가장 많습니다.');
  }

  /* 알림 — 기간 기준 */
  var alerts=[];
  if(filtJobs.length===0&&hasFilter){
    alerts.push({title:'해당 기간 공고 없음',desc:'['+periodLabel+'] 범위에 해당하는 공고가 없습니다. 날짜 범위를 변경해보세요.',type:'info'});
  } else {
    if(pass===0&&periodAps.length>0)alerts.push({title:'기간 내 최종합격 없음',desc:'지원자 '+periodAps.length+'명 중 아직 최종합격자가 없습니다. 진행 단계를 확인하세요.',type:'warning'});
    if(passRate>0&&passRate<10)alerts.push({title:'합격률 '+passRate+'% — 낮은 수준',desc:'기간 내 지원자 대비 합격률이 10% 미만입니다. 채용 기준을 재검토하세요.',type:'warning'});
    if(noApJobs.length>0)alerts.push({title:'지원자 없는 공고 '+noApJobs.length+'건',desc:noApJobs.slice(0,3).map(function(j){return j.name.slice(0,18);}).join(', ')+(noApJobs.length>3?' 외':'')+'.',type:'warning'});
    if(ivWaitCnt>0)alerts.push({title:'면접 대기 '+ivWaitCnt+'명',desc:'기간 내 면접 공고의 대기 지원자 결과를 입력해주세요.',type:'info'});
    if(fail>pass&&fail>0)alerts.push({title:'불합격 비율 높음 ('+fail+'명)',desc:'합격 '+pass+'명 대비 불합격 '+fail+'명. 채용 기준 또는 매칭 방식을 검토하세요.',type:'info'});
    if(unlocated.length>0)alerts.push({title:'지역 미입력 '+unlocated.length+'건',desc:'지역 정보가 없는 공고는 전국 현황 통계에서 누락됩니다.',type:'info'});
    if(alerts.length===0)alerts.push({title:'특이사항 없음',desc:'기간 내 긴급하게 처리할 알림이 없습니다.',type:'info'});
  }

  /* 액션 — 기간 기준 */
  var actions=[];
  if(filtJobs.length===0&&hasFilter){
    actions.push({title:'날짜 범위 조정',desc:'다른 기간을 선택하거나 초기화 후 전체 데이터를 확인해보세요.',priority:'medium'});
  } else {
    if(ivWaitCnt>0)actions.push({title:'면접 결과 입력',desc:'기간 내 면접 대기 '+ivWaitCnt+'명의 결과를 공고관리에서 업데이트하세요.',priority:'high'});
    if(passRate<10&&periodAps.length>3)actions.push({title:'합격률 개선 검토',desc:'기간 내 합격률 '+passRate+'%. 서류 기준 또는 지원자 매칭 방식을 재검토하세요.',priority:'high'});
    if(noApJobs.length>0)actions.push({title:'무지원 공고 홍보',desc:noApJobs.length+'건 공고에 지원자가 없습니다. 홍보 채널을 다양화하세요.',priority:'medium'});
    if(unlocated.length>0)actions.push({title:'지역 정보 입력',desc:unlocated.length+'건 지역 미입력 공고를 수정하면 전국 통계 정확도가 높아집니다.',priority:'medium'});
    if(actions.length===0)actions.push({title:'정기 데이터 점검',desc:'기간 내 데이터가 정상 집계되고 있습니다. 정기적으로 공고 상태를 업데이트하세요.',priority:'low'});
  }

  /* 강점 / 개선 — 기간 기준 */
  var positives=[],concerns=[];
  if(filtJobs.length>0){positives.push('기간 내 분석 대상 공고 '+filtJobs.length+'건');}
  if(pass>0)positives.push('최종합격 '+pass+'명 배출');
  if(passRate>=15)positives.push('합격률 '+passRate+'% — 양호');
  if(topCat&&catMap[topCat[0]]>1)positives.push(topCat[0]+' 분야 집중 운영('+catMap[topCat[0]]+'건)');
  if(positives.length===0)positives.push('기간 설정 후 데이터가 쌓이면 강점이 나타납니다');
  if(passRate<10&&periodAps.length>3)concerns.push('합격률 '+passRate+'% — 개선 필요');
  if(noApJobs.length>0)concerns.push('지원자 없는 공고 '+noApJobs.length+'건');
  if(unlocated.length>0)concerns.push('지역 미입력으로 통계 누락');
  if(fail>pass*2&&fail>0)concerns.push('불합격('+fail+'명) > 합격('+pass+'명) 2배');
  if(concerns.length===0)concerns.push('현재 특이 우려사항 없음');

  /* ── HTML 조각 ── */
  function mkAlert(a){
    var c=a.type==='danger'?'#EF4444':a.type==='warning'?'#F59E0B':'#3B82F6';
    var bg=a.type==='danger'?'#FFF1F2':a.type==='warning'?'#FFFBEB':'#EFF6FF';
    var em=a.type==='danger'?'🚨':a.type==='warning'?'⚠️':'ℹ️';
    return'<div style="background:'+bg+';border-left:3.5px solid '+c+';border-radius:0 10px 10px 0;padding:11px 14px;margin-bottom:8px">'
      +'<div style="font-size:13px;font-weight:800;color:'+c+';margin-bottom:4px">'+em+' '+esc(a.title)+'</div>'
      +'<div style="font-size:12px;color:#1F2937;line-height:1.6">'+esc(a.desc)+'</div></div>';
  }
  function mkAction(a){
    var c=a.priority==='high'?'#DC2626':a.priority==='medium'?'#D97706':'#6B7280';
    var lbl=a.priority==='high'?'긴급':a.priority==='medium'?'권장':'참고';
    return'<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6">'
      +'<span style="background:'+c+'15;color:'+c+';font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px">'+lbl+'</span>'
      +'<div><div style="font-size:13px;font-weight:700;color:#0F172A;margin-bottom:3px">'+esc(a.title)+'</div>'
      +'<div style="font-size:12px;color:#4B5563;line-height:1.6">'+esc(a.desc)+'</div></div></div>';
  }
  var posH=positives.map(function(p){return'<li style="font-size:12px;color:#065F46;padding:4px 0;list-style:none;line-height:1.5">✓ '+esc(p)+'</li>';}).join('');
  var conH=concerns.map(function(p){return'<li style="font-size:12px;color:#991B1B;padding:4px 0;list-style:none;line-height:1.5">△ '+esc(p)+'</li>';}).join('');

  /* KPI 카드 */
  var kpiCards=[
    {lbl:'기간 내 공고',val:filtJobs.length,unit:'건',c:'#2563EB',bg:'#EFF6FF',bd:'#BFDBFE',sub:hasFilter?periodLabel:'전체'},
    {lbl:'지원자',val:periodAps.length,unit:'명',c:'#7C3AED',bg:'#F5F3FF',bd:'#DDD6FE',sub:'서류접수 기준'},
    {lbl:'최종합격',val:pass,unit:'명',c:'#059669',bg:'#F0FDF4',bd:'#BBF7D0',sub:'불합격 '+fail+'명'},
    {lbl:'합격률',val:passRate+'%',unit:'',c:'#D97706',bg:'#FFFBEB',bd:'#FCD34D',sub:'지원자 대비'},
    {lbl:'면접 대기',val:ivWaitCnt,unit:'명',c:'#64748B',bg:'#F8FAFC',bd:'#E2E8F0',sub:'결과 입력 필요'},
  ].map(function(k){
    return'<div style="flex:1;min-width:110px;background:'+k.bg+';border:1.5px solid '+k.bd+';border-radius:14px;padding:14px 16px;text-align:center">'
      +'<div style="font-size:10px;font-weight:700;color:'+k.c+';margin-bottom:6px;letter-spacing:.04em">'+k.lbl+'</div>'
      +'<div style="font-size:28px;font-weight:900;color:'+k.c+';line-height:1">'+k.val+'<span style="font-size:13px;font-weight:600;margin-left:2px">'+k.unit+'</span></div>'
      +'<div style="font-size:10px;color:'+k.c+';opacity:.65;margin-top:4px">'+k.sub+'</div>'
    +'</div>';
  }).join('');

  var _insightHtml=''
    /* 헤드라인 배너 */
    +'<div style="background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:16px;padding:20px 24px;margin-bottom:14px;position:relative;overflow:hidden">'
      +'<div style="position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.05;pointer-events:none">✨</div>'
      +'<div style="font-size:10px;font-weight:700;color:#7DD3FC;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px">SMART BRIEFING · '+ts
        +(hasFilter?' · <span style="background:rgba(255,255,255,.15);padding:2px 10px;border-radius:99px">'+esc(periodLabel)+'</span>':'')
      +'</div>'
      +'<div style="font-size:18px;font-weight:900;color:#fff;line-height:1.4;margin-bottom:11px">'+esc(headline)+'</div>'
      +'<div style="display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border-radius:99px;padding:5px 14px">'
        +'<span style="font-size:14px">'+trendE+'</span>'
        +'<span style="font-size:12px;font-weight:800;color:'+trendC+'">'+trend+'</span>'
        +'<span style="font-size:12px;color:#64748B"> · '+trendR+'</span>'
      +'</div>'

    /* KPI 카드 (크게, 명확하게) */
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">'+kpiCards+'</div>'

        +(hasFilter?' <span style="font-size:10px;background:#EDE9FE;color:#7C3AED;padding:1px 8px;border-radius:5px;font-weight:700">'+esc(periodLabel)+'</span>':'')
      +'</div>'

        +'<div style="font-size:10.5px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">💡 추천 액션</div>'

          +'<ul style="margin:0;padding:0">'+conH+'</ul></div>'
      +'</div>'
    +'</div>';

  /* ── 조회 / 새로고침 / 출력 함수 ── */
  window._queryInsight=function(){
    var f=document.getElementById('_ins_from_inp');
    var t=document.getElementById('_ins_to_inp');
    _insightFrom=f?f.value:'';
    _insightTo=t?t.value:'';
    var btn=document.getElementById('_ins_query_btn');
    if(btn){btn.disabled=true;btn.textContent='조회 중…';}

function setNationalLoc(loc,e){
  if(e&&e.preventDefault)e.preventDefault();
  if(e&&e.stopPropagation)e.stopPropagation();
  _nationalSelectedLoc=(_nationalSelectedLoc===loc)?null:loc;
  /* 인텔리전트 보드 전체 재렌더 */
  _saveScrollPositions();
  renderView();
}

  LOCATIONS.forEach(function(l){locCounts[l]=JOBS.filter(function(j){return j.location===l;}).length;});

  if(unlocatedCnt>0){locCounts['미지정']=unlocatedCnt;totalCount+=unlocatedCnt;}
  var allLocs=LOCATIONS.slice();

      +'<button onclick="setNationalLoc(\''+_nationalSelectedLoc+'\',event)" style="border:none;background:'+(isMijung?'#E5E7EB':'#FDE68A')+';color:'+(isMijung?'#374151':'#78350F')+';padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit">✕ 해제</button>'
      +'</div>'
      +'<p style="margin:0 0 10px;font-size:26px;font-weight:900;color:#000000">'+esc(_nationalSelectedLoc)+'</p>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +'<div style="background:#fff;border-radius:10px;padding:10px 14px;border:1px solid '+(isMijung?'#E5E7EB':'#FDE68A')+'">'
      +'<p style="margin:0;font-size:10px;color:'+(isMijung?'#6B7280':'#92400E')+';font-weight:700">공고 수</p>'
      +'<p style="margin:4px 0 0;font-size:28px;font-weight:900;color:'+(isMijung?'#374151':'#F59E0B')+';line-height:1">'+cnt+'<span style="font-size:12px;color:'+(isMijung?'#6B7280':'#92400E')+';margin-left:2px">건</span></p>'
      +'</div>'
      +'<div style="background:#fff;border-radius:10px;padding:10px 14px;border:1px solid '+(isMijung?'#E5E7EB':'#FDE68A')+'">'
      +'<p style="margin:0;font-size:10px;color:'+(isMijung?'#6B7280':'#92400E')+';font-weight:700">전체 비중</p>'
      +'<p style="margin:4px 0 0;font-size:28px;font-weight:900;color:'+(isMijung?'#374151':'#F59E0B')+';line-height:1">'+pct+'<span style="font-size:12px;color:'+(isMijung?'#6B7280':'#92400E')+';margin-left:1px">%</span></p>'
      +'</div></div></div>';
  }else{
    topHtml='<div style="padding:18px 20px;background:#EFF6FF;border-bottom:1px solid #BFDBFE">'
      +'<p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.06em">📊 전체 현황</p>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">'
      +'<div style="background:#fff;border-radius:10px;padding:10px 14px;border:1px solid #BFDBFE">'
      +'<p style="margin:0;font-size:10px;color:#1D4ED8;font-weight:700">총 공고</p>'
      +'<p style="margin:4px 0 0;font-size:28px;font-weight:900;color:#2563EB;line-height:1">'+totalCount+'<span style="font-size:12px;color:#1D4ED8;margin-left:2px">건</span></p>'
      +'</div>'
      +'<div style="background:#fff;border-radius:10px;padding:10px 14px;border:1px solid #BFDBFE">'
      +'<p style="margin:0;font-size:10px;color:#1D4ED8;font-weight:700">집계 지역</p>'
      +'<p style="margin:4px 0 0;font-size:28px;font-weight:900;color:#2563EB;line-height:1">'+LOCATIONS.length+'<span style="font-size:12px;color:#1D4ED8;margin-left:1px">개</span>'+(unlocatedCnt>0?'<span style="font-size:10px;color:#9CA3AF;margin-left:4px">+미지정</span>':'')+'</p>'

  /* 순위 리스트 */

    var rank=RANK_MEDALS[i]||(i+1)+'';

            +'<span style="font-size:16px;font-weight:200;color:'+(isSel?'#4338CA':'#0A0A0A')+';letter-spacing:-.04em;font-variant-numeric:tabular-nums">'+cnt+'</span>'

          +'</div>'
        +'</div>'
        +'<div style="height:2px;background:#F0F0F4;border-radius:99px;overflow:hidden">'

        +'</div>'

}

function renderNationalStatus(){
  var fFrom=_natFrom,fTo=_natTo,typ=_natType;
  var hasFilter=!!(fFrom||fTo);
  function inRange(ds){var d=(ds||'').slice(0,10);if(!d)return false;if(fFrom&&d<fFrom)return false;if(fTo&&d>fTo)return false;return true;}
  var periodLabel=hasFilter?(fFrom&&fTo?fFrom+' ~ '+fTo:fFrom?fFrom+' 이후':fTo+' 이전'):'전체 기간';

  /* 타입 필터 적용된 baseJobs */
  var baseJobs=JOBS.filter(function(j){
    if(hasFilter&&!inRange(j.docDate))return false;
    if(typ==='추천'&&!j.isRec)return false;
    if(typ==='지원'&&j.isRec)return false;
    return true;
  });

  var locCounts={};
  LOCATIONS.forEach(function(l){locCounts[l]=baseJobs.filter(function(j){return j.location===l;}).length;});
  var unlocatedCnt=baseJobs.filter(function(j){return !j.location||j.location.trim()==='';}).length;
  if(unlocatedCnt>0)locCounts['미지정']=unlocatedCnt;
  var allLocs=LOCATIONS.slice();
  if(unlocatedCnt>0)allLocs.push('미지정');
  var totalJobCount=baseJobs.length;

  var regionStats=allLocs.map(function(loc){
    var lj=loc==='미지정'?baseJobs.filter(function(j){return !j.location||j.location.trim()==='';})
      :baseJobs.filter(function(j){return j.location===loc;});
    var aps=lj.reduce(function(a,j){return a.concat(j.applicants);},[]);
    function pass(arr){return arr.filter(function(a){return a.status==='최종합격'||a.status==='취업성공';}).length;}
    var totalPass=pass(aps);
    return{loc:loc,cnt:lj.length,active:lj.filter(function(j){return !j.isClosed;}).length,
      aps:aps.length,pass:totalPass,rate:aps.length>0?Math.round(totalPass/aps.length*100):0};
  }).sort(function(a,b){return b.cnt-a.cnt;});

  var totalCount=regionStats.reduce(function(s,r){return s+r.cnt;},0);
  var totalAps=regionStats.reduce(function(s,r){return s+r.aps;},0);
  var totalPass=regionStats.reduce(function(s,r){return s+r.pass;},0);
  var overallRate=totalAps>0?Math.round(totalPass/totalAps*100):0;
  var topRegion=regionStats[0];

  /* ── 핸들러 ── */
  window._natClick=function(loc){
    var tbl=document.getElementById('_nat_tbl');
    var sy=tbl?tbl.scrollTop:0;
    _nationalSelectedLoc=(_nationalSelectedLoc===loc)?null:loc;
    renderView();
    setTimeout(function(){var el=document.getElementById('_nat_tbl');if(el)el.scrollTop=sy;},30);
  };
  window._natQuery=function(){
    var f=document.getElementById('_nat_from'),t=document.getElementById('_nat_to');
    _natFrom=f?f.value:'';_natTo=t?t.value:'';
    setTimeout(renderView,150);
  };
  window._natReset=function(){_natFrom='';_natTo='';_nationalSelectedLoc=null;renderView();};
  window._natSetType=function(t){_natType=t;_nationalSelectedLoc=null;renderView();};

  /* ── 색상 ── */
  function rateC(r){return r>=20?'#059669':r>=10?'#D97706':'#94A3B8';}
  function rateBg(r){return r>=20?'#F0FDF4':r>=10?'#FFFBEB':'#F8FAFC';}

  /* ── 테이블 행 ── */
  var tableRows=regionStats.map(function(r,idx){
    var isMijung=r.loc==='미지정';
    var isSel=_nationalSelectedLoc===r.loc;
    var rank=idx+1;
    var rankEl=rank===1?'<span style="font-size:15px">🥇</span>'
      :rank===2?'<span style="font-size:15px">🥈</span>'
      :rank===3?'<span style="font-size:15px">🥉</span>'
      :'<span style="font-size:11px;color:#CBD5E1;font-weight:700;width:18px;display:inline-block;text-align:center">'+rank+'</span>';
    var barW=totalCount>0?Math.round(r.cnt/totalCount*100):0;
    var barC=isSel?'#F59E0B':typ==='추천'?'#059669':typ==='지원'?'#2563EB':rank<=3?'#2563EB':'#93C5FD';
    return'<tr onclick="_natClick(\''+r.loc+'\')"'
      +' style="cursor:pointer;border-bottom:1px solid #F1F5F9;background:'+(isSel?'#FFFBEB':'')+';"'
      +' onmouseover="this.style.background=\''+(isSel?'#FFF7ED':'#F8FAFC')+'\'" onmouseout="this.style.background=\''+(isSel?'#FFFBEB':'')+'\';">'
      +'<td style="padding:11px 14px;white-space:nowrap">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<div style="width:22px;text-align:center;flex-shrink:0">'+rankEl+'</div>'
          +'<div>'
            +'<div style="font-size:14px;font-weight:'+(isSel?'800':'600')+';color:'+(isMijung?'#94A3B8':isSel?'#D97706':'#0F172A')+'">'+esc(r.loc)+'</div>'
            +'<div style="font-size:10px;color:#64748B;margin-top:1px">진행 '+r.active+'건</div>'
          +'</div>'
        +'</div>'
      +'</td>'
      +'<td style="padding:11px 12px">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<div style="flex:1;height:6px;background:#F1F5F9;border-radius:99px;overflow:hidden;min-width:36px"><div style="height:100%;width:'+barW+'%;background:'+barC+';border-radius:99px;transition:width .3s"></div></div>'
          +'<span style="font-size:15px;font-weight:800;color:'+(r.cnt>0?'#0F172A':'#CBD5E1')+';white-space:nowrap">'+r.cnt+'건</span>'
        +'</div>'
      +'</td>'
      +'<td style="padding:11px 12px;text-align:center;font-size:14px;font-weight:700;color:'+(r.aps>0?'#374151':'#E5E7EB')+';white-space:nowrap">'+(r.aps>0?r.aps+'명':'—')+'</td>'

      +'<td style="padding:11px 12px;text-align:center">'
        +(r.aps>0?'<span style="background:'+rateBg(r.rate)+';color:'+rateC(r.rate)+';padding:4px 12px;border-radius:8px;font-size:13px;font-weight:800;white-space:nowrap">'+r.rate+'%</span>':'<span style="color:#E5E7EB">—</span>')
      +'</td>'
    +'</tr>';
  }).join('');

  /* ── 오른쪽 패널 ── */
  var panelHtml='';
  if(_nationalSelectedLoc){
    var selJobs=_nationalSelectedLoc==='미지정'
      ?baseJobs.filter(function(j){return !j.location||j.location.trim()==='';})
      :baseJobs.filter(function(j){return j.location===_nationalSelectedLoc;});
    var selSt=regionStats.find(function(r){return r.loc===_nationalSelectedLoc;})||{cnt:0,active:0,aps:0,pass:0,rate:0};

    var jobCards=selJobs.length===0
      ?'<div style="text-align:center;padding:40px 0;color:#CBD5E1"><div style="font-size:32px;margin-bottom:10px">📭</div><div style="font-size:13px;font-weight:600;color:#64748B">공고 없음</div></div>'
      :selJobs.map(function(j){
        var aps=j.applicants.length;
        var pass=j.applicants.filter(function(a){return a.status==='최종합격'||a.status==='취업성공';}).length;

          +'<button onclick="_natClick(\''+_nationalSelectedLoc+'\')" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);border:none;font-size:14px;cursor:pointer;color:#64748B;display:flex;align-items:center;justify-content:center">✕</button>'

  /* ── 타입 토글 탭 ── */
