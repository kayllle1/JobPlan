let currentView='dashboard',expandedJobs=new Set(),detailJobs=new Set();

/* ─ IME ─ */
let _jobComposing=false,_stuComposing=false,_jobDebTimer=null,_stuDebTimer=null;
function onJobCompositionStart(){_jobComposing=true;clearTimeout(_jobDebTimer);}
function onJobCompositionEnd(el){_jobComposing=false;clearTimeout(_jobDebTimer);const v=el.value;_jobDebTimer=setTimeout(function(){jobFilter.kw=v;renderView();},0);}

/* ─ 유틸 ─ */
var fmt=function(d){return d?String(d).replace(/-/g,'.'):'-';};
var $=function(id){return document.getElementById(id);};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dateOrNull(v){return(v&&String(v).trim())?v:null;}
function isToday(d){return !!d&&String(d).slice(0,10)===TODAY;}
function calcDDay(ds){
  if(!ds)return null;
  var s=String(ds).slice(0,10);
  var parts=s.split('-').map(Number);
  var tparts=TODAY.split('-').map(Number);
  return Math.round((new Date(parts[0],parts[1]-1,parts[2])-new Date(tparts[0],tparts[1]-1,tparts[2]))/86400000);
}
function isTrulyOver(job){
  if(job.isClosed)return true;
  if(job.finalDate&&String(job.finalDate).slice(0,10)>=TODAY)return false;
  if(job.interviewDate&&String(job.interviewDate).slice(0,10)>=TODAY)return false;
  var dl=job.applyDeadline||job.docDate;
  return !!(dl&&String(dl).slice(0,10)<TODAY);
}
function dDayBadge(dateStr,closed){
  if(closed)return '<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">마감됨</span>';

}
function csvExport(data,name){
  if(!data||!data.length)return;
  var hdrs=Object.keys(data[0]);
  var rows=data.map(function(r){return hdrs.map(function(h){return'"'+String(r[h]!=null?r[h]:'').replace(/"/g,'""')+'"';}).join(',');});
  var csv=[hdrs.join(',')].concat(rows).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();URL.revokeObjectURL(url);
}
function getApps(sid){

}

/* ─ 질문 파싱 (공용) ─ */
function parseQsShared(text){
  try{
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    var pat=/^(\d{1,2}[\.\)\s]+|Q[\.\:\s]+|[①-⑳]\s*)/;
    var qs=[],buf='';
    lines.forEach(function(line){
      if(pat.test(line)){if(buf)qs.push(buf.trim());buf=line.replace(pat,'').trim();}
      else{buf=buf?(buf+' '+line):line;}
    });
    if(buf)qs.push(buf.trim());
    return qs.filter(function(q){return q.length>1;});
  }catch(e){return[];}
}

/* ─ 자료실 그룹화 ─ */
function getGroupedVault(){
  try{
    var filtered=VAULT.slice();
    if(vaultFilter!=='전체')filtered=filtered.filter(function(v){return v.category===vaultFilter;});
    if(vaultKw.trim()){
      var kw=vaultKw.trim();
      filtered=filtered.filter(function(v){return v.institutionName.indexOf(kw)>=0||v.content.indexOf(kw)>=0;});
    }
    var groupMap={};
    filtered.forEach(function(v){
      var k=v.institutionName||'(기관명 없음)';
      if(!groupMap[k])groupMap[k]={institutionName:k,category:v.category,items:[]};
      groupMap[k].items.push(v);
    });
    var groups=Object.values(groupMap);
    groups.forEach(function(g){
      g.items.sort(function(a,b){
        if((b.year||0)!==(a.year||0))return (b.year||0)-(a.year||0);
        return (b.createdAt||'').localeCompare(a.createdAt||'');
      });
      var latest=g.items[0];
      g.category=latest?latest.category:g.category;
    });
    groups.sort(function(a,b){
      var aMax=Math.max.apply(null,a.items.map(function(i){return i.year||0;}));
      var bMax=Math.max.apply(null,b.items.map(function(i){return i.year||0;}));
      if(bMax!==aMax)return bMax-aMax;
      return a.institutionName.localeCompare(b.institutionName);
    });
    return groups;
  }catch(e){console.error('getGroupedVault error',e);customAlert('그룹화 오류: '+(e.message||JSON.stringify(e)));return[];}
}

function getThisWeekInterviews(){
  var result=[],todayMs=new Date(TODAY).getTime(),weekMs=todayMs+7*86400000;
  JOBS.forEach(function(j){
    if(!j.interviewDate)return;
    var d=new Date(String(j.interviewDate).slice(0,10)).getTime();
    if(d>=todayMs&&d<=weekMs){
      j.applicants.filter(function(a){return a.status==='면접대기';}).forEach(function(a){
        var st=STUDENTS.find(function(s){return s.id===a.studentId;});
        if(st)result.push({studentName:st.name,jobName:j.name,interviewDate:j.interviewDate,category:j.category});
      });
    }
  });
  return result;
}
function getLongPendingNoReply(){
  var result=[],todayMs=new Date(TODAY).getTime();
  JOBS.forEach(function(j){
    j.applicants.forEach(function(a){
      if(!a.interviewDocSent)return;
      var sentMs=new Date(String(a.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&(a.interviewFeedback||'').indexOf('회신완료')<0){

  });
  return result;
}

/* ─ 데이터 로드 ─ */
async function loadAllData(){
  try{
    var results=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*'),
      SB.from('interview_vault').select('*').order('year',{ascending:false}).order('created_at',{ascending:false}),
      SB.from('training_courses').select('*').order('created_at',{ascending:false}),
      SB.from('training_participants').select('*').order('created_at',{ascending:false})
    ]);
    var sd=results[0].data,e1=results[0].error;
    var jd=results[1].data,e2=results[1].error;
    var ad=results[2].data,e3=results[2].error;
    var vd=results[3].data;
    /* training 테이블 결과 (없으면 빈 배열) */
    var tcd=(results[4]&&results[4].data)||[];
    var tpd=(results[5]&&results[5].data)||[];
    if(e1||e2||e3){
      var _em=[e1,e2,e3].filter(Boolean).map(function(e){return e.message||(typeof e==='string'?e:JSON.stringify(e));}).join(' / ');
      console.error('DB error',e1,e2,e3);
      customAlert('DB 에러: '+_em);
      return;
    }
    STUDENTS=(sd||[]).map(dbToStudent);
    var jobs=(jd||[]).map(dbToJob);
    var aps=(ad||[]).map(dbToApplicant);
    JOBS=jobs.map(function(j){return Object.assign({},j,{applicants:aps.filter(function(a){return a.jobId===j.id;})});});
    VAULT=(vd||[]).map(dbToVault);
    TR_COURSES=tcd;
    TR_PARTICIPANTS=tpd;
    console.log('Loaded: students='+STUDENTS.length+' jobs='+JOBS.length+' vault='+VAULT.length);
    renderView();
  }catch(err){console.error('loadAllData error',err);customAlert('네트워크 오류.');}
}

/* ─ PDF: 단일 자료 출력 ─ */

/* ─ PDF: 선택 항목 통합 출력 ─ */
function printSelectedVaultPDF(){
  if(!selectedVaultItems.size){customAlert('PDF로 출력할 자료를 체크해주세요.');return;}
  var selected=VAULT.filter(function(v){return selectedVaultItems.has(v.id);});
  if(!selected.length)return;
  var instNames=[...new Set(selected.map(function(v){return v.institutionName;}))];
  var isSingle=instNames.length===1;
  var sorted=selected.slice().sort(function(a,b){return (a.year||9999)-(b.year||9999)||a.institutionName.localeCompare(b.institutionName);});
  var allItems=[],hasQ=false;

  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);

}

/* ─ 기수 저장 ─ */
async function saveTrCourse(){
  var name=document.getElementById('trc_name')&&document.getElementById('trc_name').value.trim();
  if(!name)return customAlert('기수 명칭을 입력하세요');
  var typeEl=document.getElementById('trc_type');
  var typeVal=typeEl&&typeEl.value==='회의록 연수'?'meeting':'vod';
  var rc=await SB.from('training_courses').insert({course_name:name,type:typeVal}).select().single();
  if(rc.error){customAlert('기수 등록 오류: '+(rc.error.message||JSON.stringify(rc.error)));return;}
  var courseId=rc.data.id;
  if(window._trImportRows&&window._trImportRows.length){
    var result=await _bulkUpsertParticipants(courseId,window._trImportRows);
    window._trImportRows=null;
    closeModal();await loadAllData();
    trCourseId=courseId;renderView();
    customAlert('✅ 기수 등록 완료!\n수강생 '+result.ok+'명 등록'+(result.fail>0?'\n⚠️ 실패 '+result.fail+'명':''));
  }else{
    closeModal();await loadAllData();
    trCourseId=courseId;renderView();
  }
}

/* ─ CSV 미리보기 ─ */
function _previewTrCsv(file,previewId){
  if(!file)return;
  var prev=document.getElementById(previewId);if(!prev)return;
  Papa.parse(file,{
    header:true,skipEmptyLines:true,
    complete:function(res){
      var rows=res.data.filter(function(r){return r['이름']&&r['이름'].trim();});
      if(!rows.length){
        prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">❌ 유효한 데이터가 없습니다.</span></div>';
        window._trImportRows=null;return;
      }
      window._trImportRows=rows;
      prev.innerHTML='<div style="background:#F0FDF4;border-radius:6px;padding:8px 12px;border:1px solid #BBF7D0;display:flex;align-items:center;gap:8px">'+
        '<span style="font-size:16px">✅</span>'+
        '<span style="font-size:12px;font-weight:700;color:#065F46">'+rows.length+'명 인식 완료 — 등록 버튼으로 확정하세요</span></div>';
    },
    error:function(err){
      prev.innerHTML='<div style="background:#FEF2F2;border-radius:6px;padding:8px 12px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626">❌ '+esc(err.message||String(err))+'</span></div>';
    }
  });
}

/* ─ 수강생 일괄 Upsert (phone_number 복합키) ─ */
async function _bulkUpsertParticipants(courseId,rows){
  var allowedStatus=['수료','진행 중','중도포기'];
  var ok=0,fail=0;
  var slice=rows.slice(0,100);
  for(var i=0;i<slice.length;i++){
    var r=slice[i];
    var status=allowedStatus.includes(r['상태'])?r['상태']:'진행 중';
    var obj={
      course_id:Number(courseId),
      student_name:(r['이름']||'').trim(),
      phone_number:(r['휴대전화']||'').trim(),
      license_info:(r['자격증']||'').trim()||null,
      status:status,
      first_test_score:(r['특이사항']||'').trim()||null,
      first_test_result:(r['테스트통과유무']||'').trim()||null
    };
    if(!obj.student_name)continue;
    var res=obj.phone_number
      ?await SB.from('training_participants').upsert(obj,{onConflict:'course_id,phone_number'})
      :await SB.from('training_participants').insert(obj);
    if(res.error)fail++;else ok++;
  }
  return{ok:ok,fail:fail};
}

/* ─ 기수 삭제 ─ */
function deleteTrCourse(id){
  var c=TR_COURSES.find(function(x){return x.id===id;});if(!c)return;
  var cnt=TR_PARTICIPANTS.filter(function(p){return p.course_id===id;}).length;
  customConfirm('"'+c.course_name+'"\n\n기수를 삭제하시겠습니까?'+(cnt>0?'\n\n⚠️ 소속 수강생 '+cnt+'명 데이터도 삭제됩니다.':''),async function(){
    var r=await SB.from('training_courses').delete().eq('id',id);
    if(r.error){customAlert('삭제 오류: '+r.error.message);return;}
    if(trCourseId===id){trCourseId=null;}
    trSelectedIds.clear();
    await loadAllData();
  },'삭제','#DC2626');
}

/* ─ 수강생 저장 ─ */
async function saveTrMember(courseId,participantId){
  var nm=document.getElementById('trm_nm')&&document.getElementById('trm_nm').value.trim();
  if(!nm)return customAlert('이름을 입력하세요');
  var ph=(document.getElementById('trm_ph')&&document.getElementById('trm_ph').value)||'';
  var f={
    course_id:Number(courseId),
    student_name:nm,
    phone_number:ph.trim(),
    license_info:(document.getElementById('trm_gr')&&document.getElementById('trm_gr').value)||null,
    status:(document.getElementById('trm_st')&&document.getElementById('trm_st').value)||'진행 중',
    first_test_score:(document.getElementById('trm_s1')&&document.getElementById('trm_s1').value)||null,
    first_test_result:(document.getElementById('trm_r1')&&document.getElementById('trm_r1').value)||null
  };
  var r=participantId!=null
    ?await SB.from('training_participants').update(f).eq('id',participantId)
    :await SB.from('training_participants').insert(f);
  if(r.error){customAlert('저장 오류: '+(r.error.message||JSON.stringify(r.error)));return;}
  closeModal();await loadAllData();
}

function toggleTrSelectAll(ids){

/* ─ 기수 드롭다운: 연도별 그룹화 ─ */
function renderTrCourseSelect(){
  if(!TR_COURSES.length)return'<span style="font-size:12px;color:#94A3B8">등록된 기수 없음</span>';
  var yearMap={};
  TR_COURSES.forEach(function(c){

  });

      opts+='<option value="'+c.id+'" '+(trCourseId===c.id?'selected':'')+'>'+typeLabel+' '+esc(c.course_name)+'</option>';
    });

  });
  return'<select onchange="setTrCourse(this.value)" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;background:#fff;font-family:inherit;min-width:180px">'+opts+'</select>';

/* ─ 누적 수료생 집계 (전체 기수 합산) ─ */
function getTrCumulativeStats(){
  /* VOD 기수(type='vod')와 회의록 기수(type='meeting')의 수료생 수를 각각 집계 */
  var vodCourseIds=TR_COURSES.filter(function(c){return c.type!=='meeting';}).map(function(c){return c.id;});
  var meetingCourseIds=TR_COURSES.filter(function(c){return c.type==='meeting';}).map(function(c){return c.id;});
  var totalSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료';}).length;
  var vodSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료'&&vodCourseIds.indexOf(p.course_id)>=0;}).length;
  var meetingSuryo=TR_PARTICIPANTS.filter(function(p){return p.status==='수료'&&meetingCourseIds.indexOf(p.course_id)>=0;}).length;
  var totalParticipants=TR_PARTICIPANTS.length;
  return{total:totalSuryo,vod:vodSuryo,meeting:meetingSuryo,participants:totalParticipants,courses:TR_COURSES.length};
}

/* ─ 기수별 집계 (선택 기수만) ─ */
function getTrStats(){
  /* 선택된 기수의 수강생 통계를 계산합니다 */
  var course={total:0,suryo:0,ongoing:0,drop:0,pass:0,fail:0,advanced:0};
  if(trCourseId!=null){
    var cp=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
    course.total=cp.length;
    course.suryo=cp.filter(function(p){return p.status==='수료';}).length;
    course.ongoing=cp.filter(function(p){return p.status==='진행 중';}).length;
    course.drop=cp.filter(function(p){return p.status==='중도포기';}).length;
    course.pass=cp.filter(function(p){return p.first_test_result==='합격';}).length;
    course.fail=cp.filter(function(p){return p.first_test_result==='불합격';}).length;
    /* 심화 대상자: 수료 완료 + 테스트 합격인 학생 */
    course.advanced=cp.filter(function(p){return p.status==='수료'&&p.first_test_result==='합격';}).length;
  }
  /* 비율 계산 (0으로 나누기 방지) */
  course.suryoRate=course.total>0?Math.round(course.suryo/course.total*100):0;
  course.passRate=course.total>0?Math.round(course.pass/course.total*100):0;
  course.advRate=course.suryo>0?Math.round(course.advanced/course.suryo*100):0;
  return{course:course};
}

  customConfirm(cName+' — 전체 '+allM.length+'명을 ['+label+'] 상태로 변경하시겠습니까?',async function(){

/* ─ 연수 관리 메인 뷰 v7.0 ─ */
function renderTraining(){
  /* ── 누적 통계 및 기수별 집계 ── */
  var cumul=getTrCumulativeStats();   /* 전체 누적 수료생 */
  var stats=getTrStats();             /* 선택 기수 통계 */
  var curCourse=trCourseId!=null?TR_COURSES.find(function(c){return c.id===trCourseId;}):null;

  /* ── 수강생 필터링 로직 ──
     1) 검색어 있으면 전체 기수에서 이름/번호 뒷4자리 검색
     2) 기수 선택 시 해당 기수 수강생만 표시
     3) 상태(trStatus) 필터 적용
     4) 테스트결과(trTestFilter) 필터 적용
        - 'advanced' = 수료 완료 + 테스트 합격(심화 대상자)
  */
  var members;
  if(trKw.trim()){
    var kw=trKw.trim();
    members=TR_PARTICIPANTS.filter(function(p){
      return p.student_name.indexOf(kw)>=0||(p.phone_number||'').slice(-4).indexOf(kw)>=0;
    });
  }else if(trCourseId!=null){
    members=TR_PARTICIPANTS.filter(function(p){return p.course_id===trCourseId;});
  }else{
    members=[];
  }
  if(trStatus!=='전체')members=members.filter(function(p){return p.status===trStatus;});
  if(trTestFilter==='합격')members=members.filter(function(p){return p.first_test_result==='합격';});
  else if(trTestFilter==='불합격')members=members.filter(function(p){return p.first_test_result==='불합격';});
  else if(trTestFilter==='advanced'){
    /* 심화 대상자: 수료 완료 AND 테스트 합격 */
    members=members.filter(function(p){return p.status==='수료'&&p.first_test_result==='합격';});
  }
  window._trCurrentMembers=members; /* 엑셀 다운로드용 */

  var visibleIds=members.map(function(p){return p.id;});

function getTrHistoryHtml(phone){
  if(!phone||!phone.trim())return'';
  var phoneDigits=phone.replace(/\D/g,'');
  var list=TR_PARTICIPANTS.filter(function(p){
    return p.phone_number&&p.phone_number.replace(/\D/g,'')===phoneDigits;
  });
  if(!list.length)return'';
  var rows=list.map(function(p){
    var c=TR_COURSES.find(function(x){return x.id===p.course_id;});
    var typeIcon=c&&c.type==='meeting'?'📝':'🎥';
    var combo=trComboWarning(p.status||'',p.first_test_result||'');
    return'<div style="background:#F8FAFC;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px;margin-bottom:6px">'+
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
      '<span style="font-size:13px;font-weight:700;color:#374151">'+typeIcon+' '+(c?esc(c.course_name):'(삭제된 기수)')+'</span>'+
      trStatusBadge(p.status)+
      (p.license_info?'<span style="background:#EFF6FF;color:#2563EB;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid #BFDBFE">'+esc(p.license_info)+'</span>':'')+
      trSuryoBadge(p.first_test_result)+
      '</div>'+
      (combo?'<div style="margin-top:8px">'+combo+'</div>':'')+
      (p.first_test_score?'<p style="margin:6px 0 0;font-size:11px;color:#374151;white-space:pre-wrap;line-height:1.6;background:#FFFBEB;border-radius:6px;padding:6px 10px;border:1px solid #FEF3C7">'+esc(p.first_test_score)+'</p>':'')+
      '</div>';
  }).join('');
  return'<div style="margin-top:16px;padding-top:14px;border-top:1px solid #F3F4F6">'+
    '<p style="margin:0 0 10px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">🎓 연수 참여 이력 ('+list.length+'건)</p>'+
    rows+'</div>';
}


/* ─ 블랙리스트 시스템 ─ */
function getBlacklistCandidates(){
  var todayMs=new Date(TODAY).getTime();
  var result=[];
  JOBS.forEach(function(j){
    j.applicants.forEach(function(ap){
      if(!ap.interviewDocSent)return;
      var sentMs=new Date(String(ap.interviewDocSent).slice(0,10)).getTime();
      var diff=Math.round((todayMs-sentMs)/86400000);
      if(diff>=7&&(ap.interviewFeedback||'').indexOf('회신완료')<0){
        var st=STUDENTS.find(function(s){return s.id===ap.studentId;});
        if(st&&st.restrictionLevel!=='제한'){
          result.push({student:st,ap:ap,job:j,daysDiff:diff});
        }
      }
    });
  });
  return result;
}
function confirmBlacklist(studentId){
  var st=STUDENTS.find(function(s){return s.id===studentId;});
  if(!st)return;
  var msg='"'+st.name+'" ('+(st.phone||'-')+')\n\n이 학생을 영구 블랙리스트로 등록하시겠습니까?\n\n이후 동일 전화번호 등록 시 경고가 표시됩니다.';
  customConfirm(msg,async function(){
    var r=await SB.from('students').update({restriction_level:'제한'}).eq('id',studentId);
    if(r.error){customAlert('등록 오류: '+(r.error.message||JSON.stringify(r.error)));return;}
    await loadAllData();
    customAlert('✅ 블랙리스트에 등록되었습니다.');
  },'🚫 블랙 확정','#DC2626');
}
function removeFromBlacklist(studentId){
  var st=STUDENTS.find(function(s){return s.id===studentId;});
  if(!st)return;
  var msg='"'+st.name+'"\n\n블랙리스트에서 해제하시겠습니까?';
  customConfirm(msg,async function(){
    var r=await SB.from('students').update({restriction_level:null}).eq('id',studentId);
    if(r.error){customAlert('오류: '+(r.error.message||JSON.stringify(r.error)));return;}
    await loadAllData();
  },'해제','#059669');
}

function getEmpData(cat){
  var result=[];
  JOBS.forEach(function(j){
    if(cat!=='전체'&&j.category!==cat)return;
    j.applicants.filter(function(a){return a.status==='최종합격'||a.status==='취업성공';}).forEach(function(a){
      var st=STUDENTS.find(function(s){return s.id===a.studentId;});
      result.push({name:st?st.name:'(삭제된 학생)',phone:st?(st.phone||'-'):'-',email:st?(st.email||'-'):'-',jobName:j.name,category:j.category,finalDate:j.finalDate||'',grade:a.grade||'-',memo:a.memo||''});
    });
  });
  result.sort(function(a,b){return (b.finalDate||'').localeCompare(a.finalDate||'');});
  return result;
}

async function saveVault(vaultId){
  var cat=$('vf_cat')&&$('vf_cat').value;
  var inst=$('vf_inst')&&$('vf_inst').value.trim();if(!inst)return customAlert('기관명을 입력하세요');
  var cont=$('vf_content')&&$('vf_content').value.trim();if(!cont)return customAlert('면접 내용을 입력하세요');
  var yr=$('vf_year')&&$('vf_year').value;
  var f={category:cat,institution_name:inst,year:yr?parseInt(yr):null,content:cont};
  var r=vaultId!=null?await SB.from('interview_vault').update(f).eq('id',vaultId):await SB.from('interview_vault').insert(f);
  if(r.error){customAlert('저장 오류: '+(r.error.message||JSON.stringify(r.error)));return;}
  closeModal();await loadAllData();
}
function deleteVault(vaultId){
  var v=VAULT.find(function(x){return x.id===vaultId;});if(!v)return;
  customConfirm('"'+v.institutionName+'" ('+( v.year||'연도 미상')+'년)\n\n이 면접 자료를 삭제하시겠습니까?',async function(){
    var r=await SB.from('interview_vault').delete().eq('id',vaultId);
    if(r.error){customAlert('삭제 오류: '+r.error.message);return;}
    selectedVaultItems.delete(vaultId);await loadAllData();
  },'삭제','#DC2626');
}

/* ─ renderView / setView / init ─ */
function renderView(){
  _saveScrollPositions();
  var focusedId=document.activeElement?document.activeElement.id:null;
  var cursorPos=(document.activeElement&&typeof document.activeElement.selectionStart==='number')?document.activeElement.selectionStart:null;
  var main=$('_main');if(!main)return;
  try{
    if(currentView==='dashboard')main.innerHTML=renderDashboard();
    else if(currentView==='jobs')main.innerHTML=renderJobs();
    else if(currentView==='students')main.innerHTML=renderStudents();
    else if(currentView==='employment')main.innerHTML=renderEmployment();
    else if(currentView==='interview')main.innerHTML=renderInterviewRoom();
    else if(currentView==='blacklist')main.innerHTML=renderBlacklist();
    else if(currentView==='training')main.innerHTML=renderTraining();
  }catch(e){console.error('renderView error',e);main.innerHTML='<div style="padding:40px;text-align:center;color:#DC2626">렌더링 오류: '+(e.message||String(e))+'</div>';}
  var sb=$('_sidebar');if(sb)sb.outerHTML=renderSidebar();
  _restoreScrollPositions();
  var searchIds=['jobSearchInput','studentSearchInput','vaultSearchInput','trSearchInput'];
  if(focusedId&&searchIds.indexOf(focusedId)>=0){requestAnimationFrame(function(){var el=$(focusedId);if(el){el.focus();if(cursorPos!==null){try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}}}});}
}
function setView(v){_savedScrollTop=0;_savedTblScrollTop=0;currentView=v;$('app').innerHTML=renderSidebar()+'<main id="_main" style="flex:1;overflow:hidden;background:#F0F2F5;display:flex;flex-direction:column;min-height:0"></main>';renderView();}
async function init(){setView('dashboard');showLoading();try{await loadAllData();}finally{hideLoading();}setupRealtime();}
init();
</script>
</body>
</html>
