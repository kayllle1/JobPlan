function onJobCompositionStart(){_jobComposing=true;clearTimeout(_jobDebTimer);}
function onJobCompositionEnd(el){_jobComposing=false;clearTimeout(_jobDebTimer);const v=el.value;_jobDebTimer=setTimeout(()=>{jobFilter.kw=v;renderView();},0);}

// 유틸
const fmt        = d => d ? String(d).replace(/-/g,'.') : '-';
const $          = id => document.getElementById(id);
const esc        = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dateOrNull = v => (v && String(v).trim()) ? v : null;
const isToday    = d => !!d && String(d).slice(0,10)===TODAY;

function calcDDay(ds){
  if(!ds)return null;
  const s=String(ds).slice(0,10);
  const[y,mo,da]=s.split('-').map(Number);
  const[ty,tmo,tda]=TODAY.split('-').map(Number);
  return Math.round((new Date(y,mo-1,da)- new Date(ty,tmo-1,tda))/86400000);
}
function isTrulyOver(job){
  if(job.isClosed)return true;
  if(job.finalDate&&String(job.finalDate).slice(0,10)>=TODAY)return false;
  if(job.interviewDate&&String(job.interviewDate).slice(0,10)>=TODAY)return false;
  const dl=job.applyDeadline||job.docDate;
  return !!(dl&&String(dl).slice(0,10)<TODAY);
}
function dDayBadge(dateStr,closed){
  if(closed)return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">마감됨</span>`;
  const d=calcDDay(dateStr); if(d===null)return'';
  if(d<0)  return`<span style="background:#F3F4F6;color:#9CA3AF;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #E5E7EB;white-space:nowrap">기간만료</span>`;
  if(d===0)return`<span style="background:#FEE2E2;color:#DC2626;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">🔴 D-DAY</span>`;
  if(d<=3) return`<span style="background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;border:1px solid #FECACA;white-space:nowrap">D-${d}</span>`;
  if(d<=7) return`<span style="background:#FEF3C7;color:#D97706;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #FDE68A;white-space:nowrap">D-${d}</span>`;
  return`<span style="background:#DBEAFE;color:#1D4ED8;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #BFDBFE;white-space:nowrap">D-${d}</span>`;
}
function csvExport(data,name){
  if(!data||!data.length)return;
  const hdrs=Object.keys(data[0]);
  const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));
  const csv=[hdrs.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();
  URL.revokeObjectURL(url);
}
function getApps(sid){return JOBS.flatMap(j=>j.applicants.filter(a=>a.studentId===sid).map(a=>({...a,jobName:j.name,category:j.category,docDate:j.docDate,finalDate:j.finalDate})));}
function getStudentStatus(sid){
  const apps=getApps(sid);
  if(!apps.length)return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
  if(apps.some(a=>a.status==='최종합격'))return{label:'취업완료',emoji:'🔵',color:'#1D4ED8',bg:'#DBEAFE',border:'#93C5FD'};
  if(apps.some(a=>a.status!=='최종합격'&&a.status!=='불합격'))return{label:'진행중',emoji:'🟡',color:'#D97706',bg:'#FEF3C7',border:'#FDE68A'};
  return{label:'지원가능',emoji:'🟢',color:'#059669',bg:'#D1FAE5',border:'#6EE7B7'};
}
function filterStudents(){
  const kw=studentFilter.kw.trim();
  return STUDENTS.filter(s=>{
    if(kw&&!s.name.includes(kw)&&!(s.phone||'').includes(kw)&&!(s.email||'').includes(kw))return false;
    if(studentFilter.grade!=='전체'&&!getApps(s.id).some(a=>a.grade===studentFilter.grade))return false;
    return true;
  });
}

// DB 변환
function dbToStudent(r){return{id:r.id,name:r.name,age:r.age,phone:r.phone||'',email:r.email||'',counselingMemo:r.counseling_memo||''};}
function dbToJob(r){return{id:r.id,name:r.name,category:r.category||'기타',type:r.type||'',isRec:!!r.is_rec,isReA:!!r.is_rea,isClosed:!!r.is_closed,applyStartDate:r.apply_start_date||'',applyDeadline:r.apply_deadline||'',documentPassDate:r.document_pass_date||'',jobUrl:r.job_url||'',docDate:r.doc_date||'',interviewDate:r.interview_date||'',finalDate:r.final_date||'',startDate:r.start_date||'',endDate:r.end_date||'',note:r.note||'',submitDocs:r.submit_docs||'',submitDeadline:r.submit_deadline||'',managerName:r.manager_name||'',managerPhone:r.manager_phone||'',managerEmail:r.manager_email||'',createdAt:r.created_at||'',applicants:[]};}
function dbToApplicant(r){return{id:r.id,jobId:r.job_id,studentId:r.student_id,status:r.status||'서류접수',grade:r.grade||'3급',announceType:r.announce_type||'홈페이지',memo:r.memo||'',examNumber:r.exam_number||'',interviewDocSent:r.interview_doc_sent||'',interviewFeedback:r.interview_feedback||''};}

// 데이터 로드
async function loadAllData(){
  try{
    const[{data:sd,error:e1},{data:jd,error:e2},{data:ad,error:e3}]=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*')
    ]);
    if(e1||e2||e3){console.error(e1,e2,e3);customAlert('데이터 로드 오류.\nSupabase 연결 정보를 확인하세요.');return;}
    STUDENTS=(sd||[]).map(dbToStudent);
    const jobs=(jd||[]).map(dbToJob);
    const aps=(ad||[]).map(dbToApplicant);
    JOBS=jobs.map(j=>({...j,applicants:aps.filter(a=>a.jobId===j.id)}));
    renderView();
  }catch(err){console.error(err);customAlert('네트워크 오류.');}
}

// 차트
function pieChartSVG(data,w,h){
  if(!data||!data.length)return`<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const total=data.reduce((s,d)=>s+d.value,0),r=Math.min(w,h)*.32,cx=w*.42,cy=h/2,legX=cx+r+18,legStartY=h/2-(data.length*18)/2;
  let angle=-Math.PI/2,paths='',labels='',legend='';
  data.forEach((d,i)=>{
    const slice=(d.value/total)*2*Math.PI,x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice),large=slice>Math.PI?1:0,c=PIE_C[i%PIE_C.length],mx=cx+(r*.65)*Math.cos(angle+slice/2),my=cy+(r*.65)*Math.sin(angle+slice/2);
    paths+=`<path d="M${cx.toFixed(1)},${cy.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r.toFixed(1)},${r.toFixed(1)} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${c}" stroke="#fff" stroke-width="2"/>`;
    if(d.value>0)labels+=`<text x="${mx.toFixed(1)}" y="${(my+4).toFixed(1)}" text-anchor="middle" fill="#fff" font-size="${Math.max(9,r*.15).toFixed(0)}" font-weight="bold">${d.value}</text>`;
    legend+=`<g transform="translate(${legX.toFixed(1)},${(legStartY+i*20).toFixed(1)})"><rect width="10" height="10" fill="${c}" rx="2"/><text x="14" y="9" font-size="11" fill="#374151">${esc(d.name)}</text></g>`;
    angle+=slice;
  });
  return`<svg width="${w}" height="${h}" style="overflow:visible;display:block">${paths}${labels}${legend}</svg>`;
}
function barChartSVG(data,w,h){
  if(!data||!data.length)return`<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const max=Math.max(...data.map(d=>d.value),1),pl=28,pb=28,pt=30,pr=8,bw2=(w-pl-pr)/data.length*.55,gap=(w-pl-pr)/data.length;
  let bars='',grid='';
  for(let i=0;i<=4;i++){const y=h-pb-(i/4)*(h-pt-pb);grid+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w-pr}" y2="${y.toFixed(1)}" stroke="#F1F5F9" stroke-width="1"/>`;if(i>0)grid+=`<text x="${(pl-5).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#94A3B8">${Math.round(max*i/4)}</text>`;}
  data.forEach((d,i)=>{
    const bh=((d.value/max)*(h-pt-pb))||2,x=pl+i*gap+gap*.225,y=h-pb-bh,c=PIE_C[i%PIE_C.length];
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw2.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}" rx="4"/>`;
    bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(h-pb+16).toFixed(1)}" text-anchor="middle" font-size="10" fill="#6B7280">${esc(d.name)}</text>`;
    if(d.value>0)bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">${d.value}</text>`;
  });
  return`<svg width="${w}" height="${h}" style="display:block;overflow:visible">${grid}${bars}</svg>`;
}

function customConfirm(msg,onYes,yesLabel,yesColor){
  yesLabel=yesLabel||'확인';yesColor=yesColor||'#2563EB';
  var old=$('_cfrm');if(old)old.remove();
  var fn='_cfrmYes_'+Date.now();
  window[fn]=async function(){var el=$('_cfrm');if(el)el.remove();delete window[fn];try{await onYes();}catch(e){customAlert('오류: '+e.message);}};
  var div=document.createElement('div');div.id='_cfrm';div.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:11000;backdrop-filter:blur(2px)';

  document.body.appendChild(div);
}

// ══ ★★★ v6.4 신규: 독립 취업 현황 뷰 ══════════════════════
function getEmpData(cat){
  const result=[];
  JOBS.forEach(j=>{
    if(cat!=='전체'&&j.category!==cat)return;
    j.applicants.filter(a=>a.status==='최종합격').forEach(a=>{
      const st=STUDENTS.find(s=>s.id===a.studentId);
      result.push({name:st?st.name:'(삭제된 학생)',phone:st?(st.phone||'-'):'-',email:st?(st.email||'-'):'-',jobName:j.name,category:j.category,finalDate:j.finalDate||'',grade:a.grade||'-',memo:a.memo||''});
    });
  });
  result.sort((a,b)=>(b.finalDate||'').localeCompare(a.finalDate||''));
  return result;
}
function setEmpCat(cat){empCat=cat;renderView();}
function exportEmpCsv(){
  const list=getEmpData(empCat);
  if(!list.length)return customAlert('내보낼 취업자 데이터가 없습니다.');
  const catLabel=empCat==='전체'?'전체기관':empCat;
  csvExport(list.map((r,i)=>({'No':i+1,'이름':r.name,'연락처':r.phone,'이메일':r.email,'기관유형':r.category,'공고명':r.jobName,'최종합격발표일':r.finalDate?fmt(r.finalDate):'-','급수':r.grade,'메모':r.memo})),`취업자명단_${catLabel}_${TODAY}`);
}

function drawCharts(){
  const pw=$('pie-wrap'),bw=$('bar-wrap');if(!pw||!bw)return;
  const allAps=JOBS.flatMap(j=>j.applicants);
  const finalSids=JOBS.flatMap(j=>j.applicants.filter(a=>a.status==='최종합격').map(a=>a.studentId));
  const statusData=STATUSES.map(s=>({name:s,value:allAps.filter(a=>a.status===s).length})).filter(d=>d.value>0);
  const ag={'10대':0,'20대':0,'30대':0,'40대+':0,'나이 모름':0};
  finalSids.forEach(sid=>{const st=STUDENTS.find(s=>s.id===sid);if(!st||!st.age){ag['나이 모름']++;return;}if(st.age<20)ag['10대']++;else if(st.age<30)ag['20대']++;else if(st.age<40)ag['30대']++;else ag['40대+']++;});
  const ageData=Object.keys(ag).map(k=>({name:k,value:ag[k]})).filter(d=>d.value>0);
  const pw_w=pw.clientWidth-4,pw_h=pw.clientHeight-4,bw_w=bw.clientWidth-4,bw_h=bw.clientHeight-4;
  if(pw_w>0&&pw_h>0)pw.innerHTML=pieChartSVG(statusData,pw_w,pw_h);
  if(bw_w>0&&bw_h>0)bw.innerHTML=barChartSVG(ageData,bw_w,bw_h);
}

// 정렬
function sortByFinalDate(jobs){
  const active=jobs.filter(j=>!j.isClosed),closed=jobs.filter(j=>j.isClosed);
  active.sort((a,b)=>{
    const fa=a.finalDate?String(a.finalDate).slice(0,10):'',fb=b.finalDate?String(b.finalDate).slice(0,10):'';
    const aF=fa&&fa>=TODAY,bF=fb&&fb>=TODAY,aP=fa&&fa<TODAY,bP=fb&&fb<TODAY;
    if(aF&&bF)return fa.localeCompare(fb);
    if(aF&&!bF)return -1;if(!aF&&bF)return 1;
    if(aP&&bP)return fb.localeCompare(fa);
    if(aP&&!bP)return -1;if(!aP&&bP)return 1;
    return(a.applyDeadline||a.docDate||'9999').localeCompare(b.applyDeadline||b.docDate||'9999');
  });
  return[...active,...closed];
}
function getFiltered(){return JOBS.filter(j=>{
  if(jobFilter.cat!=='전체'&&j.category!==jobFilter.cat)return false;
  if(jobFilter.year&&!(j.docDate||'').startsWith(jobFilter.year))return false;
  if(jobFilter.kw&&!j.name.includes(jobFilter.kw))return false;
  if(jobFilter.type==='추천'&&!j.isRec)return false;
  if(jobFilter.type==='지원'&&j.isRec)return false;
  return true;
});}
function getSorted(filtered){return sortByFinalDate(filtered);}

async function saveJob(jobId){
  const name=$('jf_name')&&$('jf_name').value.trim();if(!name)return customAlert('공고명을 입력하세요');

}

// CSV 내보내기
function exportJobs(){csvExport(getSorted(getFiltered()).map((j,i)=>({'No':i+1,'카테고리':j.category,'채용형태':j.type,'공고명':j.name,'서류접수일':j.docDate||'','서류마감일':j.applyDeadline||'','서류합격발표일':j.documentPassDate||'','면접일':j.interviewDate||'','최종합격발표일':j.finalDate||'','공고URL':j.jobUrl||'','지원자수':j.applicants.length,'서류합격':j.applicants.filter(a=>a.status==='서류합격').length,'면접대기':j.applicants.filter(a=>a.status==='면접대기').length,'합격':j.applicants.filter(a=>a.status==='최종합격').length,'불합격':j.applicants.filter(a=>a.status==='불합격').length,'상태':j.isClosed?'마감':'진행'})),'공고목록_v64');}
function exportStudents(){const filtered=filterStudents();csvExport(filtered.map((s,i)=>{const apps=getApps(s.id),st=getStudentStatus(s.id);return{'No':i+1,'이름':s.name,'상태':st.label,'나이':s.age||'미등록','연락처':s.phone,'이메일':s.email,'지원횟수':apps.length,'최종합격':apps.filter(a=>a.status==='최종합격').length,'상담메모':s.counselingMemo||''};}),  '학생DB_v64');}
function exportHistory(studentId){const s=STUDENTS.find(st=>st.id===studentId);if(!s)return;csvExport(getApps(studentId).map(a=>({'기관명':a.jobName,'카테고리':a.category,'서류접수일':a.docDate||'','최종합격발표일':a.finalDate||'','상태':a.status,'급수':a.grade,'발표방식':a.announceType,'메모':a.memo||''})),s.name+'_지원이력');}

// 초기화
async function init(){setView('dashboard');showLoading();try{await loadAllData();}finally{hideLoading();}setupRealtime();}
init();
</script>
