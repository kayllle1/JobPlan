<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMS v7.0 — 통합 취업지원 관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════ v6.9 원본 스타일 유지 ════ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#F0F2F5;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.tbl-tr:hover{background:#F8FAFC!important}
.acc-tr:hover{background:#EFF6FF!important}
.emp-tr:hover{background:#F0FDF4!important}
.job-name-btn:hover{color:#1D4ED8!important;text-decoration:underline!important}
.row-urgent{background:#FFF1E6!important}
.row-urgent:hover{background:#FFE8D6!important}
.job-detail-panel{background:#F0F7FF;border-left:4px solid #2563EB;border-bottom:2px solid #DBEAFE}
.cat-tab-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cat-tab-wrap::-webkit-scrollbar{display:none}

/* 대시보드 레이아웃 */
#dash-root{display:flex;flex-direction:column;height:100%;overflow-y:auto}
#dash-header{padding:14px 24px 8px;flex-shrink:0}
#dash-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 24px;flex-shrink:0}
.dash-card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.dash-card-head{padding:13px 18px 11px;flex-shrink:0;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:8px}
.dash-card-body{flex:1;overflow-y:auto;padding:14px 16px 14px;min-height:0}
.custom-scroll{overflow-y:auto}

/* ════ v7.0 PDF 워터마크 & 면접 전용 스타일 ════ */
#print-target{display:none}
@media print {
    body * { visibility: hidden; }
    #print-target, #print-target * { visibility: visible; }
    #print-target { display: block!important; position: absolute; left: 0; top: 0; width: 100%; background: white; }
    .no-print { display: none !important; }
    #print-target::before {
        content: "SORIZAVA ACADEMY";
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-35deg);
        font-size: 60pt; color: rgba(220, 220, 220, 0.15); font-weight: 900; z-index: -1; white-space: nowrap;
    }
}
.iv-tag{font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-right:4px}
.btn-sm{font-size:11px; padding:4px 8px; border-radius:6px; border:1px solid #E5E7EB; background:#fff}
</style>
</head>
<body>

<div id="print-target"></div>
<div id="app" style="height:100vh; display:flex; flex-direction:column"></div>

<script>
/* 1. CONFIG & STATE */
const SUPABASE_URL = 'https://swecejgbnlulcqmfffvv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3ZWNlamdibmx1bGNxbWZmZnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTI2MDcsImV4cCI6MjA5MDc2ODYwN30.nFeiYalxzheU5Os9eD1oLD4_ftkIEl16c0PnKYD7EjY';
const SB = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getKSTDateString(){const now=new Date();return new Date(now.getTime()+9*60*60*1000).toISOString().slice(0,10);}
const TODAY = getKSTDateString();
const MONTH = TODAY.slice(0,7);

let STUDENTS=[], JOBS=[], APPLICANTS=[], LOGS=[], INTERVIEWS=[];
let currentView = 'dashboard';
let ivFilter = {cat:'전체', year:'전체', kw:''};

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* 2. DATA LOAD */
async function loadAllData(){
    const [rSt, rJo, rAp, rLo] = await Promise.all([
        SB.from('students').select('*'),
        SB.from('jobs').select('*'),
        SB.from('applicants').select('*'),
        SB.from('logs').select('*').order('created_at',{ascending:false})
    ]);
    STUDENTS = rSt.data||[];
    JOBS = rJo.data||[];
    APPLICANTS = rAp.data||[];
    LOGS = rLo.data||[];
    
    // 면접 데이터는 우선 샘플로 채우고 나중에 테이블 연동 가능
    INTERVIEWS = [
        {id:1, category:'법원', institution:'서울중앙지방법원', year:'2024', date:'2024-03', content:'1. 자기소개\n2. 속기사를 선택한 이유\n3. 민원 응대 방법\n4. 실시간 속기 경험', tips:'깔끔한 정장 착용'},
        {id:2, category:'검찰', institution:'서울동부지방검찰청', year:'2024', date:'2024-05', content:'1. 보안의 중요성\n2. 컴퓨터 활용 능력\n3. 협업 갈등 해결 사례', tips:'신분증 지참 필수'}
    ];
    renderView();
}

/* 3. RENDER VIEWS */
function renderDashboard() {
    const root = $('app');
    const activeJobs = JOBS.filter(j=>!j.isClosed).length;
    
    root.innerHTML = `
    <div id="dash-root">
        <div id="dash-header">
            <h1 style="font-size:20px; font-weight:900; color:#0F172A">소리자바 아카데미 <span style="font-size:12px; color:#2563EB">v7.0 통합 관리</span></h1>
        </div>

        <div id="dash-kpi">
            <div class="dash-card" style="height:80px; padding:15px; flex-direction:row; align-items:center; gap:12px">
                <div style="width:40px;height:40px;background:#EFF6FF;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#2563EB;font-size:18px">📢</div>
                <div><p style="font-size:11px;color:#64748B">진행 공고</p><p style="font-size:18px;font-weight:800">${activeJobs}</p></div>
            </div>
            <div class="dash-card" style="height:80px; padding:15px; flex-direction:row; align-items:center; gap:12px">
                <div style="width:40px;height:40px;background:#F0FDF4;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#16A34A;font-size:18px">📁</div>
                <div><p style="font-size:11px;color:#64748B">면접 자료</p><p style="font-size:18px;font-weight:800">${INTERVIEWS.length}</p></div>
            </div>
            <div class="dash-card" style="height:80px; padding:15px; flex-direction:row; align-items:center; gap:12px">
                <div style="width:40px;height:40px;background:#F5F3FF;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#7C3AED;font-size:18px">👥</div>
                <div><p style="font-size:11px;color:#64748B">전체 학생</p><p style="font-size:18px;font-weight:800">${STUDENTS.length}</p></div>
            </div>
            <div class="dash-card" style="height:80px; padding:15px; flex-direction:row; align-items:center; gap:12px">
                <div style="width:40px;height:40px;background:#FFF7ED;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#EA580C;font-size:18px">🕒</div>
                <div><p style="font-size:11px;color:#64748B">오늘 날짜</p><p style="font-size:14px;font-weight:800">${TODAY}</p></div>
            </div>
        </div>

        <div style="padding:12px 24px; display:flex; flex-direction:column; gap:14px">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px">
                <div class="dash-card" style="height:400px">
                    <div class="dash-card-head"><span style="font-weight:800; flex:1">📋 최근 공고</span><button onclick="currentView='jobs';renderView()" class="btn-sm">전체보기</button></div>
                    <div class="dash-card-body" id="dash-job-list"></div>
                </div>
                <div class="dash-card" style="height:400px">
                    <div class="dash-card-head"><span style="font-weight:800; flex:1">👥 학생 현황</span><button onclick="currentView='students';renderView()" class="btn-sm">전체보기</button></div>
                    <div class="dash-card-body" id="dash-student-list"></div>
                </div>
            </div>

            <div class="dash-card" style="min-height:500px">
                <div class="dash-card-head" style="justify-content:space-between; background:#F8FAFC">
                    <div style="display:flex; align-items:center; gap:10px">
                        <span style="font-weight:900; color:#1E3A5F; font-size:15px">📂 면접 자료 아카이브</span>
                        <input type="text" id="iv-kw" placeholder="기관명 검색..." oninput="ivFilter.kw=this.value;renderInterviewArchive()" style="border:1px solid #CBD5E1; padding:5px 10px; border-radius:6px; font-size:12px; width:150px">
                        <select onchange="ivFilter.cat=this.value;renderInterviewArchive()" style="border:1px solid #CBD5E1; border-radius:6px; font-size:12px">
                            <option value="전체">전체 분류</option>
                            <option value="법원">법원</option>
                            <option value="검찰">검찰</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:6px">
                        <button onclick="printCurrentInterviews()" style="background:#334155; color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:700; font-size:11px">🔍 결과 전체 출력</button>
                        <button onclick="openIvModal()" style="background:#2563EB; color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:700; font-size:11px">+ 신규 등록</button>
                    </div>
                </div>
                <div class="dash-card-body" id="iv-archive-list" style="padding:0"></div>
            </div>
        </div>
    </div>
    `;
    renderDashJobs();
    renderDashStudents();
    renderInterviewArchive();
}

/* 4. 면접 아카이브 전용 로직 */
function renderInterviewArchive() {
    const container = $('iv-archive-list');
    const filtered = INTERVIEWS.filter(iv => {
        if(ivFilter.cat !== '전체' && iv.category !== ivFilter.cat) return false;
        if(ivFilter.kw && !iv.institution.includes(ivFilter.kw)) return false;
        return true;
    });

    container.innerHTML = `
    <table style="width:100%; border-collapse:collapse; font-size:12px">
        <thead style="background:#F1F5F9">
            <tr>
                <th style="padding:10px; text-align:left; border-bottom:1px solid #E2E8F0; width:100px">시기</th>
                <th style="padding:10px; text-align:left; border-bottom:1px solid #E2E8F0">기관명</th>
                <th style="padding:10px; text-align:left; border-bottom:1px solid #E2E8F0">요약</th>
                <th style="padding:10px; text-align:center; border-bottom:1px solid #E2E8F0; width:120px">관리</th>
            </tr>
        </thead>
        <tbody>
            ${filtered.map(iv => `
                <tr class="acc-tr" style="border-bottom:1px solid #F1F5F9; cursor:pointer" onclick="openIvModal(${iv.id})">
                    <td style="padding:12px 10px; color:#64748B">${iv.date}</td>
                    <td style="padding:12px 10px; font-weight:700">${esc(iv.institution)}</td>
                    <td style="padding:12px 10px; color:#475569">${esc(iv.content.substring(0,30))}...</td>
                    <td style="padding:12px 10px; text-align:center" onclick="event.stopPropagation()">
                        <button onclick="openIvModal(${iv.id})" style="border:none; background:none; color:#2563EB; font-weight:700">수정</button>
                        <button onclick="deleteIv(${iv.id})" style="border:none; background:none; color:#EF4444; font-weight:700; margin-left:8px">삭제</button>
                    </td>
                </tr>
            `).join('')}
        </tbody>
    </table>`;
}

/* ════ 5. 면접 자료 상세 및 PDF 출력 ════ */
let selectedIvId = null;

function openIvModal(id = null) {
    selectedIvId = id;
    const iv = id ? INTERVIEWS.find(x => x.id === id) : null;
    
    const modalHtml = `
    <div id="iv-modal-overlay" onclick="closeIvModal()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center;">
        <div onclick="event.stopPropagation()" style="background:white; width:95%; max-width:650px; border-radius:15px; overflow:hidden; display:flex; flex-direction:column; max-height:90vh">
            <div style="padding:18px 20px; border-bottom:1px solid #EEE; display:flex; justify-content:space-between; align-items:center; background:#F8FAFC">
                <h2 style="font-size:16px; font-weight:800; color:#1E3A5F">${id?'면접 자료 상세 / PDF 출력':'신규 면접 자료 등록'}</h2>
                <button onclick="closeIvModal()" style="border:none; background:none; font-size:24px; color:#94A3B8">&times;</button>
            </div>
            <div style="padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:15px">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div>
                        <label style="font-size:11px; color:#64748B; display:block; margin-bottom:5px">기관명 (예: 서울중앙지법)</label>
                        <input id="iv-m-inst" type="text" value="${iv?esc(iv.institution):''}" style="width:100%; padding:9px; border:1px solid #DDD; border-radius:8px">
                    </div>
                    <div>
                        <label style="font-size:11px; color:#64748B; display:block; margin-bottom:5px">면접 시기 (예: 2024-03)</label>
                        <input id="iv-m-date" type="text" value="${iv?esc(iv.date):''}" style="width:100%; padding:9px; border:1px solid #DDD; border-radius:8px">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div>
                        <label style="font-size:11px; color:#64748B; display:block; margin-bottom:5px">카테고리</label>
                        <select id="iv-m-cat" style="width:100%; padding:9px; border:1px solid #DDD; border-radius:8px">
                            <option value="법원" ${iv?.category==='법원'?'selected':''}>법원</option>
                            <option value="검찰" ${iv?.category==='검찰'?'selected':''}>검찰</option>
                            <option value="의회" ${iv?.category==='의회'?'selected':''}>의회</option>
                            <option value="사기업" ${iv?.category==='사기업'?'selected':''}>사기업</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label style="font-size:11px; color:#64748B; display:block; margin-bottom:5px">면접 질문 내용</label>
                    <textarea id="iv-m-content" style="width:100%; height:180px; padding:12px; border:1px solid #DDD; border-radius:8px; resize:none; line-height:1.6">${iv?esc(iv.content):''}</textarea>
                </div>
                <div>
                    <label style="font-size:11px; color:#64748B; display:block; margin-bottom:5px">준비 팁 / 참고사항</label>
                    <input id="iv-m-tips" type="text" value="${iv?esc(iv.tips):''}" style="width:100%; padding:9px; border:1px solid #DDD; border-radius:8px">
                </div>
            </div>
            <div style="padding:15px 20px; border-top:1px solid #EEE; display:flex; justify-content:space-between; background:#F8FAFC">
                ${id ? `<button onclick="printSingleIv()" style="background:#334155; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:700; font-size:12px">📄 PDF 저장</button>` : '<div></div>'}
                <div style="display:flex; gap:8px">
                    <button onclick="closeIvModal()" style="background:#E2E8F0; color:#475569; border:none; padding:10px 18px; border-radius:8px; font-weight:700">취소</button>
                    <button onclick="saveIvData()" style="background:#2563EB; color:white; border:none; padding:10px 25px; border-radius:8px; font-weight:700">데이터 저장</button>
                </div>
            </div>
        </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function closeIvModal() {
    const overlay = $('iv-modal-overlay');
    if(overlay) overlay.remove();
}

async function saveIvData() {
    const inst = $('iv-m-inst').value;
    const date = $('iv-m-date').value;
    const cat = $('iv-m-cat').value;
    const content = $('iv-m-content').value;
    const tips = $('iv-m-tips').value;
    
    if(!inst || !content) return alert("기관명과 질문 내용을 입력해주세요.");

    const payload = { institution: inst, date: date, category: cat, content: content, tips: tips, year: date.split('-')[0] };

    if(selectedIvId) {
        INTERVIEWS = INTERVIEWS.map(x => x.id === selectedIvId ? {...x, ...payload} : x);
    } else {
        INTERVIEWS.unshift({...payload, id: Date.now()});
    }

    alert("성공적으로 저장되었습니다.");
    closeIvModal();
    renderInterviewArchive();
}

function deleteIv(id) {
    if(!confirm("정말 이 자료를 삭제하시겠습니까?")) return;
    INTERVIEWS = INTERVIEWS.filter(x => x.id !== id);
    renderInterviewArchive();
}

function printSingleIv() {
    const iv = INTERVIEWS.find(x => x.id === selectedIvId);
    if(!iv) return;
    
    const pt = $('print-target');
    pt.innerHTML = `
        <div style="padding:20mm; position:relative;">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2.5pt solid #1E3A5F; padding-bottom:12px; margin-bottom:30px">
                <div>
                    <h1 style="font-size:30pt; font-weight:900; color:#1E3A5F; margin:0; letter-spacing:-1pt">SORIZAVA ACADEMY</h1>
                    <p style="margin:6px 0 0 0; color:#64748B; font-size:11pt; font-weight:600">취업 지원 전용 면접 아카이브</p>
                </div>
                <div style="text-align:right">
                    <p style="color:#DC2626; font-weight:900; font-size:12pt; margin-bottom:5px">무단 전재 및 배포 금지</p>
                    <p style="font-size:9pt; color:#94A3B8; margin:0">본 문서는 교육생의 학습을 위한 소중한 자산입니다.</p>
                </div>
            </div>

            <div style="margin-bottom:40px;">
                <div style="background:#F1F5F9; padding:25px; border-radius:12px; margin-bottom:30px; border:1px solid #E2E8F0">
                    <h2 style="font-size:24pt; font-weight:900; color:#0F172A; margin:0">${esc(iv.institution)}</h2>
                    <p style="margin:10px 0 0 0; color:#2563EB; font-weight:800; font-size:13pt">면접 일시: ${iv.date}</p>
                </div>
                
                <div style="padding:0 15px;">
                    <h3 style="font-size:16pt; color:#1E3A5F; border-left:6px solid #1E3A5F; padding-left:18px; margin-bottom:25px; font-weight:900">면접 질문 복기 자료</h3>
                    <div style="line-height:2.2; font-size:12.5pt; color:#334155; white-space:pre-wrap; background:#FFFFFF; padding:5px">${esc(iv.content)}</div>
                    
                    ${iv.tips ? `
                    <div style="margin-top:40px; padding:20px; background:#FFFBEB; border:1px solid #FEF3C7; border-radius:10px;">
                        <p style="font-weight:900; color:#92400E; margin-bottom:8px; font-size:12pt">💡 합격자 가이드 & 팁</p>
                        <p style="font-size:11.5pt; color:#B45309; line-height:1.7">${esc(iv.tips)}</p>
                    </div>` : ''}
                </div>
            </div>
            
            <div style="position:fixed; bottom:20mm; left:20mm; right:20mm; border-top:1pt solid #E2E8F0; padding-top:15px; text-align:center; color:#94A3B8; font-size:9.5pt; font-weight:500">
                본 자료는 소리자바 아카데미의 동의 없이 외부로 유출될 경우 법적 책임을 물을 수 있습니다.
            </div>
        </div>
    `;
    window.print();
}

function printCurrentInterviews() {
    const filtered = INTERVIEWS.filter(iv => {
        if(ivFilter.cat !== '전체' && iv.category !== ivFilter.cat) return false;
        if(ivFilter.kw && !iv.institution.includes(ivFilter.kw)) return false;
        return true;
    });
    
    if(filtered.length === 0) return alert("출력할 데이터가 없습니다.");
    
    const pt = $('print-target');
    pt.innerHTML = filtered.map(iv => `
        <div style="padding:20mm; position:relative; page-break-after:always;">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2pt solid #1E3A5F; padding-bottom:10px; margin-bottom:30px">
                <h1 style="font-size:24pt; font-weight:900; color:#1E3A5F; margin:0">SORIZAVA ACADEMY</h1>
                <p style="font-size:10pt; color:#EF4444; font-weight:800">무단 배포 금지</p>
            </div>
            <div style="background:#F8FAFC; padding:20px; border-radius:10px; margin-bottom:20px; border:1px solid #E2E8F0">
                <h2 style="font-size:20pt; font-weight:900; color:#1E293B; margin:0">${esc(iv.institution)} (${iv.date})</h2>
            </div>
            <div style="line-height:2.0; font-size:12pt; color:#334155; white-space:pre-wrap;">${esc(iv.content)}</div>
            <div style="position:absolute; bottom:15mm; width:100%; text-align:center; color:#CBD5E1; font-size:8pt">© SORIZAVA ACADEMY</div>
        </div>
    `).join('');
    window.print();
}

/* ════ 6. 기존 v6.9 핵심 유틸리티 로직 복구 ════ */
function calculateDDay(date) {
    if(!date) return '-';
    const diff = new Date(date) - new Date(TODAY);
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
    return days === 0 ? 'D-Day' : days > 0 ? `D-${days}` : `종료`;
}

function renderDashJobs() {
    const container = $('dash-job-list');
    if(!container) return;
    const sorted = JOBS.slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    container.innerHTML = `<div class="custom-scroll" style="height:350px"><table style="width:100%; border-collapse:collapse">${sorted.map(j => `
        <tr class="tbl-tr" style="border-bottom:1px solid #F3F4F6"><td style="padding:10px; font-weight:600">${esc(j.name)}</td><td style="padding:10px; text-align:right; color:#EF4444">${calculateDDay(j.applyDeadline)}</td></tr>
    `).join('')}</table></div>`;
}

function renderDashStudents() {
    const container = $('dash-student-list');
    if(!container) return;
    container.innerHTML = `<div class="custom-scroll" style="height:350px"><table style="width:100%; border-collapse:collapse">${STUDENTS.slice(0, 15).map(s => `
        <tr class="tbl-tr" style="border-bottom:1px solid #F3F4F6"><td style="padding:10px; font-weight:600">${esc(s.name)}</td><td style="padding:10px; text-align:right; color:#64748B">${s.age||'-'}세 / ${esc(s.desiredRegion)}</td></tr>
    `).join('')}</table></div>`;
}

function csvExport(data, fileName) {
    if(!data.length) return alert("데이터가 없습니다.");
    const keys = Object.keys(data[0]);
    const csv = ['\uFEFF' + keys.join(','), ...data.map(row => keys.map(k => `"${String(row[k]||'').replace(/"/g, '""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `${fileName}_${TODAY}.csv`; link.click();
}

/* ════ 7. 앱 초기화 ════ */
function renderView() {
    if(currentView === 'dashboard') renderDashboard();
}

window.onload = loadAllData;
