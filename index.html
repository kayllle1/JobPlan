function csvExport(data,name){
  if(!data||!data.length)return;
  const hdrs=Object.keys(data[0]);
  const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','));
  const csv=[hdrs.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();
  URL.revokeObjectURL(url);
}
function getApps(sid){return JOBS.flatMap(j=>j.applicants.filter(a=>a.studentId===sid).map(a=>({...a,jobName:j.name,category:j.category})));}

// ══════════════════════════════════════════════════════════════
// ★ DB ↔ JS 변환 함수 (snake_case ↔ camelCase)
// ══════════════════════════════════════════════════════════════
function dbToStudent(r){
  return{id:r.id,name:r.name,age:r.age,phone:r.phone||'',email:r.email||''};
}
function dbToJob(r){
  return{
    id:r.id, name:r.name, category:r.category||'기타', type:r.type||'',
    isRec:!!r.is_rec, isReA:!!r.is_rea, isClosed:!!r.is_closed,
    docDate:r.doc_date||'', interviewDate:r.interview_date||'',
    finalDate:r.final_date||'', startDate:r.start_date||'', endDate:r.end_date||'',
    note:r.note||'', submitDocs:r.submit_docs||'', submitDeadline:r.submit_deadline||'',
    managerName:r.manager_name||'', managerPhone:r.manager_phone||'', managerEmail:r.manager_email||'',
    applicants:[]
  };
}
function dbToApplicant(r){
  return{
    id:r.id, jobId:r.job_id, studentId:r.student_id,
    status:r.status||'서류접수', grade:r.grade||'3급',
    announceType:r.announce_type||'홈페이지',
    internalDeadline:r.internal_deadline||'', memo:r.memo||'',
    examNumber:r.exam_number||'',
    interviewDocSent:r.interview_doc_sent||'',
    interviewFeedback:r.interview_feedback||''
  };
}

// ══════════════════════════════════════════════════════════════
// ★ Supabase에서 전체 데이터 로드 (비동기)
// ══════════════════════════════════════════════════════════════
async function loadAllData(){
  try{
    const[{data:sd,error:e1},{data:jd,error:e2},{data:ad,error:e3}]=await Promise.all([
      SB.from('students').select('*').order('created_at',{ascending:false}),
      SB.from('jobs').select('*').order('created_at',{ascending:false}),
      SB.from('applicants').select('*')
    ]);
    if(e1||e2||e3){
      console.error('DB 로드 오류:',e1,e2,e3);
      customAlert('데이터 로드 오류가 발생했습니다.\nSupabase URL과 ANON_KEY를 확인해주세요.');
      return;
    }
    STUDENTS=(sd||[]).map(dbToStudent);
    const jobs=(jd||[]).map(dbToJob);
    const aps=(ad||[]).map(dbToApplicant);
    // applicants를 각 job에 병합
    JOBS=jobs.map(j=>({...j,applicants:aps.filter(a=>a.jobId===j.id)}));
    renderView();
  }catch(err){
    console.error('loadAllData 실패:',err);
    customAlert('네트워크 오류가 발생했습니다. 인터넷 연결을 확인해주세요.');
  }
}

// ══════════════════════════════════════════════════════════════
// ★ 실시간 구독 설정 (다른 사용자 변경사항 자동 반영)
// ══════════════════════════════════════════════════════════════
function scheduleReload(){
  clearTimeout(_reloadTimer);
  _reloadTimer=setTimeout(loadAllData,500);
}
function setupRealtime(){
  SB.channel('jobms-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'applicants'},scheduleReload)
    .subscribe(status=>{
      _dbConnected=(status==='SUBSCRIBED');
      // 사이드바 연결 상태 아이콘 갱신
      var dot=$('_conn_dot'),txt=$('_conn_txt');
      if(dot)dot.style.background=_dbConnected?'#10B981':'#F59E0B';
      if(txt)txt.textContent=_dbConnected?'실시간 연동 활성':'연결 중...';
    });
}

// ── SVG 차트 ─────────────────────────────────────────────────
function pieChartSVG(data,w,h){
  if(!data||!data.length)return`<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const total=data.reduce((s,d)=>s+d.value,0);
  const r=Math.min(w,h)*0.32,cx=w*0.42,cy=h/2;
  const legX=cx+r+18,legStartY=h/2-(data.length*18)/2;
  let angle=-Math.PI/2,paths='',labels='',legend='';
  data.forEach(function(d,i){
    const slice=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const large=slice>Math.PI?1:0,c=PIE_C[i%PIE_C.length];
    const mx=cx+(r*0.65)*Math.cos(angle+slice/2),my=cy+(r*0.65)*Math.sin(angle+slice/2);
    paths+=`<path d="M${cx.toFixed(1)},${cy.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r.toFixed(1)},${r.toFixed(1)} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${c}" stroke="#fff" stroke-width="2"/>`;
    if(d.value>0)labels+=`<text x="${mx.toFixed(1)}" y="${(my+4).toFixed(1)}" text-anchor="middle" fill="#fff" font-size="${Math.max(9,r*0.15).toFixed(0)}" font-weight="bold">${d.value}</text>`;
    legend+=`<g transform="translate(${legX.toFixed(1)},${(legStartY+i*20).toFixed(1)})"><rect width="10" height="10" fill="${c}" rx="2"/><text x="14" y="9" font-size="11" fill="#374151">${esc(d.name)}</text></g>`;
    angle+=slice;
  });
  return`<svg width="${w}" height="${h}" style="overflow:visible;display:block">${paths}${labels}${legend}</svg>`;
}
function barChartSVG(data,w,h){
  if(!data||!data.length)return`<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#CBD5E1" font-size="13">데이터 없음</text></svg>`;
  const max=Math.max.apply(null,data.map(d=>d.value).concat([1]));
  const pl=28,pb=28,pt=30,pr=8,bw2=(w-pl-pr)/data.length*0.55,gap=(w-pl-pr)/data.length;
  let bars='',grid='';
  for(let i=0;i<=4;i++){const y=h-pb-(i/4)*(h-pt-pb);grid+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w-pr}" y2="${y.toFixed(1)}" stroke="#F1F5F9" stroke-width="1"/>`;if(i>0)grid+=`<text x="${(pl-5).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#94A3B8">${Math.round(max*i/4)}</text>`;}
  data.forEach(function(d,i){
    const bh=((d.value/max)*(h-pt-pb))||2,x=pl+i*gap+gap*0.225,y=h-pb-bh,c=PIE_C[i%PIE_C.length];
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw2.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}" rx="4"/>`;
    bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(h-pb+16).toFixed(1)}" text-anchor="middle" font-size="11" fill="#6B7280">${esc(d.name)}</text>`;
    if(d.value>0)bars+=`<text x="${(x+bw2/2).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">${d.value}</text>`;
  });
  return`<svg width="${w}" height="${h}" style="display:block;overflow:visible">${grid}${bars}</svg>`;
}

function fSel(label,id,opts,value){value=value||'';const options=opts.map(o=>`<option value="${esc(o)}" ${o===value?'selected':''}>${esc(o)}</option>`).join('');return`<div style="margin-bottom:10px">${label?`<label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">${label}</label>`:''}<select id="${id}" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;background:#fff;font-family:inherit">${options}</select></div>`;}

}

function confirmDeleteJob(jobId){

  var apCount=job.applicants.length;
  var old=$('_confirm');if(old)old.remove();

  document.body.appendChild(div);
}

// ★ async: DB에서 공고 삭제 (ON DELETE CASCADE로 applicants도 자동 삭제)
async function executeDeleteJob(jobId){
  var old=$('_confirm');if(old)old.remove();
  var{error}=await SB.from('jobs').delete().eq('id',jobId);
  if(error){customAlert('삭제 오류: '+error.message);return;}
  expandedJobs.delete(jobId);detailJobs.delete(jobId);
  await loadAllData();
}

function getFiltered(){return JOBS.filter(j=>{if(jobFilter.cat!=='전체'&&j.category!==jobFilter.cat)return false;if(jobFilter.year&&!(j.docDate||'').startsWith(jobFilter.year))return false;if(jobFilter.kw&&!j.name.includes(jobFilter.kw))return false;if(jobFilter.type==='추천'&&!j.isRec)return false;if(jobFilter.type==='지원'&&j.isRec)return false;return true;});}
function toggleDetail(jobId){if(detailJobs.has(jobId))detailJobs.delete(jobId);else detailJobs.add(jobId);renderView();}
function toggleJob(jobId){if(expandedJobs.has(jobId))expandedJobs.delete(jobId);else expandedJobs.add(jobId);renderView();}

  if(job.isRec){rows+=`<div style="padding:12px 18px;border-bottom:1px solid #DBEAFE;background:#F0F7FF"><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.05em">📌 추천 공고 정보</p><div style="display:flex;flex-wrap:wrap;gap:16px 32px">${dl('제출 서류',job.submitDocs)}${dl('제출 기한',fmt(job.submitDeadline))}${dl('담당자 이름',job.managerName)}${dl('담당자 연락처',job.managerPhone)}${dl('담당자 이메일',job.managerEmail)}</div></div>`;}
  if(job.note){rows+=`<div style="padding:10px 18px;border-bottom:1px solid #DBEAFE"><span style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em">비고 </span><span style="font-size:13px;color:#374151">${esc(job.note)}</span></div>`;}

function renderJobs(){
  const filtered=getFiltered();
  const years=[...new Set(JOBS.map(j=>j.docDate?j.docDate.slice(0,4):'').filter(Boolean))].sort().reverse();

하여 상세보기)','카테고리','채용형태','서류발표','면접','최종합격','지원자','관리'].map(h=>`<th style="padding:10px 12px;text-align:left;font-weight:700;color:#374151;font-size:11px;white-space:nowrap;letter-spacing:.04em">${h}</th>`).join('')}</tr></thead><tbody>${tblRows}</tbody></table></div></div>`;

// ── 학생 DB ──────────────────────────────────────────────────
function renderStudents(){
  const filtered=STUDENTS.filter(s=>!studentSearch||s.name.includes(studentSearch));
  const rows=filtered.length===0?'<tr><td colspan="6" style="padding:40px;text-align:center;color:#CBD5E1">데이터가 없습니다.</td></tr>':filtered.map(s=>{
    const apps=getApps(s.id);
    const pass=apps.filter(a=>a.status==='최종합격').length;
    const ongoing=apps.filter(a=>a.status!=='최종합격'&&a.status!=='불합격').length;
    return`<tr class="tbl-tr" style="border-bottom:1px solid #F1F5F9"><td style="padding:10px 14px"><button onclick="openHistoryModal(${s.id})" style="border:none;background:none;cursor:pointer;color:#2563EB;font-weight:700;text-decoration:underline;font-size:13px;padding:0;font-family:inherit">${esc(s.name)}</button></td><td style="padding:10px 14px;color:#374151">${s.age||'-'}세</td><td style="padding:10px 14px;color:#6B7280;font-size:12px">${esc(s.phone)}</td><td style="padding:10px 14px;color:#9CA3AF;font-size:12px">${esc(s.email)}</td><td style="padding:10px 14px"><span style="font-size:12px;color:#374151;font-weight:600">지원 ${apps.length}건</span>${pass>0?`<span style="margin-left:6px;font-size:10px;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid #A7F3D0">합격 ${pass}</span>`:''}${ongoing>0?`<span style="margin-left:4px;font-size:10px;background:#DBEAFE;color:#1E40AF;padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid #BFDBFE">진행 ${ongoing}</span>`:''}</td><td style="padding:10px 14px;display:flex;gap:4px">${btn('수정',`openEditStudentModal(${s.id})`,'outline',true)} ${btn('삭제',`deleteStudent(${s.id})`,'danger',true)}</td></tr>`;
  }).join('');
  return`<div style="padding:24px;height:100%;overflow-y:auto"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><h2 style="margin:0;font-size:20px;font-weight:800;color:#0F172A">학생 DB</h2><p style="margin:3px 0 0;font-size:12px;color:#94A3B8">총 ${filtered.length}명</p></div><div style="display:flex;gap:8px;align-items:center"><input value="${esc(studentSearch)}" oninput="studentSearch=this.value;renderView()" placeholder="🔍 이름 검색..." style="padding:7px 12px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;width:180px;outline:none;font-family:inherit"> ${btn('📥 엑셀','exportStudents()','success')}</div></div><div style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#F8FAFC;border-bottom:2px solid #E2E8F0">${['이름','나이','연락처','이메일','지원현황','관리'].map(h=>`<th style="padding:10px 14px;text-align:left;font-weight:700;color:#374151;font-size:11px;letter-spacing:.04em">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

}

      ${fInp('최종합격 발표일','jf_fd','date',f.finalDate)} <div></div>
      ${fInp('근무 시작일','jf_sd2','date',f.startDate)} ${fInp('근무 종료일','jf_ed','date',f.endDate)}

    <div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">비고</label><textarea id="jf_note" rows="2" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(f.note||'')}</textarea></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid #F3F4F6">${btn('취소','closeModal()','outline')} ${btn(job?'저장':'등록',`saveJob(${jobId!=null?jobId:'null'})`,'primary')}</div>

function toggleRecF(){
  var isRec=$('jf_rc')&&$('jf_rc').checked,el=$('jf_rec');if(!el)return;
  if(isRec){el.innerHTML=`<div style="background:#F0F7FF;border-radius:8px;padding:14px;margin-bottom:4px"><p style="margin:0 0 10px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.06em">📌 추천 공고 정보</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">${fInp('제출 서류','jf_sd')} ${fInp('제출 기한','jf_sl','date')} ${fInp('담당자 이름','jf_mn')} ${fInp('담당자 연락처','jf_mp')}</div>${fInp('담당자 이메일','jf_me','email')}</div>`;}

// ★ async saveJob
async function saveJob(jobId){
  var name=$('jf_name')&&$('jf_name').value.trim();
  if(!name)return customAlert('공고명을 입력하세요');
  var f={
    name:name,
    category:$('jf_cat')&&$('jf_cat').value,
    type:$('jf_type')&&$('jf_type').value,
    is_rec:!!($('jf_rc')&&$('jf_rc').checked),
    is_rea:!!($('jf_ra')&&$('jf_ra').checked),
    is_closed:!!($('jf_cl')&&$('jf_cl').checked),
    doc_date:dateOrNull($('jf_dd')&&$('jf_dd').value),
    interview_date:dateOrNull($('jf_id')&&$('jf_id').value),
    final_date:dateOrNull($('jf_fd')&&$('jf_fd').value),
    start_date:dateOrNull($('jf_sd2')&&$('jf_sd2').value),
    end_date:dateOrNull($('jf_ed')&&$('jf_ed').value),
    note:($('jf_note')&&$('jf_note').value)||'',
    submit_docs:($('jf_sd')&&$('jf_sd').value)||'',
    submit_deadline:dateOrNull($('jf_sl')&&$('jf_sl').value),
    manager_name:($('jf_mn')&&$('jf_mn').value)||'',
    manager_phone:($('jf_mp')&&$('jf_mp').value)||'',
    manager_email:($('jf_me')&&$('jf_me').value)||''
  };
  var{error}=jobId!=null?await SB.from('jobs').update(f).eq('id',jobId):await SB.from('jobs').insert(f);
  if(error){customAlert('저장 오류: '+error.message);return;}
  closeModal();await loadAllData();
}

function openAddApModal(jobId){

function updateApSearch(jobId){
  var val=$('ap_search')&&$('ap_search').value.trim();
  var results=$('ap_search_results'),selInfo=$('ap_selected_info');
  if(!results)return;
  if(!val){results.innerHTML='';if(selInfo)selInfo.innerHTML='';_addApSelectedSid=null;return;}
  var job=JOBS.find(j=>j.id===jobId);if(!job)return;
  var available=STUDENTS.filter(s=>!job.applicants.find(a=>a.studentId===s.id));
  var matches=available.filter(s=>s.name.includes(val));
  if(matches.length>0){
    results.innerHTML=`<div style="border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:4px"><div style="background:#F8FAFC;padding:6px 12px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em">기존 학생 ${matches.length}명 검색됨</div>${matches.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid #F3F4F6;background:#fff"><div><span style="font-weight:700;font-size:13px;color:#111827">${esc(s.name)}</span><span style="margin-left:8px;font-size:11px;color:#6B7280">${s.age||'?'}세 · ${esc(s.phone)}</span></div><button onclick="selectExistingAp(${s.id},'${esc(s.name)}')" style="background:#2563EB;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">이 학생 선택</button></div>`).join('')}<div style="padding:8px 12px;border-top:1px solid #F3F4F6;background:#FAFAFA;display:flex;align-items:center;justify-content:space-between"><span style="font-size:11px;color:#9CA3AF">찾는 학생이 없나요?</span><button onclick="selectNewAp('${esc(val)}')" style="background:#059669;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">신규 등록</button></div></div>`;
  }else{
    results.innerHTML=`<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:#92400E">일치하는 학생이 없습니다. 신규 학생으로 등록하시겠습니까?</span><button onclick="selectNewAp('${esc(val)}')" style="background:#059669;color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:10px">신규 등록</button></div>`;
  }
}
function selectExistingAp(sid,name){
  _addApSelectedSid=sid;
  var results=$('ap_search_results');if(results)results.innerHTML='';
  var search=$('ap_search');if(search){search.value=name;search.disabled=true;search.style.background='#F3F4F6';}
  var selInfo=$('ap_selected_info');if(selInfo)selInfo.innerHTML=`<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:700;color:#1E40AF">✅ 기존 학생 선택됨: ${esc(name)}</span><button onclick="clearApSelection()" style="background:none;border:1px solid #93C5FD;color:#2563EB;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">변경</button></div>`;

function selectNewAp(nameVal){

// ★ async saveAddAp
async function saveAddAp(jobId){
  if(!_addApSelectedSid)return customAlert('학생을 검색하여 선택하거나 신규 등록을 먼저 해주세요.');
  var sid;
  if(_addApSelectedSid==='new'){
    var nm=$('ns_nm')&&$('ns_nm').value.trim();
    if(!nm)return customAlert('이름을 입력하세요');
    var{data:newSt,error:se}=await SB.from('students').insert({
      name:nm,age:parseInt($('ns_ag')&&$('ns_ag').value)||null,
      phone:($('ns_ph')&&$('ns_ph').value)||'',email:($('ns_em')&&$('ns_em').value)||''
    }).select().single();
    if(se){customAlert('학생 등록 오류: '+se.message);return;}
    sid=newSt.id;
  }else{sid=_addApSelectedSid;}
  var{error:ae}=await SB.from('applicants').insert({
    job_id:jobId,student_id:sid,
    status:($('ap_st')&&$('ap_st').value)||'서류접수',
    grade:($('ap_gr')&&$('ap_gr').value)||'3급',
    announce_type:($('ap_an')&&$('ap_an').value)||'홈페이지',
    internal_deadline:dateOrNull($('ap_dl')&&$('ap_dl').value),
    memo:($('ap_mm')&&$('ap_mm').value)||'',
    exam_number:'',interview_doc_sent:null,interview_feedback:''
  });
  if(ae){customAlert('지원자 추가 오류: '+ae.message);return;}
  closeModal();await loadAllData();
}

// ★ 지원자 수정 (async)

function openEditApModal(jobId,apId){
  var job=JOBS.find(j=>j.id===jobId);
  var ap=job&&job.applicants.find(a=>a.id===apId);
  var st=ap&&STUDENTS.find(s=>s.id===ap.studentId);
  if(!ap||!st)return;
  var showInterview=['면접대기','면접완료','최종합격','불합격'].includes(ap.status);
  var interviewSection=`<div id="ea_interview_wrap" style="display:${showInterview?'block':'none'}"><div style="background:#FFFBEB;border:1px solid #FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 10px;font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em">📋 면접 관련 기록</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('응시번호','ea_exam','text',ap.examNumber||'')} ${fInp('면접자료 발송일','ea_docsent','date',ap.interviewDocSent||'')}</div><div style="margin-bottom:0"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">면접 회신 내용</label><textarea id="ea_feedback" rows="3" placeholder="면접 후 회신 내용을 입력하세요..." style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(ap.interviewFeedback||'')}</textarea></div></div></div>`;
  showModal('지원자 수정 — '+st.name,`
    <div style="background:#EFF6FF;border-radius:8px;padding:12px 14px;margin-bottom:14px"><p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#1D4ED8;text-transform:uppercase;letter-spacing:.06em">개인정보 (학생 DB 동기화)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','ea_nm','text',st.name)} ${fInp('나이','ea_ag','number',st.age)} ${fInp('연락처','ea_ph','text',st.phone)} ${fInp('이메일','ea_em','email',st.email)}</div></div>
    <p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em">공고 정보 — ${esc(job.name.slice(0,20))}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">
      <div><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">상태</label><select id="ea_st" onchange="toggleInterviewSection(this.value)" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;background:#fff;font-family:inherit;margin-bottom:10px">${STATUSES.map(s=>`<option value="${s}" ${s===ap.status?'selected':''}>${s}</option>`).join('')}</select></div>
      ${fSel('급수','ea_gr',GRADES,GRADES.includes(ap.grade)?ap.grade:'3급')} ${fSel('발표방식','ea_an',ANNOUNCE,ap.announceType)} ${fInp('내부 마감일','ea_dl','date',ap.internalDeadline||'')}
    </div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">메모</label><textarea id="ea_mm" rows="2" style="width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;resize:vertical;font-family:inherit">${esc(ap.memo||'')}</textarea></div>
    ${interviewSection}
    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid #F3F4F6">${btn('취소','closeModal()','outline')} ${btn('💾 저장 (DB 동기화)',`saveEditAp(${jobId},${apId},${ap.studentId})`,'primary')}</div>
  `,'580px');
}
function toggleInterviewSection(status){
  var show=['면접대기','면접완료','최종합격','불합격'].includes(status);
  var wrap=$('ea_interview_wrap');if(wrap)wrap.style.display=show?'block':'none';
}

// ★ async saveEditAp
async function saveEditAp(jobId,apId,studentId){
  var nm=$('ea_nm')&&$('ea_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');
  var[{error:ae},{error:se}]=await Promise.all([
    SB.from('applicants').update({
      status:$('ea_st').value,grade:$('ea_gr').value,announce_type:$('ea_an').value,
      internal_deadline:dateOrNull($('ea_dl')&&$('ea_dl').value),memo:($('ea_mm')&&$('ea_mm').value)||'',
      exam_number:($('ea_exam')&&$('ea_exam').value)||'',
      interview_doc_sent:dateOrNull($('ea_docsent')&&$('ea_docsent').value),
      interview_feedback:($('ea_feedback')&&$('ea_feedback').value)||''
    }).eq('id',apId),
    SB.from('students').update({
      name:nm,age:parseInt($('ea_ag')&&$('ea_ag').value)||null,
      phone:($('ea_ph')&&$('ea_ph').value)||'',email:($('ea_em')&&$('ea_em').value)||''
    }).eq('id',studentId)
  ]);
  if(ae||se){customAlert('저장 오류: '+(ae?.message||se?.message));return;}
  closeModal();await loadAllData();
}

// ★ deleteAp (async callback)
function deleteAp(jobId,apId){
  customConfirm('이 지원자를 삭제하시겠습니까?',async function(){
    var{error}=await SB.from('applicants').delete().eq('id',apId);
    if(error){customAlert('삭제 오류: '+error.message);return;}
    await loadAllData();
  },'삭제','#DC2626');
}

// ══════════════════════════════════════════════════════════════
// ★ 학생 수정/삭제 (async)
// ══════════════════════════════════════════════════════════════
function openEditStudentModal(id){
  var s=STUDENTS.find(st=>st.id===id);if(!s)return;
  showModal('학생 정보 수정',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">${fInp('이름','es_nm','text',s.name)} ${fInp('나이','es_ag','number',s.age)} ${fInp('연락처','es_ph','text',s.phone)} ${fInp('이메일','es_em','email',s.email)}</div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">${btn('취소','closeModal()','outline')} ${btn('저장',`saveStudent(${id})`,'primary')}</div>`,'420px');
}
async function saveStudent(id){
  var nm=$('es_nm')&&$('es_nm').value.trim();if(!nm)return customAlert('이름을 입력하세요');
  var{error}=await SB.from('students').update({
    name:nm,age:parseInt($('es_ag')&&$('es_ag').value)||null,
    phone:($('es_ph')&&$('es_ph').value)||'',email:($('es_em')&&$('es_em').value)||''
  }).eq('id',id);
  if(error){customAlert('저장 오류: '+error.message);return;}
  closeModal();await loadAllData();
}
function deleteStudent(id){
  customConfirm('학생을 삭제하면 관련 지원이력도 함께 삭제됩니다.\n계속하시겠습니까?',async function(){
    // DB의 ON DELETE CASCADE가 applicants도 자동 삭제
    var{error}=await SB.from('students').delete().eq('id',id);
    if(error){customAlert('삭제 오류: '+error.message);return;}
    await loadAllData();
  },'삭제','#DC2626');
}

// ── 지원이력 팝업 ─────────────────────────────────────────────
function openHistoryModal(studentId){
  var s=STUDENTS.find(st=>st.id===studentId);if(!s)return;
  var apps=getApps(studentId);
  var pass=apps.filter(a=>a.status==='최종합격').length;
  var ongoing=apps.filter(a=>a.status!=='최종합격'&&a.status!=='불합격').length;
  var rows=apps.length===0?'<tr><td colspan="6" style="padding:24px;text-align:center;color:#CBD5E1">지원 이력 없음</td></tr>':apps.map(ap=>{var sc=STATUS_COLORS[ap.status]||'#6B7280';return`<tr class="tbl-tr" style="border-bottom:1px solid #F1F5F9"><td style="padding:8px 10px;font-weight:600;color:#111827">${esc(ap.jobName)}</td><td style="padding:8px 10px">${badge(ap.category)}</td><td style="padding:8px 10px"><span style="background:${sc}22;color:${sc};padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid ${sc}44">${esc(ap.status)}</span></td><td style="padding:8px 10px;color:#6B7280">${esc(ap.grade)}</td><td style="padding:8px 10px;color:#6B7280">${esc(ap.announceType)}</td><td style="padding:8px 10px;color:#9CA3AF">${esc(ap.memo||'-')}</td></tr>`;}).join('');
  showModal(s.name+' — 지원이력',`<div style="display:flex;gap:12px;margin-bottom:14px;padding:10px 14px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;flex-wrap:wrap"><span style="font-size:13px;color:#374151"><strong>${apps.length}</strong> 건 지원</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#059669"><strong>${pass}</strong> 건 합격</span><span style="color:#D1D5DB">|</span><span style="font-size:13px;color:#2563EB"><strong>${ongoing}</strong> 건 진행 중</span></div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F8FAFC">${['기관명','카테고리','상태','급수','발표방식','메모'].map(h=>`<th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;font-size:11px;border-bottom:1px solid #E2E8F0">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div style="display:flex;justify-content:flex-end;margin-top:12px">${btn('📥 엑셀 추출',`exportHistory(${studentId})`,'success')}</div>`,'740px');
}

// ── 엑셀 ─────────────────────────────────────────────────────
function exportJobs(){csvExport(getFiltered().map(j=>({공고명:j.name,카테고리:j.category,채용형태:j.type,서류발표:j.docDate,면접:j.interviewDate,최종합격:j.finalDate,지원자수:j.applicants.length,상태:j.isClosed?'마감':'진행'})),'공고목록');}
function exportStudents(){csvExport(STUDENTS.filter(s=>!studentSearch||s.name.includes(studentSearch)).map(s=>{var apps=getApps(s.id);return{이름:s.name,나이:s.age,연락처:s.phone,이메일:s.email,지원횟수:apps.length,최종합격:apps.filter(a=>a.status==='최종합격').length};}),'학생DB');}
function exportHistory(studentId){var s=STUDENTS.find(st=>st.id===studentId);if(!s)return;csvExport(getApps(studentId).map(a=>({기관명:a.jobName,카테고리:a.category,상태:a.status,급수:a.grade,발표방식:a.announceType,메모:a.memo||''})),s.name+'_지원이력');}

// ══════════════════════════════════════════════════════════════
// ★ 초기화 — 앱 시작점
// ══════════════════════════════════════════════════════════════
async function init(){
  setView('dashboard');   // UI 레이아웃 먼저 세팅
  showLoading();          // 로딩 스피너 표시
  try{
    await loadAllData();  // Supabase에서 데이터 로드 → renderView() 자동 호출
  }finally{
    hideLoading();        // 성공/실패 모두 스피너 제거
  }
  setupRealtime();        // 실시간 구독 시작
}
init();
</script>
